<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>군웅할거 — MVP v9 (관전 명료성)</title>
<style>
  :root{--bg:#0a0d13;--panel:#121824;--panel2:#0b0f18;--line:#232c3d;--text:#e8edf6;--dim:#8b97ad;--accent:#ffd23a}
  *{box-sizing:border-box} html,body{margin:0}
  body{background:radial-gradient(1200px 700px at 50% -10%, #16203180, transparent), var(--bg);color:var(--text);
    font-family:"Pretendard","Apple SD Gothic Neo","Segoe UI",system-ui,-apple-system,sans-serif;min-height:100vh;padding:16px 12px 40px}
  .wrap{max-width:1180px;margin:0 auto}
  header{margin:2px 2px 10px}
  .kicker{font-size:11px;letter-spacing:.26em;color:var(--dim);font-weight:800;text-transform:uppercase}
  h1{margin:3px 0 2px;font-size:clamp(24px,5vw,38px);font-weight:900;letter-spacing:-.02em}
  h1 .amp{color:var(--accent)}
  .sub{color:var(--dim);font-size:13px;margin:0}
  .power{margin:10px 2px 0}
  .power .lab{font-size:11px;letter-spacing:.14em;color:var(--dim);font-weight:800;text-transform:uppercase;margin-bottom:5px}
  .power .lab b{color:var(--text)}
  .powerbar{position:relative;display:flex;height:20px;border-radius:99px;overflow:hidden;background:#0d131f;border:1px solid var(--line)}
  .powerbar .seg{position:relative;height:100%;transition:width .3s ease;min-width:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .powerbar .seg .lab{font-size:10px;font-weight:800;color:#fff;white-space:nowrap;text-shadow:0 1px 2px #000b,0 0 2px #0008;padding:0 4px;pointer-events:none}
  .stage{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;margin-top:12px}
  .left{flex:1 1 560px;min-width:320px;display:flex;flex-direction:column;gap:12px}
  .arena-box{position:relative;background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:8px}
  .canvas-stack{position:relative;width:100%;aspect-ratio:1/1}
  #main{position:absolute;inset:0;width:100%;height:100%;border-radius:8px;display:block;background:#070a10}
  .overlay{position:absolute;inset:8px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:rgba(5,7,11,.78);backdrop-filter:blur(2px);gap:12px;padding:22px;z-index:6}
  .overlay.hidden{display:none}
  .overlay .big{font-size:clamp(20px,4vw,32px);font-weight:900}
  .overlay .who{font-size:12px;color:var(--dim);letter-spacing:.2em;font-weight:800;text-transform:uppercase}
  .overlay .summary{font-size:13px;color:var(--dim);line-height:1.7;max-width:82%}
  .overlay .summary b{color:var(--text)}
  .pickwrap{display:flex;flex-direction:column;gap:8px;align-items:center}
  .picklab{font-size:12px;color:var(--dim);font-weight:800;letter-spacing:.06em}
  .picklab b{color:var(--accent)}
  .pickrow{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;max-width:92%}
  .pchip{font-family:inherit;font-weight:800;font-size:13px;padding:8px 13px;border-radius:999px;border:2px solid var(--line);background:#0d131f;color:var(--text);cursor:pointer;transition:transform .1s}
  .pchip:hover{transform:translateY(-1px)}
  .pchip.sel{color:#0a0d13;border-color:transparent}
  .predline{font-size:13px;font-weight:800;margin-top:2px}
  .mypick{font-size:10px;font-weight:800;color:#0a0d13;border-radius:5px;padding:1px 5px;display:none}
  .banner{position:absolute;top:14px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:7px;padding:8px 15px;border-radius:999px;font-weight:900;font-size:14px;background:#0d1220ee;border:1px solid var(--line);opacity:0;pointer-events:none;box-shadow:0 8px 30px #0008;white-space:nowrap;z-index:7}
  .banner .dot{width:10px;height:10px;border-radius:3px;flex:none}
  .banner.show{animation:pop 2s ease forwards}
  @keyframes pop{0%{opacity:0;transform:translateX(-50%) translateY(-8px) scale(.9)}10%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}82%{opacity:1}100%{opacity:0}}
  .infobar{display:grid;grid-template-columns:0.8fr 1.2fr;gap:14px}
  .infobar h3{margin:0 0 3px;font-size:11px;letter-spacing:.16em;color:var(--dim);font-weight:800;text-transform:uppercase}
  .infobar .subnote{font-size:11px;color:var(--dim);margin:0 0 7px}
  .legend{font-size:12px;color:var(--dim);line-height:1.9}
  .legend .li{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .legend b{color:var(--text);font-weight:800}
  .swatch-t{width:13px;height:13px;border-radius:3px;display:inline-block;vertical-align:middle;flex:none}
  .resmini{display:flex;flex-direction:column;gap:5px}
  .rm-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;padding:4px 6px;border-radius:7px;background:#0d131f}
  .rm-row.dead{opacity:.35}
  .rm-nm{font-weight:800;min-width:52px}
  .rm-grp{display:inline-flex;align-items:center;gap:3px;color:var(--text);font-weight:800;font-variant-numeric:tabular-nums}
  .rm-grp.z{opacity:.32;color:var(--dim)}
  .rm-eff{margin-left:auto;font-size:10px;color:var(--accent);font-weight:800;font-variant-numeric:tabular-nums}
  .board{flex:0 0 300px;min-width:262px;display:flex;flex-direction:column;gap:12px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px}
  .panel h2{margin:0 0 8px;font-size:12px;letter-spacing:.16em;color:var(--dim);font-weight:800;text-transform:uppercase;display:flex;justify-content:space-between}
  .panel h2 .stat{color:var(--text);letter-spacing:0}
  .rows{display:flex;flex-direction:column;gap:6px}
  .row{display:grid;grid-template-columns:20px 1fr auto;align-items:center;gap:9px;padding:8px 8px;border-radius:9px;background:#0d131f;transition:opacity .2s}
  .row.leader{background:#17203180;box-shadow:inset 0 0 0 1px #ffffff14}
  .row.dead{opacity:.34}
  .rank{font-weight:800;color:var(--dim);font-size:13px;text-align:center}
  .id{display:flex;flex-direction:column;align-items:flex-start;gap:1px;min-width:0}
  .idtop{display:flex;align-items:center;gap:6px;min-width:0}
  .gen{font-size:10px;font-weight:800;color:var(--dim);white-space:nowrap;letter-spacing:.01em}
  .gen b{color:var(--accent)}
  .nm{font-weight:800;font-size:14px;white-space:nowrap}
  .mor{font-size:10px;font-weight:800;color:#1a1400;background:var(--accent);border-radius:5px;padding:1px 5px;opacity:0}
  .mor.on{opacity:1}
  .troop{font-variant-numeric:tabular-nums;font-weight:800;font-size:13px;color:var(--text);min-width:70px;text-align:right}
  .controls{display:flex;flex-direction:column;gap:10px}
  .btns{display:flex;gap:8px;flex-wrap:wrap}
  button{font-family:inherit;font-weight:800;font-size:14px;cursor:pointer;border:1px solid var(--line);background:#182234;color:var(--text);padding:9px 13px;border-radius:9px;transition:background .12s}
  button:hover{background:#1e2a40}
  button.primary{background:var(--accent);color:#1a1400;border-color:transparent}
  button.primary:hover{background:#ffdd5c}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .speed{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--dim);font-weight:700}
  .speed input{flex:1}
  .seedrow{display:flex;gap:8px;align-items:center;font-size:13px;color:var(--dim);font-weight:700}
  .seedrow input[type=text]{flex:1;min-width:0;font-family:inherit;font-weight:800;background:#0d131f;color:var(--text);border:1px solid var(--line);border-radius:8px;padding:8px 10px}
  .hint{color:var(--dim);font-size:12px;line-height:1.5;margin:2px 2px 0}
  img.ic{vertical-align:middle}
  @media (max-width:760px){.board{flex:1 1 100%}.infobar{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Color Battle · MVP v9 · 관전 명료성</div>
    <h1>천하 <span class="amp">쟁패</span></h1>
    <p class="sub">한눈에 우열이 보이고, 왜 이기는지가 화면에 드러난다 — 자원을 모아 정복하고 수도를 함락해 흡수하라</p>
  </header>

  <div class="power">
    <div class="lab" id="powerLab">국력 (지역 + 병력 + 자원)</div>
    <div class="powerbar" id="powerbar"></div>
  </div>

  <div class="stage">
    <div class="left">
      <div class="arena-box">
        <div class="canvas-stack">
          <canvas id="main" aria-label="지역 전투 지도"></canvas>
          <div id="banner" class="banner"></div>
          <div id="overlay" class="overlay">
            <div class="who">누가 천하를 얻을까?</div>
            <div class="big" id="ovBig">▶ 시작을 눌러 관전</div>
            <div class="btns"><button class="primary" id="ovStart">▶ 시작</button><button id="ovSeed">🎲 새 지도</button></div>
          </div>
        </div>
      </div>
      <div class="panel infobar">
        <div><h3>지형</h3><div class="legend" id="legend"></div></div>
        <div><h3>세력별 자원 → 효과</h3><p class="subnote">자원을 먹을수록 강해진다 (공격·생산·행군 배수)</p><div class="resmini" id="resmini"></div></div>
      </div>
    </div>
    <div class="board">
      <div class="panel">
        <h2>세력 <span class="stat" id="statLine">1년차</span></h2>
        <div class="rows" id="rows"></div>
      </div>
      <div class="panel controls">
        <div class="btns"><button class="primary" id="btnPlay">▶ 시작</button><button id="btnReset">↻ 다시</button><button id="btnNew">🎲 새 지도</button></div>
        <div class="speed"><span>속도</span><input type="range" id="speed" min="0.5" max="8" step="0.5" value="3"><span id="spVal" style="min-width:34px;text-align:right;color:var(--text)">3×</span></div>
        <div class="seedrow"><span>시드</span><input type="text" id="seedIn" inputmode="numeric" value="0"><button id="btnPlaySeed">재생</button></div>
        <p class="hint">같은 시드 = 같은 지도·같은 전개 명경기는 시드를 적어두면 그대로 재생된다</p>
      </div>
    </div>
  </div>
</div>
<script>
"use strict";
const FACTIONS=[
  {name:"화염단",color:"#ff5555",sig:"flame"},{name:"심해군",color:"#3aa0ff",sig:"wave"},
  {name:"뇌전대",color:"#ffcb33",sig:"bolt"},{name:"정글파",color:"#37d982",sig:"leaf"},
  {name:"보라단",color:"#b874ff",sig:"star"},{name:"벚꽃단",color:"#ff77bd",sig:"blossom"},
];
const K=FACTIONS.length, NEU=-1;
const RGB=FACTIONS.map(f=>[parseInt(f.color.slice(1,3),16),parseInt(f.color.slice(3,5),16),parseInt(f.color.slice(5,7),16)]);
const IRON=0,FOOD=1,GOLD=2, RES_KEY=["iron","food","gold"], NODE_NAME=["철광","식량","금"];
const T_SEA=0,T_PLAIN=1,T_MTN=2,T_RIVER=3;
const MARCH_MUL=[0.42,1,0.8,0.6], ARRIVE_MUL=[0.62,1,0.95,0.85], PROD_MUL_T=[0.2,1,0.9,0.5];
const SUR=["강","진","사","율","백","단","호","연","적","한","서","목","위","도"];
const GIV=["무","천","랑","흔","결","진","호","월","강","렬","성","운","극","한","비","랑"];
// 명장 시스템 (P9 캐릭터 연속성) — 세력별 고정 로스터 3인 + 계급(전공에 따라 승급)
const RANKS=["교위","비장","아장","편장군","대장군"];
const RANK_WIN=[2,5,9,14]; // 누적 승수 문턱 → 다음 계급
const ROSTER_NAMES=[
  ["강호","준서","태오"],   // 화염단
  ["해준","민우","지호"],   // 심해군
  ["도현","시우","강토"],   // 뇌전대
  ["유찬","이든","하람"],   // 정글파
  ["보라","지아","별하"],   // 보라단
  ["하나","봄이","꽃님"],   // 벚꽃단
];

const MAPRES=300, MAIN=760, PROV=52;
const P={
  seaDeep:0.16, seaLevel:0.30, mtnLevel:0.70, resCount:9, warpAmp:8,
  prodBase:0.34, underdog:0.9, minToMove:12, sendFrac:0.6,
  marchSpeed:0.020, moveCdMin:16, moveCdMax:30,
  capGarrison:40, capDef:3.5, mtnDef:1.6,
  ironBonus:0.18, foodBonus:0.16, goldBonus:0.12,
  duelRounds:4,
  moraleWin:1.4, moraleDur:180, tintLand:0.55, tintWater:0.5,
  maxTicks:9000, baseTPS:10,
};

let provOf=new Int16Array(MAPRES*MAPRES), isBorder=new Uint8Array(MAPRES*MAPRES);
let terrainRGB=new Uint8Array(MAPRES*MAPRES*3);
let H_FIELD=null, pv=[];
let seed=0,rand=null,tick=0,running=false,winner=-1,speed=3,acc=0,lastT=0,dirty=true;
let marches=[], impacts=[], floats=[], duel={active:false}, siege={active:false}, deathQueue=[], deathAnim=null;
let attackMul=new Float64Array(K),prodMul=new Float64Array(K),speedMul=new Float64Array(K);
let moraleMul=new Float64Array(K).fill(1), moraleLeft=new Int32Array(K);
let alive=new Array(K).fill(true), stats={duels:0,capFalls:[]}, leaderF=0;
// 명장 로스터 상태 + 통산 전적(localStorage로 경기 넘어 이어짐 → 캐릭터 연속성)
let roster=[];
const CAREER_KEY="cb_career_v1";
function loadCareer(){try{return JSON.parse(localStorage.getItem(CAREER_KEY))||{};}catch(e){return {};}}
function saveCareer(){try{localStorage.setItem(CAREER_KEY,JSON.stringify(careerWins));}catch(e){}}
let careerWins=loadCareer();
function initRoster(){roster=ROSTER_NAMES.map((names,f)=>names.map(nm=>({name:nm,f,wins:0,losses:0,rank:0})));}
function rankOf(g){let r=0;for(let i=0;i<RANK_WIN.length;i++)if(g.wins>=RANK_WIN[i])r=i+1;return r;}
function championOf(f){const r=roster[f];let best=r[0];for(const g of r)if(g.rank>best.rank||(g.rank===best.rank&&g.wins>best.wins))best=g;return best;}
function careerKey(g){return FACTIONS[g.f].name+"·"+g.name;}
function careerOf(g){return careerWins[careerKey(g)]||0;}
// 장수 초상 로더 — assets/generals/<sig>.png 가 있으면 VS카드에 사용, 없으면 세력 엠블럼으로 대체
const portraitImg={},portraitReady={};
FACTIONS.forEach(f=>{portraitReady[f.sig]=false;const im=new Image();im.onload=()=>{if(im.naturalWidth>0)portraitReady[f.sig]=true;};im.src="assets/generals/"+f.sig+".png";portraitImg[f.sig]=im;});
/* 픽셀 일기토 스프라이트(세력별 4프레임 스트립) + 공성전 성곽·병사 (회색→세력색 틴트) */
const DCW=704,DCH=447,DFEET=429,DCX=352;                 // 일기토 셀 규격(굽기 결과)
const duelImg={},duelReady={};
FACTIONS.forEach(f=>{duelReady[f.sig]=false;const im=new Image();im.onload=()=>{if(im.naturalWidth>0)duelReady[f.sig]=true;};im.src="assets/duel/"+f.sig+".png";duelImg[f.sig]=im;});
const CASTLE_W=523,CASTLE_H=592;
const castleImg=new Image();let castleReady=false;castleImg.onload=()=>castleReady=castleImg.naturalWidth>0;castleImg.src="assets/siege/castle.png";
const soldierImg=new Image();let soldierReady=false;soldierImg.onload=()=>soldierReady=soldierImg.naturalWidth>0;soldierImg.src="assets/siege/soldiers.png";
const VS_IMG=new Image();let vsReady=false;VS_IMG.onload=()=>vsReady=VS_IMG.naturalWidth>0;VS_IMG.src="assets/fx/vs.png";
const IMPACT_IMG=new Image();let impactReady=false;IMPACT_IMG.onload=()=>impactReady=IMPACT_IMG.naturalWidth>0;IMPACT_IMG.src="assets/fx/impact.png";
const DEATH_W=491,DEATH_H=465,DEATH_N=4;
const DEATH_IMG=new Image();let deathReady=false;DEATH_IMG.onload=()=>deathReady=DEATH_IMG.naturalWidth>0;DEATH_IMG.src="assets/fx/death.png";
const mapTokImg={},mapTokReady={};   // 지도 행군 토큰(솔리드 실루엣 병사, 세력별 사전 틴트)
FACTIONS.forEach(f=>{mapTokReady[f.sig]=false;const im=new Image();im.onload=()=>{if(im.naturalWidth>0)mapTokReady[f.sig]=true;};im.src="assets/map/"+f.sig+".png";mapTokImg[f.sig]=im;});
const tintCache=new Map();
function tintCanvas(img,sx,sw,sh,color,key){const ck=key+"|"+color;if(tintCache.has(ck))return tintCache.get(ck);
  const c=document.createElement("canvas");c.width=sw;c.height=sh;const g=c.getContext("2d");g.imageSmoothingEnabled=false;
  g.drawImage(img,sx,0,sw,sh,0,0,sw,sh);
  g.globalCompositeOperation="multiply";g.globalAlpha=0.6;g.fillStyle=color;g.fillRect(0,0,sw,sh);g.globalAlpha=1;
  g.globalCompositeOperation="destination-in";g.drawImage(img,sx,0,sw,sh,0,0,sw,sh);g.globalCompositeOperation="source-over";
  tintCache.set(ck,c);return c;}
function drawFighter(sig,frame,centerX,baseY,scale,mirror){if(!duelReady[sig])return;
  ctx.save();ctx.imageSmoothingEnabled=false;ctx.translate(centerX,baseY);if(mirror)ctx.scale(-1,1);
  ctx.drawImage(duelImg[sig],frame*DCW,0,DCW,DCH,-DCX*scale,-DFEET*scale,DCW*scale,DCH*scale);ctx.restore();}
function clashFX(cx,cy,t,cA,cB){const inv=1-t;ctx.save();
  const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,MAIN*(0.1+0.16*t));
  gr.addColorStop(0,"rgba(255,255,240,"+(0.9*inv)+")");gr.addColorStop(0.4,"rgba(255,236,150,"+(0.5*inv)+")");gr.addColorStop(1,"rgba(255,120,60,0)");
  ctx.fillStyle=gr;ctx.beginPath();ctx.arc(cx,cy,MAIN*(0.1+0.16*t),0,7);ctx.fill();
  ctx.strokeStyle="rgba(255,240,200,"+(0.8*inv)+")";ctx.lineWidth=MAIN*0.011*inv;ctx.beginPath();ctx.arc(cx,cy,MAIN*(0.05+0.2*t),0,7);ctx.stroke();
  const hx=c=>Math.floor(clamp(c,0,1)*180).toString(16).padStart(2,"0");
  for(let a=0;a<4;a++){const e=t*0.5+a*Math.PI/2,L=MAIN*0.2*(1-0.3*t);ctx.strokeStyle="rgba(255,250,220,"+(0.9*inv)+")";ctx.lineWidth=MAIN*0.007*inv+1;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(e)*L,cy+Math.sin(e)*L);ctx.stroke();}
  for(let a=0;a<4;a++){const e=t*0.5+Math.PI/4+a*Math.PI/2,L=MAIN*0.12*(1-0.3*t);ctx.strokeStyle="rgba(255,236,150,"+(0.7*inv)+")";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(e)*L,cy+Math.sin(e)*L);ctx.stroke();}
  for(let i=0;i<14;i++){const e=i*0.62,dist=MAIN*(0.04+i*0.009)*(0.5+t);ctx.fillStyle="rgba(255,230,160,"+(0.9*inv)+")";ctx.beginPath();ctx.arc(cx+Math.cos(e)*dist,cy+Math.sin(e)*dist,Math.max(1,MAIN*0.005*inv),0,7);ctx.fill();}
  ctx.strokeStyle=cA+hx(inv);ctx.lineWidth=MAIN*0.008;ctx.beginPath();ctx.arc(cx,cy-MAIN*0.012,MAIN*0.12,Math.PI*1.1,Math.PI*1.9);ctx.stroke();
  ctx.strokeStyle=cB+hx(inv);ctx.beginPath();ctx.arc(cx,cy+MAIN*0.012,MAIN*0.12,Math.PI*0.1,Math.PI*0.9);ctx.stroke();
  ctx.restore();}
function hudPortrait(cx,cy,r,f){const sig=FACTIONS[f].sig,col=FACTIONS[f].color;ctx.save();
  ctx.beginPath();ctx.arc(cx,cy,r,0,7);ctx.fillStyle="#0d131f";ctx.fill();

  if(mvp)html+="<br>이번 경기 명장 — "+RANKS[mvp.rank]+" <b>"+mvp.name+"</b> ("+FACTIONS[mvp.f].name+") "+mvp.wins+"승"+(careerOf(mvp)?" · 통산 "+careerOf(mvp)+"승":"");
  if(myPick>=0&&!predApplied){predApplied=true;predStats.g++;const hit=myPick===f;
    if(hit){predStats.w++;predStats.st++;if(predStats.st>predStats.best)predStats.best=predStats.st;}else predStats.st=0;savePred();
    html+='<br><span class="predline" style="color:'+(hit?"#ffd23a":"#8b97ad")+'">'+(hit?("예측 적중! "+(predStats.st>1?predStats.st+"연승 · ":"")):("예측 실패 — 내 픽 "+FACTIONS[myPick].name+" · "))+"통산 "+predStats.w+"/"+predStats.g+(predStats.best>1?" · 최고 "+predStats.best+"연승":"")+"</span>";}
  pickWrap.style.display="none";
  ovSum.innerHTML=html;ovSum.style.display="block";document.getElementById("ovStart").textContent="↻ 다시 보기";ov.querySelector(".btns").style.display="flex";document.getElementById("btnPlay").textContent="▶ 시작";ov.classList.remove("hidden");refresh();draw();}

function loop(t){
  if(!duel.active&&!siege.active&&!deathAnim&&deathQueue.length)deathAnim={f:deathQueue.shift(),start:performance.now(),dur:1300};
  if(deathAnim){if(performance.now()-deathAnim.start>=deathAnim.dur)deathAnim=null;else{draw();requestAnimationFrame(loop);lastT=0;return;}}
  if(siege.active||duel.active){draw();requestAnimationFrame(loop);lastT=0;return;}
  if(running){if(!lastT)lastT=t;acc+=(t-lastT)/1000*P.baseTPS*speed;lastT=t;let n=0;while(acc>=1&&n<30){step();acc--;n++;if(!running||duel.active||siege.active||deathQueue.length)break;}refresh();}
  else lastT=0;
  draw();requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function play(){if(winner>=0)return;running=true;ov.classList.add("hidden");lastT=0;document.getElementById("btnPlay").textContent="⏸ 정지";}
function pause(){running=false;document.getElementById("btnPlay").textContent="▶ 계속";}
document.getElementById("btnPlay").onclick=()=>{running?pause():play();};
document.getElementById("ovStart").onclick=()=>{if(winner>=0)init((Math.random()*1e9)>>>0);play();};
document.getElementById("ovSeed").onclick=()=>init((Math.random()*1e9)>>>0);
document.getElementById("btnReset").onclick=()=>{init(seed);document.getElementById("btnPlay").textContent="▶ 시작";};
document.getElementById("btnNew").onclick=()=>{init((Math.random()*1e9)>>>0);document.getElementById("btnPlay").textContent="▶ 시작";};
document.getElementById("btnPlaySeed").onclick=()=>{const v=parseInt(document.getElementById("seedIn").value,10);init(isNaN(v)?0:v);document.getElementById("btnPlay").textContent="▶ 시작";};
const sp=document.getElementById("speed");sp.oninput=()=>{speed=parseFloat(sp.value);document.getElementById("spVal").textContent=speed+"×";};

init((Math.random()*1e9)>>>0);
</script>
</body>
