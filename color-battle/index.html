<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<title>천하쟁패 — 6색 관전 시뮬레이션</title>
<style>
  :root{--bg:#0a0d13;--panel:#121824;--panel2:#0b0f18;--line:#232c3d;--text:#e8edf6;--dim:#8b97ad;--accent:#ffd23a}
  *{box-sizing:border-box} html,body{margin:0}
  body{background:radial-gradient(1200px 700px at 50% -10%, #16203180, transparent), var(--bg);color:var(--text);
    font-family:"Pretendard","Apple SD Gothic Neo","Segoe UI",system-ui,-apple-system,sans-serif;min-height:100vh;padding:16px 12px 40px}
  .wrap{max-width:1180px;margin:0 auto}
  header{margin:2px 2px 10px}
  .kicker{font-size:11px;letter-spacing:.26em;color:var(--dim);font-weight:800;text-transform:uppercase}
  h1{margin:3px 0 2px;font-size:clamp(24px,5vw,38px);font-weight:900;letter-spacing:-.02em}
  h1 .amp{color:var(--accent)}
  .sub{color:var(--dim);font-size:13px;margin:0}
  .power{margin:10px 2px 0}
  .power .lab{font-size:11px;letter-spacing:.14em;color:var(--dim);font-weight:800;text-transform:uppercase;margin-bottom:5px}
  .power .lab b{color:var(--text)}
  .powerbar{position:relative;display:flex;height:20px;border-radius:99px;overflow:hidden;background:#0d131f;border:1px solid var(--line)}
  .powerbar .seg{position:relative;height:100%;transition:width .3s ease;min-width:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .powerbar .seg .lab{font-size:11px;font-weight:700;color:#fff;white-space:nowrap;letter-spacing:-0.01em;font-variant-numeric:tabular-nums;text-shadow:0 1px 3px #000c;padding:0 5px;pointer-events:none}
  .stage{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;margin-top:12px}
  .left{flex:1 1 560px;min-width:320px;display:flex;flex-direction:column;gap:12px}
  .arena-box{position:relative;background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:8px}
  .canvas-stack{position:relative;width:100%;aspect-ratio:1/1}
  #main{position:absolute;inset:0;width:100%;height:100%;border-radius:8px;display:block;background:#070a10}
  .overlay{position:absolute;inset:0;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    background:radial-gradient(90% 70% at 50% 10%,#233a6452,transparent 62%),radial-gradient(130% 95% at 50% 108%,#3a2b0a3e,transparent 58%),rgba(5,7,11,.85);
    background-size:cover;background-position:center;background-repeat:no-repeat;backdrop-filter:blur(2px);gap:12px;padding:22px;z-index:6}
  .overlay.hidden{display:none}
  .overlay .big{font-size:clamp(20px,4vw,32px);font-weight:900}
  .overlay .who{font-size:12px;color:#d8b95c;letter-spacing:.34em;font-weight:800;text-transform:uppercase;text-shadow:0 1px 6px #000}
  .gametitle{display:inline-block;font-size:clamp(40px,10vw,60px);font-weight:900;letter-spacing:.045em;line-height:1.12;
    background:linear-gradient(180deg,#fff3c4 4%,#ffd23a 52%,#c98f12 96%);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 3px 14px rgba(255,210,58,.28)) drop-shadow(0 1px 2px rgba(0,0,0,.8))}
  .overlay .tagline{font-size:13.5px;color:#aab6cc;font-weight:600;letter-spacing:.02em;text-shadow:0 1px 4px #000}
  .fdots{display:flex;gap:9px;margin:2px 0 4px}
  .fdots i{width:13px;height:13px;border-radius:4px;box-shadow:0 0 11px 1.5px currentColor,inset 0 1px 0 #fff5}
  .overlay .btns{gap:10px}
  .overlay .btns button{font-size:16px;font-weight:800;padding:13px 26px;border-radius:13px;min-width:132px;letter-spacing:.02em;
    background:#141b2cd9;border:1px solid #34415e;box-shadow:0 4px 16px #0007}
  .overlay .btns button:hover{background:#1b2438}
  .overlay .btns button.primary{background:linear-gradient(180deg,#ffe08a,#ffd23a 58%,#e9b71e);color:#221a02;border:none;
    box-shadow:0 6px 24px rgba(255,210,58,.30),inset 0 1px 0 #fff9,inset 0 -2px 0 #b8860b55}
  .overlay .btns button.primary:hover{background:linear-gradient(180deg,#ffe9a5,#ffd94f 58%,#f0be24)}
  /* ===== 오프닝(타이틀) 전용 시네마틱 스타일 ===== */
  .wordmark,.ornament,.battleinfo{display:none}
  .overlay.titlescreen .battleinfo{display:block;font-variant-numeric:tabular-nums;line-height:1.5;margin-top:2px}
  .battleinfo .bi-terrain{font-size:12.5px;color:#bcc6da;font-weight:700;text-shadow:0 1px 4px #000}
  .battleinfo .bi-res{font-size:11.5px;color:#9aa6bd;font-weight:700;margin-top:2px}
  .battleinfo .bi-res .ic{vertical-align:-2px;margin:0 1px}
  .battleinfo .bi-seed{font-size:10px;color:#626e84;font-weight:700;letter-spacing:.04em;margin-top:3px}
  .overlay.titlescreen{overflow:hidden;background:
    radial-gradient(120% 82% at 50% -10%,#2a4a7e5e,transparent 60%),
    radial-gradient(150% 100% at 50% 114%,#4a350c5e,transparent 60%),
    linear-gradient(180deg,#0a1122 0%,#070a12 100%)}
  .overlay.titlescreen::before{content:"";position:absolute;inset:-45%;z-index:0;pointer-events:none;
    background:conic-gradient(from 0deg,transparent 0 76%,#ffd23a10 86%,#ffe9a51c 90%,transparent 96%);animation:sweep 16s linear infinite}
  .overlay.titlescreen::after{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;box-shadow:inset 0 0 90px 12px #0006}
  @keyframes sweep{to{transform:rotate(1turn)}}
  .overlay.titlescreen>*{position:relative;z-index:1}
  .overlay.titlescreen .who{color:#c9a94e}
  .overlay.titlescreen .gametitle{background:linear-gradient(110deg,#b9820f 0%,#ffd23a 32%,#fff6cf 48%,#ffd23a 64%,#b9820f 100%);
    background-size:220% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:foil 6.5s ease-in-out infinite}
  @keyframes foil{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  .overlay.titlescreen .wordmark{display:block;font-size:11px;letter-spacing:.5em;font-weight:800;color:#8390a8;text-transform:uppercase;margin:-2px 0 2px 6px}
  .overlay.titlescreen .ornament{display:block;position:relative;height:1px;width:158px;margin:12px 0 6px;
    background:linear-gradient(90deg,transparent,#c9a94e00 6%,#c9a94e99 50%,#c9a94e00 94%,transparent)}
  .overlay.titlescreen .ornament::before{content:"";position:absolute;left:50%;top:50%;width:7px;height:7px;background:#ffd23a;
    transform:translate(-50%,-50%) rotate(45deg);box-shadow:0 0 9px 1px #ffd23aaa}
  .fdots{display:flex;gap:12px;margin:2px 0}
  .fdots i{width:15px;height:21px;background:currentColor;border-radius:2px;
    clip-path:polygon(0 0,100% 0,100% 72%,50% 100%,0 72%);
    box-shadow:0 0 13px 1px currentColor,inset 0 1px 0 #fff7,inset 0 -4px 5px #0005;animation:sway 3.2s ease-in-out infinite}
  .fdots i:nth-child(even){animation-delay:.5s}
  .fdots i:nth-child(3n){animation-delay:.9s}
  @keyframes sway{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-2px) rotate(3deg)}}
  .overlay .summary{font-size:13.5px;color:#e2e8f4;line-height:1.75;max-width:88%;word-break:keep-all;overflow-wrap:break-word;text-shadow:0 1px 5px #000,0 0 3px #000c}
  .overlay .summary b{color:#fff}
  .banner{position:absolute;top:14px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:7px;padding:8px 15px;border-radius:999px;font-weight:900;font-size:14px;background:#0d1220ee;border:1px solid var(--line);opacity:0;pointer-events:none;box-shadow:0 8px 30px #0008;white-space:nowrap;z-index:7}
  .banner .dot{width:10px;height:10px;border-radius:3px;flex:none}
  .banner.show{animation:pop 2s ease forwards}
  @keyframes pop{0%{opacity:0;transform:translateX(-50%) translateY(-8px) scale(.9)}10%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}82%{opacity:1}100%{opacity:0}}
  .board{flex:0 0 300px;min-width:262px;display:flex;flex-direction:column;gap:12px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px}
  .panel h2{margin:0 0 8px;font-size:12px;letter-spacing:.16em;color:var(--dim);font-weight:800;text-transform:uppercase;display:flex;justify-content:space-between}
  .panel h2 .stat{color:var(--text);letter-spacing:0}
  .rows{display:flex;flex-direction:column;gap:6px}
  .row{display:grid;grid-template-columns:20px 1fr auto;align-items:center;gap:9px;padding:8px 8px;border-radius:9px;background:#0d131f;transition:opacity .2s}
  .row.leader{background:#17203180;box-shadow:inset 0 0 0 1px #ffffff14}
  .row.dead{opacity:.34}
  .rank{font-weight:800;color:var(--dim);font-size:13px;text-align:center}
  .id{display:flex;flex-direction:column;align-items:flex-start;gap:1px;min-width:0}
  .idtop{display:flex;align-items:center;gap:6px;min-width:0}
  .gen{font-size:10px;font-weight:800;color:var(--dim);white-space:nowrap;letter-spacing:.01em}
  .gen b{color:var(--accent)}
  .res{display:flex;align-items:center;gap:2px;font-size:10.5px;font-weight:800;color:#c3ccdb;font-variant-numeric:tabular-nums;margin-top:1px;white-space:nowrap}
  .res .ic{vertical-align:-1px;margin-left:3px}
  .res b{margin:0 2px 0 1px}
  .res b.z{opacity:.35;color:#7a8598}
  .res .ic:first-child{margin-left:0}
  body.cinema .gen{font-size:9px}
  body.cinema .res{font-size:9.5px;margin-top:0}
  .nm{font-weight:800;font-size:14px;white-space:nowrap}
  .buffs{display:inline-flex;flex-wrap:wrap;gap:3px;align-items:center}
  .bf{font-size:9.5px;font-weight:800;border-radius:5px;padding:1px 5px;white-space:nowrap;line-height:1.4}
  .bf.mor{color:#1a1400;background:var(--accent)}
  .bf.inv{color:#241a02;background:#ffe27a;box-shadow:0 0 7px #ffd23a}
  .ef{font-size:9px;font-weight:800;border-radius:4px;padding:0 4px;margin-left:4px;white-space:nowrap}
  .ef.atk{color:#ffd7d0;background:#5a1e1e}
  .ef.prd{color:#d6f5c9;background:#1f4a24}
  .ef.spd{color:#ffe9b0;background:#5a4410}
  .troop{font-variant-numeric:tabular-nums;font-weight:800;font-size:13px;color:var(--text);min-width:70px;text-align:right}
  .controls{display:flex;flex-direction:column;gap:10px}
  .btns{display:flex;gap:8px;flex-wrap:wrap}
  button{font-family:inherit;font-weight:800;font-size:14px;cursor:pointer;border:1px solid var(--line);background:#182234;color:var(--text);padding:9px 13px;border-radius:9px;transition:background .12s}
  button:hover{background:#1e2a40}
  button.primary{background:var(--accent);color:#1a1400;border-color:transparent}
  button.primary:hover{background:#ffdd5c}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .speed{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--dim);font-weight:700}
  .speed input{flex:1}
  .seedrow{display:flex;gap:8px;align-items:center;font-size:13px;color:var(--dim);font-weight:700}
  .seedrow input[type=text]{flex:1;min-width:0;font-family:inherit;font-weight:800;background:#0d131f;color:var(--text);border:1px solid var(--line);border-radius:8px;padding:8px 10px}
  .hint{color:var(--dim);font-size:12px;line-height:1.5;margin:2px 2px 0}
  img.ic{vertical-align:middle}
  @media (max-width:760px){.board{flex:1 1 100%}}

  /* ===== 녹화(쇼츠 시네마) 모드 — 세로 한 화면(스크롤 없음) 고정 배열 ===== */
  body.cinema{height:100dvh;overflow:hidden;padding:calc(env(safe-area-inset-top,0px) + 8px) 10px calc(env(safe-area-inset-bottom,0px) + 8px)}
  body.cinema .wrap{max-width:480px;height:100%;display:flex;flex-direction:column;gap:4px}
  body.cinema header{margin:0;text-align:center}
  body.cinema .kicker,body.cinema .sub{display:none}
  body.cinema h1{font-size:22px;margin:0}
  .cinesub{display:none;color:var(--dim);font-size:12.5px;font-weight:700;margin:3px 0 0;text-align:center}
  .cinesub b{color:var(--accent)}
  body.cinema .cinesub{display:block;font-size:11px;margin:1px 0 0}
  body.cinema .power{margin:0}
  body.cinema .power>.lab{display:none}
  body.cinema .powerbar{height:19px}
  body.cinema .stage{margin:0;gap:5px;flex:1 1 auto;min-height:0;display:flex;flex-direction:column;flex-wrap:nowrap;align-items:stretch}
  /* 보드(6행)를 먼저 확보 → 지도가 '남는 공간'을 채움 = 화면 높이와 무관하게 6행 항상 노출 */
  body.cinema .left{flex:1 1 auto;min-width:0;min-height:0;gap:5px;display:flex;flex-direction:column;justify-content:center}
  body.cinema .arena-box{flex:1 1 auto;min-height:0;padding:3px;display:flex;align-items:center;justify-content:center}
  body.cinema .canvas-stack{width:auto;height:100%;max-width:100%;max-height:100%;margin:0 auto}
  body.cinema .board{flex:0 0 auto;min-width:0;overflow:hidden}
  body.cinema .board .panel{padding:8px 10px;overflow:hidden;display:flex;flex-direction:column}
  body.cinema .board .panel h2{font-size:10.5px;margin-bottom:5px}
  body.cinema .board .rows{flex:0 0 auto}
  body.cinema .board .controls{display:none}  /* .board .panel 규칙보다 특이도·순서 우위로 확실히 숨김 */
  body.cinema .rows{gap:2px;overflow:hidden}
  body.cinema .row{padding:2px 8px}
  body.cinema .nm{font-size:12.5px}
  body.cinema .troop{font-size:11.5px;min-width:52px}
  body.cinema .gen{display:none}                 /* 명장 줄은 시네마에서 숨김(가로 한 줄 배치) */
  body.cinema .id{flex-direction:row;flex-wrap:wrap;align-items:center;gap:1px 8px}  /* 세로 쌓기 → 가로 한 줄로 */
  body.cinema .res{margin-top:0}
  body.cinema .bf{font-size:9px;padding:0 5px}
  body.cinema .ef{font-size:8.5px}
  .cine-exit{position:fixed;top:calc(env(safe-area-inset-top,0px) + 8px);left:8px;z-index:50;width:34px;height:34px;border-radius:99px;background:#0d1220cc;border:1px solid var(--line);color:var(--dim);font-size:15px;font-weight:800;display:none;align-items:center;justify-content:center;padding:0;transition:opacity .5s}
  body.cinema .cine-exit{display:flex}
  .cine-exit.faded{opacity:0;pointer-events:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Color Battle · MVP v9 · 관전 명료성</div>
    <h1>천하 <span class="amp">쟁패</span></h1>
    <p class="sub">한눈에 우열이 보이고, 왜 이기는지가 화면에 드러난다 — 자원을 모아 정복하고 수도를 함락해 흡수하라</p>
    <p class="cinesub">6개 세력, 하나의 천하 — <b>당신의 색</b>을 응원하세요</p>
  </header>

  <div class="power">
    <div class="lab" id="powerLab">국력 (지역 + 병력 + 자원)</div>
    <div class="powerbar" id="powerbar"></div>
  </div>

  <div class="stage">
    <div class="left">
      <div class="arena-box">
        <div class="canvas-stack">
          <canvas id="main" aria-label="지역 전투 지도"></canvas>
          <div id="banner" class="banner"></div>
          <div id="overlay" class="overlay">
            <div class="who">여섯 세력 · 하나의 천하</div>
            <div class="big" id="ovBig"><span class="gametitle">천하쟁패</span></div>
            <div class="wordmark" id="ovWord">Color&nbsp;·&nbsp;Battle</div>
            <div class="tagline" id="ovTag">수도가 무너지면 나라째 흡수 — 마지막 한 색이 천하를 통일합니다</div>
            <div class="battleinfo" id="ovBattle"></div>
            <div class="fdots" id="fdots"></div>
            <div class="ornament"></div>
            <div class="btns"><button class="primary" id="ovStart">관전 시작</button><button id="ovSeed">새 지도</button></div>
          </div>
        </div>
      </div>
    </div>
    <div class="board">
      <div class="panel">
        <h2>세력 <span class="stat" id="statLine">1년차</span></h2>
        <div class="rows" id="rows"></div>
      </div>
      <div class="panel controls">
        <div class="btns"><button class="primary" id="btnPlay">▶ 시작</button><button id="btnReset">↻ 다시</button><button id="btnNew">새 지도</button><button id="btnMute">소리 켜짐</button><button id="btnCinema">녹화 모드</button></div>
        <div class="speed"><span>속도</span><input type="range" id="speed" min="0.5" max="8" step="0.5" value="3"><span id="spVal" style="min-width:34px;text-align:right;color:var(--text)">3×</span></div>
        <div class="seedrow"><span>시드</span><input type="text" id="seedIn" inputmode="numeric" value="0"><button id="btnPlaySeed">재생</button></div>
        <p class="hint">같은 시드 = 같은 지도·같은 전개 명경기는 시드를 적어두면 그대로 재생된다</p>
      </div>
    </div>
  </div>
</div>
<button class="cine-exit faded" id="cineExit" aria-label="녹화 모드 종료">✕</button>
<script>
"use strict";
const FACTIONS=[
  {name:"화염단",color:"#ff5555",sig:"flame"},{name:"심해군",color:"#3aa0ff",sig:"wave"},
  {name:"뇌전대",color:"#ffcb33",sig:"bolt"},{name:"정글파",color:"#37d982",sig:"leaf"},
  {name:"보라단",color:"#b874ff",sig:"star"},{name:"벚꽃단",color:"#ff77bd",sig:"blossom"},
];
const K=FACTIONS.length, NEU=-1;
const RGB=FACTIONS.map(f=>[parseInt(f.color.slice(1,3),16),parseInt(f.color.slice(3,5),16),parseInt(f.color.slice(5,7),16)]);
const IRON=0,FOOD=1,GOLD=2, RES_KEY=["iron","food","gold"], NODE_NAME=["철광","농지","금광"];
const T_SEA=0,T_PLAIN=1,T_MTN=2,T_RIVER=3;
const MARCH_MUL=[0.42,1,0.8,0.6], ARRIVE_MUL=[0.62,1,0.95,0.85], PROD_MUL_T=[0.2,1,0.9,0.5];
const SUR=["강","진","사","율","백","단","호","연","적","한","서","목","위","도"];
const GIV=["무","천","랑","흔","결","진","호","월","강","렬","성","운","극","한","비","랑"];
// 명장 시스템 (P9 캐릭터 연속성) — 세력별 고정 로스터 3인 + 계급(전공에 따라 승급)
const RANKS=["교위","비장","아장","편장군","대장군"];
const RANK_WIN=[2,5,9,14]; // 누적 승수 문턱 → 다음 계급
const ROSTER_NAMES=[
  ["강호","준서","태오"],   // 화염단
  ["해준","민우","지호"],   // 심해군
  ["도현","시우","강토"],   // 뇌전대
  ["유찬","이든","하람"],   // 정글파
  ["보라","지아","별하"],   // 보라단
  ["하나","봄이","꽃님"],   // 벚꽃단
];

const MAPRES=300, MAIN=760, PROV=52;
const P={
  seaDeep:0.16, seaLevel:0.30, mtnLevel:0.70, resCount:9, warpAmp:8,
  prodBase:0.34, underdog:0.9, minToMove:12, sendFrac:0.6,
  marchSpeed:0.020, moveCdMin:16, moveCdMax:30,
  capGarrison:40, capDef:3.5, mtnDef:1.6,
  ironBonus:0.18, foodBonus:0.16, goldBonus:0.12,
  duelRounds:4,

function noiseField(octs){const h=new Float32Array(MAPRES*MAPRES);let amp=0;
  for(const[s,a]of octs){amp+=a;const g=new Float32Array((s+1)*(s+1));for(let i=0;i<g.length;i++)g[i]=rand();
    for(let y=0;y<MAPRES;y++)for(let x=0;x<MAPRES;x++){const fx=x/MAPRES*s,fy=y/MAPRES*s,x0=fx|0,y0=fy|0,tx=fx-x0,ty=fy-y0;
      const a00=g[y0*(s+1)+x0],a10=g[y0*(s+1)+x0+1],a01=g[(y0+1)*(s+1)+x0],a11=g[(y0+1)*(s+1)+x0+1];
      h[y*MAPRES+x]+=a*lerp(lerp(a00,a10,tx),lerp(a01,a11,tx),ty);}}
  let mn=1e9,mx=-1e9;for(let i=0;i<h.length;i++){h[i]/=amp;if(h[i]<mn)mn=h[i];if(h[i]>mx)mx=h[i];}
  for(let i=0;i<h.length;i++)h[i]=(h[i]-mn)/(mx-mn+1e-9);return h;}
function topoColor(h){

  if(h<P.seaLevel)return lerp3([40,80,120],[70,132,150],(h-P.seaDeep)/(P.seaLevel-P.seaDeep));
  if(h>P.mtnLevel)return lerp3([112,104,94],[206,206,210],(h-P.mtnLevel)/(1-P.mtnLevel));
  return lerp3([74,100,66],[132,126,88],(h-P.seaLevel)/(P.mtnLevel-P.seaLevel));}
function buildTerrainBase(){for(let y=0;y<MAPRES;y++)for(let x=0;x<MAPRES;x++){const i=y*MAPRES+x,h=H_FIELD[i];let c=topoColor(h);
  const band=(h*11)|0,bl=x>0?((H_FIELD[i-1]*11)|0):band,bu=y>0?((H_FIELD[i-MAPRES]*11)|0):band;
  if(band!==bl||band!==bu)c=[c[0]*0.84,c[1]*0.84,c[2]*0.84];terrainRGB[i*3]=c[0];terrainRGB[i*3+1]=c[1];terrainRGB[i*3+2]=c[2];}}

    let bp=0,bd=1e18;for(let p=0;p<PROV;p++){const dx=px-sx[p],dy=py-sy[p],d=dx*dx+dy*dy;if(d<bd){bd=d;bp=p;}}provOf[y*MAPRES+x]=bp;}};
  for(let relax=0;relax<2;relax++){assign(false);const cxx=new Float64Array(PROV),cyy=new Float64Array(PROV),cc=new Int32Array(PROV);
    for(let y=0;y<MAPRES;y++)for(let x=0;x<MAPRES;x++){const p=provOf[y*MAPRES+x];cxx[p]+=x;cyy[p]+=y;cc[p]++;}
    for(let p=0;p<PROV;p++)if(cc[p]>0){sx[p]=cxx[p]/cc[p];sy[p]=cyy[p]/cc[p];}}

function dist(a,b){const dx=a.cx-b.cx,dy=a.cy-b.cy;return Math.sqrt(dx*dx+dy*dy);}

function init(sv){

  const avgA=(MAPRES*MAPRES)/PROV;

  if(capPool.length<K)capPool=dry.filter(p=>p.count>=avgA*0.4&&landNeighborCount(p)>=1);  // 후보 부족 시 완화
  if(capPool.length<K)capPool=dry.length>=K?dry:pv.filter(p=>!isWater(p.terrain));         // 최후 폴백
  const caps=[];let pool=capPool.slice();caps.push(pool[(rand()*pool.length)|0]);

function provinces(f){return pv.filter(p=>p.owner===f);}
function computeBonus(){const cnt=Array.from({length:K},()=>[0,0,0]);for(const p of pv)if(p.owner>=0&&p.res>=0)cnt[p.owner][p.res]++;
  for(let f=0;f<K;f++){attackMul[f]=1+P.ironBonus*cnt[f][IRON];prodMul[f]=1+P.foodBonus*cnt[f][FOOD];speedMul[f]=1+P.goldBonus*cnt[f][GOLD];}return cnt;}

function step(){
  let leaderProv=1;const provCnt=new Int32Array(K);for(const p of pv)if(p.owner>=0)provCnt[p.owner]++;
  for(let f=0;f<K;f++)if(alive[f]&&provCnt[f]>leaderProv)leaderProv=provCnt[f];
  for(let f=0;f<K;f++)if(moraleLeft[f]>0&&--moraleLeft[f]<=0)moraleMul[f]=1;
  for(let f=0;f<K;f++)if(reviveTurns[f]>0&&--reviveTurns[f]===0)banner(FACTIONS[f].name+"의 불사가 스러진다",FACTIONS[f].color); // 무적 만료
  for(const p of pv){if(p.owner<0||!alive[p.owner])continue;const f=p.owner;const rb=1+P.underdog*(1-provCnt[f]/leaderProv);
    p.garrison+=P.prodBase*prodMul[f]*rb*PROD_MUL_T[p.terrain]*(p.res===FOOD?1.6:1)*(p.cap?1.5:1);}
  for(const p of pv){
    if(p.owner<0||!alive[p.owner])continue;if(p.moveCd>0){p.moveCd--;continue;}if(p.garrison<P.minToMove)continue;
    const f=p.owner;let best=null,bs=-1e9;
    for(const qid of p.adj){const q=pv[qid];let s;
      if(q.owner!==f){const defE=q.garrison*terrDef(q),send=p.garrison*P.sendFrac*ARRIVE_MUL[q.terrain];
        s=1+(q.res>=0?3:0)+clamp((send-defE)/8,-2.5,3)+(q.owner===NEU?0.6:0)+(q.cap?1.5:0);
        if(q.terrain===T_SEA)s-=1.6;else if(q.terrain===T_RIVER)s-=0.7;}
      else{let fr=false;for(const rid of q.adj){if(pv[rid].owner!==f){fr=true;break;}}s=fr?(0.4+clamp((20-q.garrison)/20,0,0.8)):-5;}

  for(let m=marches.length-1;m>=0;m--){const mv=marches[m];mv.prog+=P.marchSpeed*speedMul[mv.f]*MARCH_MUL[pv[mv.to].terrain];if(mv.prog>=1){marches.splice(m,1);arrive(mv);}}
  for(const p of pv)if(p.flash>0)p.flash--;
  tick++;

  let living=0,last=-1;for(let f=0;f<K;f++)if(alive[f]){living++;last=f;}
  if(living<=1||tick>=P.maxTicks){let w=last,wc=-1;for(let f=0;f<K;f++){const n=provinces(f).length;if(n>wc){wc=n;w=f;}}winner=w;running=false;pendingWin=true;}
}
function arrive(mv){const q=pv[mv.to],f=mv.f;if(!alive[f])return; // 멸망 세력 부대는 도착해도 무효(와해)
  const raw=mv.troops;let troops=raw*ARRIVE_MUL[q.terrain];
  if(isWater(q.terrain)&&raw-troops>=1)float(q.cx,q.cy-2,"-"+Math.round(raw-troops)+" 도하",FACTIONS[f].color);
  if(q.owner===f){q.garrison+=troops;return;}
  // 수도 공격이라도 (1) 성벽에 실질 위협이고 (2) 최근 공성전 쿨다운이 지났을 때만 공성전 연출.
  // 약한 견제나 쿨다운 중이면 조용히 일반 전투로 처리 → 공성전 남발 방지(P5 리듬·P8 희소성)
  if(q.cap&&q.owner>=0&&reviveTurns[q.owner]<=0){                        // 무적 세력 수도는 공성전 없이 격퇴

    if(troops>wallMax){lastSiegeTick=tick;startSiege(f,q.owner,q,troops);return;}   // 함락급 공격 → 쿨다운 무시, 무조건 공성전→일기토(멸망 직전 필수 연출)
    if(troops>=wallMax*P.siegeMinThreat&&tick-lastSiegeTick>=P.siegeCdTicks){lastSiegeTick=tick;startSiege(f,q.owner,q,troops);return;} // 함락 못 시키는 위협 → 쿨다운 지났을 때만 연출
    battle(f,q,troops);return;                                            // 약한 견제 → 조용히 격퇴
  }
  battle(f,q,troops);}
// 근거 있는 저항의 불씨일 때만 천운 발동(자원지를 아직 지키거나 사기가 높음) — 순수 랜덤 회피(P2)

  banner(reason+"  "+FACTIONS[fA].name+" "+RANKS[chA.rank]+" "+chA.name+" vs "+FACTIONS[fB].name+" "+RANKS[chB.rank]+" "+chB.name,"#ffd23a");}

  else d.q.garrison+=d.troops*0.2;

const rowsEl=document.getElementById("rows"),rowRef=[];
for(let f=0;f<K;f++){const r=document.createElement("div");r.className="row";
  r.innerHTML='<div class="rank"></div><div class="id"><div class="idtop">'+ic(FACTIONS[f].sig,FACTIONS[f].color,16)+'<span class="nm">'+FACTIONS[f].name+'</span><span class="buffs"></span></div><span class="gen"></span><span class="res"></span></div><div class="troop"></div>';
  rowsEl.appendChild(r);rowRef.push({root:r,rank:r.querySelector(".rank"),troop:r.querySelector(".troop"),buffs:r.querySelector(".buffs"),gen:r.querySelector(".gen"),res:r.querySelector(".res")});}
// 상태 버프(사기·불사) — 이름 옆 배지
function buffChips(f){let s="";if(moraleLeft[f]>0)s+='<b class="bf mor">사기</b>';if(reviveTurns[f]>0)s+='<b class="bf inv">불사</b>';return s;}
// 자원 보유 + 그에 따른 버프(공격·생산·행군 배수) — 한 줄에 함께 노출
function resStrip(f,c){const cell=(k,col,n)=>ic(k,col,11)+'<b'+(n?'':' class="z"')+'>'+n+'</b>';
  let eff="";if(attackMul[f]>1.001)eff+='<b class="ef atk">공×'+attackMul[f].toFixed(1)+'</b>';if(prodMul[f]>1.001)eff+='<b class="ef prd">생×'+prodMul[f].toFixed(1)+'</b>';if(speedMul[f]>1.001)eff+='<b class="ef spd">행×'+speedMul[f].toFixed(1)+'</b>';
  return cell("iron","#cdd6e3",c[0])+cell("food","#8fd6a0",c[1])+cell("gold","#ffd23a",c[2])+eff;}
const pbar=document.getElementById("powerbar"),segs=[];for(let f=0;f<K;f++){const s=document.createElement("div");s.className="seg";s.style.background=FACTIONS[f].color;s.innerHTML='<span class="lab"></span>';pbar.appendChild(s);segs.push({seg:s,lab:s.querySelector(".lab")});}
function fmt(n){n=Math.round(n);return n>=1000?(n/1000).toFixed(1)+"k":""+n;}
function troopSum(f){let s=0;for(const p of pv)if(p.owner===f)s+=p.garrison;return s;}
function refresh(){const cnt=computeBonus();let tot=0;const pw=new Float64Array(K),pc=new Int32Array(K);
  for(const p of pv)if(p.owner>=0)pc[p.owner]++;
  for(let f=0;f<K;f++){pw[f]=alive[f]?pc[f]*4+troopSum(f)*0.03+(cnt[f][0]+cnt[f][1]+cnt[f][2])*3:0;if(pw[f]>0)tot+=pw[f];}
  tot=Math.max(1,tot);
  // 선두
  let lead=-1,lc=-1;for(let f=0;f<K;f++)if(alive[f]&&pc[f]>lc){lc=pc[f];lead=f;}leaderF=lead<0?0:lead;
  const ord=[...Array(K).keys()].sort((a,b)=>pc[b]-pc[a]);
  ord.forEach(f=>{const sw=segs[f],pctW=pw[f]/tot*100;sw.seg.style.width=pctW+"%";sw.seg.style.order=alive[f]?0:1;sw.lab.textContent=(alive[f]&&pctW>=9)?(FACTIONS[f].name+" "+pc[f]):"";});
  document.getElementById("powerLab").innerHTML="국력 (지역 + 병력 + 자원) · 선두 <b>"+(lead>=0?FACTIONS[lead].name:"-")+"</b>";
  ord.forEach((f,rank)=>{const R=rowRef[f];R.root.style.order=alive[f]?rank:100+rank;R.root.classList.toggle("dead",!alive[f]);R.root.classList.toggle("leader",alive[f]&&f===lead);R.rank.textContent=alive[f]?rank+1:"–";R.troop.textContent=alive[f]?(pc[f]+"지역·"+fmt(troopSum(f))):"멸망";R.buffs.innerHTML=alive[f]?buffChips(f):"";
    if(roster.length){const ch=championOf(f);R.gen.innerHTML="명장 <b>"+RANKS[ch.rank]+" "+ch.name+"</b>"+(ch.wins?" · "+ch.wins+"승":"");}
    R.res.innerHTML=alive[f]?resStrip(f,cnt[f]):"";});
  let a=0;for(let f=0;f<K;f++)if(alive[f])a++;document.getElementById("statLine").textContent=(1+((tick/50)|0))+"년차 · 생존 "+a;}

const ov=document.getElementById("overlay"),ovBig=document.getElementById("ovBig");
const ovTag=document.getElementById("ovTag"),fdots=document.getElementById("fdots"),ovBattle=document.getElementById("ovBattle");
function ro(w){const c=w.charCodeAt(w.length-1);if(c<0xAC00||c>0xD7A3)return w+"로";const b=(c-0xAC00)%28;return w+((b===0||b===8)?"로":"으로");}
// '오늘의 전장' — 실제 지도에서 계산한 사실만 정성 문장으로(거짓 없음) + 자원지 종류별 총량(아이콘)
function updateBattleInfo(){const C=MAPRES/2,t=MAPRES*0.13;let mt=[],se=[],rv=0,ri=0,rf=0,rg=0;
  for(const p of pv){if(p.terrain===T_MTN)mt.push(p);else if(p.terrain===T_SEA)se.push(p);else if(p.terrain===T_RIVER)rv++;
    if(p.res===IRON)ri++;else if(p.res===FOOD)rf++;else if(p.res===GOLD)rg++;}
  const dirOf=list=>{let sx=0,sy=0;for(const p of list){sx+=p.cx;sy+=p.cy;}sx/=list.length;sy/=list.length;
    const ns=sy<C-t?"북":sy>C+t?"남":"",ew=sx<C-t?"서":sx>C+t?"동":"";return (ns+ew)||"중앙";};
  const locM=d=>d==="중앙"?"중앙에":d+"쪽에";
  const M=mt.length>=3,Se=se.length>=2;let terr;
  if(M&&Se)terr="지형: "+locM(dirOf(mt))+" 산맥이 솟고, "+ro(dirOf(se))+" 바다가 트임";
  else if(mt.length>=6)terr="지형: "+locM(dirOf(mt))+" 험준한 산맥이 뻗은 전장";
  else if(M)terr="지형: "+locM(dirOf(mt))+" 산맥이 솟은 전장";
  else if(Se)terr="지형: "+ro(dirOf(se))+" 바다가 넓게 트인 전장";
  else if(rv>=5)terr="지형: 강줄기가 곳곳을 가르는 평야";
  else terr="지형: 드넓은 평야가 이어진 전장";
  const res="자원: "+NODE_NAME[0]+" "+ic("iron","#cdd6e3",12)+" "+ri+" · "+NODE_NAME[1]+" "+ic("food","#8fd6a0",12)+" "+rf+" · "+NODE_NAME[2]+" "+ic("gold","#ffd23a",12)+" "+rg;
  ovBattle.innerHTML='<div class="bi-terrain">'+terr+'</div><div class="bi-res">'+res+'</div><div class="bi-seed">시드 '+seed+'</div>';}
FACTIONS.forEach(fa=>{const i=document.createElement("i");i.style.background=fa.color;i.style.color=fa.color;fdots.appendChild(i);});
// 오프닝 배경 아트 — assets/ui/title.jpg 가 있으면 시작 화면 배경으로 사용(없으면 CSS 그라디언트)
const titleImg=new Image();let titleReady=false;titleImg.onload=()=>{titleReady=titleImg.naturalWidth>0;if(titleReady&&winner<0)applyTitleBg();};titleImg.src="assets/ui/title.jpg";
// 엔딩 일러스트 6장 사전 로드 + 디코드 — 승리 순간 배경이 늦게 뜨는 지연 제거
const endingPre=FACTIONS.map(fa=>{const i=new Image();i.src="assets/ending/"+fa.sig+".jpg";if(i.decode)i.decode().catch(()=>{});return i;});
function applyTitleBg(){if(titleReady){ov.style.backgroundImage="linear-gradient(rgba(6,9,15,.14),rgba(6,9,15,.20) 45%,rgba(6,9,15,.52)),url('assets/ui/title.jpg')";ov.style.backgroundSize="cover";ov.style.backgroundPosition="center";}
  else{ov.style.backgroundImage="";ov.style.backgroundSize="";ov.style.backgroundPosition="";}}
const ovSum=document.createElement("div");ovSum.className="summary";ovSum.id="ovSummary";ovSum.style.display="none";ovBig.after(ovSum);
function win(){const f=winner;padStop();bgmEndingPlay();Sfx.victory();
  ov.style.backgroundImage="linear-gradient(rgba(6,8,13,.42),rgba(6,8,13,.86)), url('assets/ending/"+FACTIONS[f].sig+".jpg')";ov.style.backgroundSize="cover";ov.style.backgroundPosition="center";
  ovTag.style.display="none";fdots.style.display="none";ov.classList.remove("titlescreen");
  ov.querySelector(".who").textContent="천하통일";ovBig.innerHTML='<span style="color:'+FACTIONS[f].color+'">'+FACTIONS[f].name+"</span> 천하 통일";
  const cnt=computeBonus()[f],lastFall=stats.capFalls.length?stats.capFalls[stats.capFalls.length-1]:null;
  let html="<b>"+(1+((tick/50)|0))+"년</b> 만에 천하 통일 · 일기토 <b>"+stats.duels+"회</b> · 정복한 수도 <b>"+stats.capFalls.length+"</b>곳<br>"+FACTIONS[f].name+" 보유 자원 — "+NODE_NAME[0]+" "+cnt[0]+" · "+NODE_NAME[1]+" "+cnt[1]+" · "+NODE_NAME[2]+" "+cnt[2];
  if(lastFall)html+="<br>최후의 함락 — "+FACTIONS[lastFall.loser].name+" 수도";
  let mvp=null;for(const r of roster)for(const g of r)if(g.wins>0&&(!mvp||g.wins>mvp.wins||(g.wins===mvp.wins&&careerOf(g)>careerOf(mvp))))mvp=g;
  if(mvp)html+="<br>이번 경기 명장 — "+RANKS[mvp.rank]+" <b>"+mvp.name+"</b> ("+FACTIONS[mvp.f].name+") "+mvp.wins+"승"+(careerOf(mvp)?" · 통산 "+careerOf(mvp)+"승":"");
  ovSum.innerHTML=html;ovSum.style.display="block";document.getElementById("ovStart").textContent="↻ 다시 보기";ov.querySelector(".btns").style.display="flex";document.getElementById("btnPlay").textContent="▶ 시작";ov.classList.remove("hidden");refresh();draw();}

function loop(t){
  if(intro){if(performance.now()-intro.start>=intro.dur){intro=null;running=true;lastT=0;}else{draw();requestAnimationFrame(loop);lastT=0;return;}}
  if(reviveAnim){if(performance.now()-reviveAnim.start>=reviveAnim.dur)reviveAnim=null;else{draw();requestAnimationFrame(loop);lastT=0;return;}}
  if(!duel.active&&!siege.active&&!deathAnim&&!reviveAnim&&deathQueue.length){deathAnim={f:deathQueue.shift(),start:performance.now(),dur:1300};Sfx.death();}
  if(deathAnim){if(performance.now()-deathAnim.start>=deathAnim.dur)deathAnim=null;else{draw();requestAnimationFrame(loop);lastT=0;return;}}
  if(pendingWin&&!deathAnim&&!reviveAnim&&!deathQueue.length&&!siege.active&&!duel.active){pendingWin=false;win();draw();requestAnimationFrame(loop);lastT=0;return;}
  if(siege.active||duel.active){draw();requestAnimationFrame(loop);lastT=0;return;}
  if(running){if(!lastT)lastT=t;acc+=(t-lastT)/1000*P.baseTPS*speed*dynMul();lastT=t;let n=0;while(acc>=1&&n<30){step();acc--;n++;if(!running||duel.active||siege.active||deathQueue.length||reviveAnim)break;}refresh();}
  else lastT=0;
  draw();requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function play(){if(winner>=0)return;ov.classList.add("hidden");lastT=0;document.getElementById("btnPlay").textContent="⏸ 정지";sndResume();bgmPrime();padStart();
  if(tick===0&&!intro){ // 시작 시네마틱: 줌아웃→지형·자원→국경→성·자원 '쿵' 낙하 (P8·P5)
    const caps=pv.filter(p=>p.cap).map(p=>({f:p.owner,x:p.cx*S,y:p.cy*S})).sort((a,b)=>a.x-b.x);
    caps.forEach((c,i)=>{c.start=2100+i*150;c.dur=680;c.land=c.start+c.dur;});
    intro={start:performance.now(),dur:(caps.length?caps[caps.length-1].land+340:3200),caps,snd:new Set()};running=false;Sfx.siegeStart();}
  else running=true;}
function pause(){running=false;document.getElementById("btnPlay").textContent="▶ 계속";padStop();bgmStop();}
document.getElementById("btnPlay").onclick=()=>{running?pause():play();};
document.getElementById("ovStart").onclick=()=>{if(winner>=0)init((Math.random()*1e9)>>>0);play();};
document.getElementById("ovSeed").onclick=()=>init((Math.random()*1e9)>>>0);
document.getElementById("btnReset").onclick=()=>{init(seed);document.getElementById("btnPlay").textContent="▶ 시작";};
document.getElementById("btnNew").onclick=()=>{init((Math.random()*1e9)>>>0);document.getElementById("btnPlay").textContent="▶ 시작";};
document.getElementById("btnPlaySeed").onclick=()=>{const v=parseInt(document.getElementById("seedIn").value,10);init(isNaN(v)?0:v);document.getElementById("btnPlay").textContent="▶ 시작";};
const sp=document.getElementById("speed");sp.oninput=()=>{speed=parseFloat(sp.value);document.getElementById("spVal").textContent=speed+"×";};

// ===== 녹화(쇼츠 시네마) 모드 — 세로 한 화면 배열 + 개발 UI 숨김 =====
// 진입 시 속도 5×(쇼츠 페이싱; 공성전·일기토·멸망·엔딩 연출은 원래 실시간이라 그대로 극적),
// 종료 시 이전 속도 복원. 종료(✕) 버튼은 3.5초 후 투명해져 녹화 화면에 안 남음 — 제목을 탭하면 다시 나타남.
const btnCinema=document.getElementById("btnCinema"),cineExit=document.getElementById("cineExit");
let cinePrevSpeed=null,cineTimer=null;
function cineShowExit(){cineExit.classList.remove("faded");clearTimeout(cineTimer);cineTimer=setTimeout(()=>cineExit.classList.add("faded"),3500);}
function setCinema(on){document.body.classList.toggle("cinema",on);
  if(on){cinePrevSpeed=speed;sp.value=5;sp.dispatchEvent(new Event("input"));window.scrollTo(0,0);cineShowExit();}
  else{clearTimeout(cineTimer);cineExit.classList.add("faded");if(cinePrevSpeed!=null){sp.value=cinePrevSpeed;sp.dispatchEvent(new Event("input"));cinePrevSpeed=null;}}}
btnCinema.onclick=()=>setCinema(true);
cineExit.onclick=()=>setCinema(false);
document.querySelector("header").addEventListener("click",()=>{if(document.body.classList.contains("cinema"))cineShowExit();});
// 모바일 세로 화면은 처음부터 녹화 배열로 시작 — 한 화면에 전부 수납 (✕로 전체 UI 전환 가능)
if(matchMedia("(max-width:740px) and (orientation:portrait)").matches)setCinema(true);
const btnMute=document.getElementById("btnMute");btnMute.textContent=SND.muted?"소리 꺼짐":"소리 켜짐";
btnMute.onclick=()=>{sndResume();sndMute(!SND.muted);btnMute.textContent=SND.muted?"소리 꺼짐":"소리 켜짐";if(!SND.muted&&running)padStart();else padStop();};

init((Math.random()*1e9)>>>0);
</script>
</body>
