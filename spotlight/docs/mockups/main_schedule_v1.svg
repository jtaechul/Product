<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1280" viewBox="0 0 720 1280" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="charBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8f3ea"/>
      <stop offset="1" stop-color="#fdfbf7"/>
    </linearGradient>
    <linearGradient id="coralBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff9d8e"/>
      <stop offset="1" stop-color="#ff7a68"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 화면 배경 -->
  <rect x="0" y="0" width="720" height="1280" fill="#fdfbf7"/>

  <!-- ===== 상단 상태바 ===== -->
  <rect x="0" y="0" width="720" height="120" fill="#1e2a4a"/>
  <text x="28" y="50" fill="#ffffff" font-size="30" font-weight="700">고1 · 5월</text>
  <text x="28" y="95" fill="#ffd7cf" font-size="26">❤️ 70</text>
  <text x="150" y="95" fill="#bfe9ff" font-size="26">🧠 65</text>
  <text x="280" y="50" fill="#ffffff" font-size="26" text-anchor="end" transform="translate(690,0)">👥 팬 1,240</text>
  <text x="690" y="95" fill="#f5c451" font-size="26" text-anchor="end">💰 18만   💛 34</text>

  <!-- ===== 캐릭터 영역 ===== -->
  <rect x="0" y="120" width="720" height="520" fill="url(#charBg)"/>

  <!-- 주인공 (브라운 버전, 벡터 시안) -->
  <g transform="translate(360,400)">
    <!-- 뒷머리 -->
    <path d="M-120,-70 C-150,40 -130,180 -90,220 C-70,120 -70,40 -60,-20 Z" fill="#6f4326"/>
    <path d="M120,-70 C150,40 130,180 90,220 C70,120 70,40 60,-20 Z" fill="#6f4326"/>
    <!-- 교복 상의(블레이저) -->
    <path d="M-95,120 C-90,60 -55,40 0,40 C55,40 90,60 95,120 L110,250 L-110,250 Z" fill="#26365c"/>
    <!-- 흰 셔츠 V -->
    <path d="M-26,48 L0,120 L26,48 L18,42 L-18,42 Z" fill="#ffffff"/>
    <!-- 파란 리본 타이 -->
    <path d="M0,70 L-28,58 L-20,90 Z" fill="#3f7fd6"/>
    <path d="M0,70 L28,58 L20,90 Z" fill="#3f7fd6"/>
    <circle cx="0" cy="70" r="8" fill="#2f63ab"/>
    <!-- 하늘색 체크 스커트 -->
    <path d="M-110,250 L110,250 L150,360 L-150,360 Z" fill="#bcd6f2"/>
    <path d="M-60,250 L-50,360 M0,250 L0,360 M60,250 L50,360" stroke="#9bbfe6" stroke-width="6"/>
    <!-- 다리 + 네이비 양말 -->
    <rect x="-58" y="360" width="34" height="120" rx="14" fill="#2a3a5e"/>
    <rect x="24" y="360" width="34" height="120" rx="14" fill="#2a3a5e"/>
    <!-- 목 -->
    <rect x="-18" y="6" width="36" height="44" rx="14" fill="#ffd9c4"/>
    <!-- 얼굴 -->
    <ellipse cx="0" cy="-40" rx="74" ry="80" fill="#ffe3d2"/>
    <!-- 앞머리 -->
    <path d="M-78,-44 C-86,-120 -10,-140 0,-140 C12,-140 86,-120 78,-44 C60,-78 30,-86 0,-84 C-28,-86 -58,-78 -78,-44 Z" fill="#7a4a2b"/>
    <path d="M-78,-44 C-70,-72 -50,-84 -34,-86 C-44,-60 -52,-40 -52,-20 C-66,-26 -76,-34 -78,-44 Z" fill="#7a4a2b"/>
    <path d="M78,-44 C70,-72 50,-84 34,-86 C44,-60 52,-40 52,-20 C66,-26 76,-34 78,-44 Z" fill="#7a4a2b"/>
    <!-- 파란 꽃 머리장식 -->
    <g transform="translate(-62,-64)">
      <circle r="9" cx="0" cy="-10" fill="#4f9be6"/>
      <circle r="9" cx="9" cy="-3" fill="#4f9be6"/>
      <circle r="9" cx="6" cy="9" fill="#4f9be6"/>
      <circle r="9" cx="-6" cy="9" fill="#4f9be6"/>
      <circle r="9" cx="-9" cy="-3" fill="#4f9be6"/>
      <circle r="6" cx="0" cy="0" fill="#ffd96a"/>
    </g>
    <!-- 눈 (갈색) -->
    <ellipse cx="-28" cy="-38" rx="11" ry="15" fill="#5a3a22"/>
    <ellipse cx="28" cy="-38" rx="11" ry="15" fill="#5a3a22"/>
    <circle cx="-24" cy="-43" r="4" fill="#fff"/>
    <circle cx="32" cy="-43" r="4" fill="#fff"/>
    <!-- 볼터치 + 미소 -->
    <ellipse cx="-44" cy="-16" rx="10" ry="6" fill="#ffb3a0" opacity="0.7"/>
    <ellipse cx="44" cy="-16" rx="10" ry="6" fill="#ffb3a0" opacity="0.7"/>
    <path d="M-14,-8 Q0,4 14,-8" stroke="#9a5a45" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ===== 매니저 말풍선 ===== -->
  <g filter="url(#soft)">
    <rect x="28" y="556" width="664" height="74" rx="18" fill="#ffffff"/>
  </g>
  <text x="50" y="586" font-size="24">🎧</text>
  <text x="88" y="586" fill="#1e2a4a" font-size="24" font-weight="700">한지원</text>
  <text x="50" y="616" fill="#444" font-size="23">"이번 달 웹드라마 제안이 들어왔어. 어떻게 할래?"</text>

  <!-- ===== 활동 섹션 ===== -->
  <text x="28" y="688" fill="#1e2a4a" font-size="28" font-weight="700">이번 달 활동 ②</text>
  <text x="692" y="688" fill="#888" font-size="22" text-anchor="end">선택: 연기 · 출연</text>

  <!-- 활동 카드 그리드 3x2 -->
  <g>
    <!-- row1 -->
    <g filter="url(#soft)"><rect x="28" y="710" width="208" height="118" rx="20" fill="#ffffff" stroke="#ff7a68" stroke-width="4"/></g>
    <text x="132" y="772" font-size="44" text-anchor="middle">🎬</text>
    <text x="132" y="808" font-size="24" text-anchor="middle" fill="#2a2a33" font-weight="700">연기 학원</text>

    <g filter="url(#soft)"><rect x="256" y="710" width="208" height="118" rx="20" fill="#ffffff"/></g>
    <text x="360" y="772" font-size="44" text-anchor="middle">📖</text>
    <text x="360" y="808" font-size="24" text-anchor="middle" fill="#2a2a33">독서실</text>

    <g filter="url(#soft)"><rect x="484" y="710" width="208" height="118" rx="20" fill="#ffffff"/></g>
    <text x="588" y="772" font-size="44" text-anchor="middle">🤲</text>
    <text x="588" y="808" font-size="24" text-anchor="middle" fill="#2a2a33">봉사활동</text>

    <!-- row2 -->
    <g filter="url(#soft)"><rect x="28" y="844" width="208" height="118" rx="20" fill="#ffffff"/></g>
    <text x="132" y="906" font-size="44" text-anchor="middle">🏋️</text>
    <text x="132" y="942" font-size="24" text-anchor="middle" fill="#2a2a33">헬스·PT</text>

    <g filter="url(#soft)"><rect x="256" y="844" width="208" height="118" rx="20" fill="#ffffff"/></g>
    <text x="360" y="906" font-size="44" text-anchor="middle">☕</text>
    <text x="360" y="942" font-size="24" text-anchor="middle" fill="#2a2a33">휴식</text>

    <g filter="url(#soft)"><rect x="484" y="844" width="208" height="118" rx="20" fill="#ffffff"/></g>
    <text x="588" y="906" font-size="44" text-anchor="middle">👨‍👩‍👧</text>
    <text x="588" y="942" font-size="24" text-anchor="middle" fill="#2a2a33">가족과 시간</text>
  </g>

  <!-- 출연 제안 강조 카드 -->
  <g filter="url(#soft)"><rect x="28" y="978" width="664" height="96" rx="20" fill="#fff3e0" stroke="#f5c451" stroke-width="4"/></g>
  <text x="56" y="1038" font-size="44">🎥</text>
  <text x="112" y="1024" fill="#b8761a" font-size="22" font-weight="700">출연 제안</text>
  <text x="112" y="1054" fill="#2a2a33" font-size="26" font-weight="700">웹드라마 「첫사랑의 온도」 단역</text>
  <text x="664" y="1034" fill="#ff7a68" font-size="26" text-anchor="end" font-weight="700">▶</text>

  <!-- ===== 하단 '다음 달' 버튼 (엄지존) ===== -->
  <g filter="url(#soft)">
    <rect x="28" y="1096" width="664" height="92" rx="24" fill="url(#coralBtn)"/>
  </g>
  <text x="360" y="1154" fill="#ffffff" font-size="36" font-weight="700" text-anchor="middle">▶  다음 달</text>

  <!-- ===== 하단 탭바 ===== -->
  <rect x="0" y="1200" width="720" height="80" fill="#ffffff"/>
  <line x1="0" y1="1200" x2="720" y2="1200" stroke="#eee" stroke-width="2"/>
  <g fill="#1e2a4a" font-size="22" text-anchor="middle">
    <text x="72" y="1230">📊</text><text x="72" y="1262">스탯</text>
    <text x="216" y="1230">🎞️</text><text x="216" y="1262">필모</text>
    <text x="360" y="1230">🛍️</text><text x="360" y="1262">상점</text>
    <text x="504" y="1230">🤝</text><text x="504" y="1262">인연</text>
    <text x="648" y="1230">⚙️</text><text x="648" y="1262">설정</text>
  </g>
</svg>
