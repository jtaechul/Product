<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1e2a4a" />
  <title>SPOTLIGHT</title>
  <style>
    html, body { margin: 0; height: 100%; background: #1e2a4a; overflow: hidden; }
    #game { position: fixed; inset: 0; }
    #game canvas { display: block; touch-action: none; }
    /* 로딩 표시 */
    #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
               color: #fdfbf7; font-family: sans-serif; font-size: 18px; }
  </style>
  <!-- PixiJS를 빌드 없이 로컬 파일에서 직접 로드 (CDN 의존 X) -->
  <script type="importmap">
  { "imports": { "pixi.js": "./vendor/pixi.min.mjs" } }
  </script>
</head>
<body>
  <div id="loading">불러오는 중…</div>
  <div id="game"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
