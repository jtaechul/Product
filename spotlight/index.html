<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1e2a4a" />
  <title>SPOTLIGHT</title>
  <style>
    /* 게임 폰트 (로컬 vendoring) — Gmarket Sans + 배달의민족(주아·도현) */
    @font-face { font-family: "GmarketSansBold";   src: url("./vendor/fonts/GmarketSansBold.ttf") format("truetype");   font-display: block; }
    @font-face { font-family: "GmarketSansMedium"; src: url("./vendor/fonts/GmarketSansMedium.ttf") format("truetype"); font-display: block; }
    @font-face { font-family: "BMDOHYEON";         src: url("./vendor/fonts/BMDOHYEON.ttf") format("truetype");         font-display: block; }
    @font-face { font-family: "BMJUA";             src: url("./vendor/fonts/BMJUA.ttf") format("truetype");             font-display: block; }
    @font-face { font-family: "KoPubWorldDotumMedium"; src: url("./vendor/fonts/KoPubWorldDotumMedium.ttf") format("truetype"); font-display: block; }
    @font-face { font-family: "KoPubWorldDotumBold";   src: url("./vendor/fonts/KoPubWorldDotumBold.ttf") format("truetype");   font-display: block; }
    html, body { margin: 0; height: 100%; background: #1e2a4a; overflow: hidden; }
    #game { position: fixed; inset: 0; }
    #game canvas { display: block; touch-action: none; }
    /* 로딩 표시 */
    #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
               color: #fdfbf7; font-family: sans-serif; font-size: 18px; }
    /* 세로 화면 고정: 가로로 들면 안내 오버레이로 막아 세로 유지 (모바일/태블릿) */
    #rotate-notice { display: none; }
    @media (orientation: landscape) and (max-width: 1024px) {
      #rotate-notice {
        position: fixed; inset: 0; z-index: 9999; background: #1e2a4a;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: #fdfbf7; font-family: "GmarketSansBold", sans-serif; text-align: center; gap: 18px;
      }
      #rotate-notice .ico { font-size: 64px; animation: rot 1.8s ease-in-out infinite; }
      #rotate-notice .msg { font-size: 22px; line-height: 1.5; }
      #rotate-notice .sub { font-size: 15px; color: #b9c2d8; font-family: sans-serif; }
      #game, #loading { visibility: hidden; }
    }
    @keyframes rot { 0%,40% { transform: rotate(-90deg); } 60%,100% { transform: rotate(0deg); } }
  </style>
  <!-- PixiJS를 빌드 없이 로컬 파일에서 직접 로드 (CDN 의존 X) -->
  <script type="importmap">
  { "imports": { "pixi.js": "./vendor/pixi.min.mjs" } }
  </script>
</head>
<body>
  <div id="loading">불러오는 중…</div>
  <div id="game"></div>
  <!-- 가로로 들었을 때 세로 복귀 안내 (세로 고정) -->
  <div id="rotate-notice">
    <div class="ico">📱</div>
    <div class="msg">세로로 돌려서 플레이해 주세요</div>
    <div class="sub">SPOTLIGHT는 세로 화면 전용이에요</div>
  </div>
  <!-- 지원 기기(Android/PWA)에서는 세로 방향 잠금 시도 -->
  <script>
    (function () {
      function lockPortrait() {
        try { if (screen.orientation && screen.orientation.lock) screen.orientation.lock("portrait").catch(function () {}); } catch (e) {}
      }
      lockPortrait();
      window.addEventListener("orientationchange", lockPortrait);
    })();
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
