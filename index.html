<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Survivors Deluxe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div id="hud-top">
                <div id="xp-container">
                    <div id="xp-bar-fill"></div>
                    <div id="level-text">LV. 1</div>
                </div>
                <div id="stats-row">
                    <div id="score"><span id="score-label">Score</span>: <span id="score-value">0</span></div>
                    <div id="timer"><span id="timer-label">Time</span>: <span id="timer-value">00:00</span></div>
                </div>
                <div id="hp-bar-container">
                    <div id="hp-bar-fill"></div>
                </div>
            </div>
            <div id="language-selector">
                <button onclick="setLanguage('ko')">KO</button>
                <button onclick="setLanguage('en')">EN</button>
            </div>
        </div>

        <div id="joystick-container">
            <div id="joystick-base">
                <div id="joystick-handle"></div>
            </div>
        </div>

        <div id="level-up-screen" style="display: none;">
            <h1 id="lvl-up-title">LEVEL UP!</h1>
            <p id="lvl-up-subtitle">Choose an Upgrade</p>
            <div id="skill-options">
                <!-- Skill buttons will be injected here -->
            </div>
        </div>

        <div id="game-over-screen" style="display: none;">
            <h1 id="game-over-title">GAME OVER</h1>
            <div id="game-over-labels">
                <p><span id="final-score-label">Score</span>: <span id="final-score-value">0</span></p>
                <p><span id="final-time-label">Time</span>: <span id="final-time-value">00:00</span></p>
            </div>
            <button id="restart-btn" onclick="restartGame()">RESTART</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
