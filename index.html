<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web 3D 도시 맵</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <canvas id="game-canvas"></canvas>

    <div id="ui-overlay">
        <div id="info-panel">
            <h2>3D 도시 맵</h2>
            <div class="legend">
                <div class="legend-item">
                    <span class="dot residential"></span>주택가
                </div>
                <div class="legend-item">
                    <span class="dot commercial"></span>상업지구
                </div>
                <div class="legend-item">
                    <span class="dot industrial"></span>공장지대
                </div>
            </div>
            <div class="stats">
                <div>건물: 15개</div>
                <div>가로등: 10개</div>
            </div>
        </div>
        <div id="controls-hint">
            드래그: 카메라 회전 &nbsp;|&nbsp; 우클릭 드래그: 이동 &nbsp;|&nbsp; 스크롤: 줌
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
