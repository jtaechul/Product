<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web 3D 도시 맵</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "/lib/three/three.module.js",
            "three/addons/": "/lib/three/addons/"
        }
    }
    </script>
</head>
<body>
    <canvas id="game-canvas"></canvas>

    <div id="ui-overlay">
        <div id="info-panel">
            <h2>3D 도시 맵</h2>
            <div class="legend">
                <div class="legend-item">
                    <span class="dot residential"></span>주택가
                </div>
                <div class="legend-item">
                    <span class="dot commercial"></span>상업지구
                </div>
                <div class="legend-item">
                    <span class="dot industrial"></span>공장지대
                </div>
            </div>
            <div class="stats">
                <div>건물: 15개</div>
                <div>가로등: 10개</div>
            </div>
        </div>
        <div id="controls-hint">
            ◀▲▼▶ 방향키로 이동 &nbsp;|&nbsp; 좌우 키는 캐릭터 회전
        </div>
    </div>

    <!-- 플로팅 D-pad -->
    <div id="dpad">
        <div class="dpad-row">
            <button id="dpad-up" class="dpad-btn" aria-label="위">▲</button>
        </div>
        <div class="dpad-row">
            <button id="dpad-left"  class="dpad-btn" aria-label="왼쪽">◀</button>
            <div class="dpad-center"></div>
            <button id="dpad-right" class="dpad-btn" aria-label="오른쪽">▶</button>
        </div>
        <div class="dpad-row">
            <button id="dpad-down" class="dpad-btn" aria-label="아래">▼</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
