<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DEEP DIVE LOG · 자동 제작 대시보드</title>
<style>
:root{--bg:#070b10;--panel:#0d151d;--line:rgba(150,200,215,.18);--cy:#43c8da;--wt:#e8eef2;--gy:#8fa0aa;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(120% 100% at 50% 0%,#0b1620,#05080c 70%);color:var(--wt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;min-height:100vh}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.wrap{max-width:1040px;margin:0 auto;padding:26px 18px 60px}
header{display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:22px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--cy);box-shadow:0 0 12px var(--cy)}
h1{font-size:19px;letter-spacing:3px;font-weight:800}
h1 span{color:var(--cy)}
.sub{color:var(--gy);font-size:12px;letter-spacing:2px;margin-left:auto}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:820px){.grid{grid-template-columns:1fr}}
.card{background:linear-gradient(180deg,var(--panel),#0a1118);border:1px solid var(--line);border-radius:12px;padding:18px 18px 20px;position:relative}
.card::before{content:"";position:absolute;top:-1px;left:-1px;width:16px;height:16px;border-top:2px solid var(--cy);border-left:2px solid var(--cy);border-radius:2px 0 0 0}
.lbl{font-size:11px;letter-spacing:2px;color:var(--gy);text-transform:uppercase;margin:14px 0 6px;display:block}
.lbl:first-of-type{margin-top:0}
select,input,button{width:100%;background:#0a1018;color:var(--wt);border:1px solid var(--line);border-radius:8px;padding:11px 12px;font-size:15px;font-family:inherit}
.row{display:flex;gap:10px}.row>*{flex:1}
button.go{margin-top:18px;background:linear-gradient(180deg,#0f2630,#0a1a22);border-color:var(--cy);color:#eafcff;font-weight:800;letter-spacing:2px;cursor:pointer;transition:.15s}
button.go:hover{background:#123240;box-shadow:0 0 18px rgba(67,200,218,.3)}
button.go:disabled{opacity:.5;cursor:not-allowed}
.hint{color:var(--gy);font-size:12px;margin-top:8px;line-height:1.5}
.status{display:flex;align-items:center;gap:8px;font-size:13px;letter-spacing:1px;margin-bottom:10px}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--line);letter-spacing:1px}
.pill.run{border-color:var(--cy);color:var(--cy)}.pill.done{border-color:#5be08a;color:#5be08a}
.pill.err{border-color:#ff6b6b;color:#ff6b6b}
.log{background:#05090d;border:1px solid var(--line);border-radius:8px;height:230px;overflow:auto;padding:10px 12px;
  font-size:12px;line-height:1.55;color:#a9c2cc;white-space:pre-wrap}
.log b{color:var(--cy)}
video{width:100%;border-radius:10px;background:#000;border:1px solid var(--line);margin-top:4px}
.meta{margin-top:12px;font-size:14px;line-height:1.6}
.meta .k{color:var(--gy);font-size:11px;letter-spacing:1px;text-transform:uppercase}
.tags{color:var(--cy);font-weight:600}
.dl{display:inline-block;margin-top:12px;padding:9px 16px;border:1px solid var(--cy);border-radius:8px;color:#eafcff;text-decoration:none;letter-spacing:1px;font-size:13px}
.empty{color:var(--gy);font-size:13px;text-align:center;padding:60px 10px}
.qc{margin-top:10px}
</style></head>
<body><div class="wrap">
<header>
  <div class="dot"></div>
  <h1>DEEP DIVE <span>LOG</span> · 자동 제작 대시보드</h1>
  <div class="sub mono">SHORTS / REELS FACTORY</div>
</header>

<div class="grid">
  <!-- 입력 -->
  <div class="card">
    <span class="lbl">카테고리</span>
    <select id="category"><option value="deep_sea">deep_sea · 심해 해양생물</option></select>

    <span class="lbl">종(種) 선택</span>
    <select id="species"></select>

    <span class="lbl">또는 직접 입력 (영문/한글 종명)</span>
    <input id="query" placeholder="예: dumbo octopus / 덤보문어" autocomplete="off">

    <span class="lbl">영상 생성 방식</span>
    <select id="visualizer">
      <option value="panzoom">panzoom · 무료 미리보기 (사진 줌, 키 불필요)</option>
      <option value="veo_text2video">veo_text2video · 실제 AI 영상 (GEMINI_API_KEY 필요)</option>
    </select>

    <button class="go" id="go">▶ 쇼츠 생성 시작</button>
    <div class="hint">생성에는 HUD 렌더·합성 때문에 1~수 분이 걸립니다. 진행 로그가 오른쪽에 실시간 표시됩니다.
      veo_text2video는 Veo 하루 사용량(10회)과 API 키가 필요합니다.</div>
  </div>

  <!-- 진행/결과 -->
  <div class="card">
    <div class="status"><span>상태</span><span class="pill" id="pill">대기</span><span id="stime" class="mono" style="color:var(--gy);font-size:12px"></span></div>
    <div class="log mono" id="log"><div class="empty">종을 고르고 ‘생성 시작’을 누르세요.</div></div>
    <div id="result"></div>
  </div>
</div>
</div>

<script>
const $=s=>document.querySelector(s);
let pollTimer=null, t0=0;

async function loadSpecies(){
  try{
    const r=await fetch('/api/species'); const j=await r.json();
    const sel=$('#species'); sel.innerHTML='';
    j.species.forEach(sp=>{const o=document.createElement('option');o.value=sp.en;o.textContent=`${sp.ko} (${sp.en})`;sel.appendChild(o);});
  }catch(e){}
}
$('#species')&&$('#species').addEventListener('change',()=>{$('#query').value='';});

function setPill(s){
  const p=$('#pill'); p.className='pill';
  if(s==='running'){p.classList.add('run');p.textContent='생성 중…';}
  else if(s==='done'){p.classList.add('done');p.textContent='완료';}
  else if(s==='error'){p.classList.add('err');p.textContent='오류';}
  else if(s==='queued'){p.classList.add('run');p.textContent='대기열';}
  else p.textContent='대기';
}
function renderLog(lines){
  const el=$('#log');
  el.innerHTML=(lines&&lines.length)?lines.map(l=>l.replace(/\[(\d\/\d)\]/g,'<b>[$1]</b>')).join('\n'):'<div class="empty">로그 대기 중…</div>';
  el.scrollTop=el.scrollHeight;
}
function renderResult(res){
  if(!res){$('#result').innerHTML='';return;}
  const tags=(res.hashtags||[]).join(' ');
  $('#result').innerHTML=`
    <video src="${res.video_url}" controls autoplay muted loop playsinline></video>
    <div class="qc"><span class="pill ${res.qc_passed?'done':'err'}">QC ${res.qc_passed?'통과':'실패'}</span></div>
    <div class="meta"><div class="k">훅</div>${res.hook||'-'}
      <div class="k" style="margin-top:8px">캡션</div>${(res.caption||'').replace(/\n/g,'<br>')}
      <div class="k" style="margin-top:8px">해시태그</div><span class="tags">${tags}</span></div>
    <a class="dl" href="${res.video_url}" download>⤓ 영상 다운로드</a>`;
}
async function poll(id){
  const r=await fetch('/api/jobs/'+id); const j=await r.json();
  setPill(j.status); renderLog(j.log);
  $('#stime').textContent=((Date.now()-t0)/1000).toFixed(0)+'s';
  if(j.status==='done'){clearInterval(pollTimer);renderResult(j.result);$('#go').disabled=false;}
  else if(j.status==='error'){clearInterval(pollTimer);renderLog((j.log||[]).concat(['✖ '+(j.error||'실패')]));$('#go').disabled=false;}
}
$('#go').addEventListener('click',async()=>{
  const query=$('#query').value.trim()||$('#species').value;
  const body={category:$('#category').value,query,visualizer:$('#visualizer').value};
  $('#go').disabled=true; $('#result').innerHTML=''; renderLog(['작업 시작 중…']); setPill('queued'); t0=Date.now();
  try{
    const r=await fetch('/api/jobs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const j=await r.json();
    if(j.error){renderLog(['✖ '+j.error]);setPill('error');$('#go').disabled=false;return;}
    clearInterval(pollTimer); pollTimer=setInterval(()=>poll(j.job_id),1500); poll(j.job_id);
  }catch(e){renderLog(['✖ 요청 실패: '+e]);setPill('error');$('#go').disabled=false;}
});
loadSpecies();
</script>
</body></html>
