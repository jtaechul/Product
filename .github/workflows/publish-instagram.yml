name: Publish to Instagram

# 완성된 콘텐츠 1건을 인스타그램 릴스로 발행(또는 안전 점검).
# 트리거 2가지:
#  ① 수동(workflow_dispatch): content_id + probe 입력.
#  ② 요청파일 푸시: short-movie-generator/requests/ig/request.json 을 커밋하면 실행
#     (원격 자동화·검증용). 파일에 {"content_id":"004","probe":true} 형식.
# 안전장치: probe=true 면 발행하지 않고 계정 접근만 확인. 토큰은 IG_ACCESS_TOKEN 시크릿에서만.

on:
  workflow_dispatch:
    inputs:
      content_id:
        description: "콘텐츠 id(3자리, 예: 004)"
        required: true
      probe:
        description: "점검만(발행 안 함) — 처음엔 true 권장"
        type: choice
        options: ["true", "false"]
        default: "true"
  push:
    branches: ["claude/gemini-shorts-reels-generator-dhjfdt"]
    paths: ["short-movie-generator/requests/ig/*.json"]

concurrency:
  group: publish-instagram
  cancel-in-progress: false

permissions:
  contents: write

env:
  OPS_BRANCH: claude/gemini-shorts-reels-generator-dhjfdt

jobs:
  publish:
    runs-on: ubuntu-latest
    name: 인스타 발행
    defaults:
      run:
        working-directory: short-movie-generator
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/gemini-shorts-reels-generator-dhjfdt

      - name: Resolve inputs (버튼 / 요청파일)
        id: inp
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CID="${{ inputs.content_id }}"; PROBE="${{ inputs.probe }}"
          else
            REQ="requests/ig/request.json"
            CID=$(python3 -c "import json;print(json.load(open('$REQ')).get('content_id',''))")
            PROBE=$(python3 -c "import json;print(str(json.load(open('$REQ')).get('probe',True)).lower())")
          fi
          CID=$(echo "$CID" | tr -cd '0-9' | cut -c1-3)
          echo "cid=$CID" >> "$GITHUB_OUTPUT"
          echo "probe=$PROBE" >> "$GITHUB_OUTPUT"
          echo "요청: 콘텐츠 #$CID · probe=$PROBE"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: short-movie-generator/requirements.txt

      - name: Install deps (requests만 필요)
        run: pip install requests

      - name: Publish (or probe)
        id: pub
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          set -o pipefail   # tee 가 파이썬의 실패 종료코드를 가리지 않도록(거짓 성공 방지)
          CID="${{ steps.inp.outputs.cid }}"
          if [ "${{ steps.inp.outputs.probe }}" = "false" ]; then
            python -m src.run_ig_publish --content-id "$CID" | tee /tmp/ig.log
          else
            python -m src.run_ig_publish --content-id "$CID" --probe | tee /tmp/ig.log
          fi

      - name: Commit record update (발행 성공 시 레코드 반영)
        if: ${{ steps.inp.outputs.probe == 'false' }}
        run: |
          cd "$GITHUB_WORKSPACE"
          git add short-movie-generator/content/*.json 2>/dev/null || true
          if git diff --cached --quiet; then echo "변경 없음"; exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: 인스타 발행 결과 반영 [skip ci]"
          for i in 1 2 3 4 5; do
            git fetch origin "$OPS_BRANCH" \
              && git rebase "origin/$OPS_BRANCH" \
              && git push origin "HEAD:$OPS_BRANCH" \
              && { echo "저장 완료"; exit 0; }
            echo "재시도 $i (원격이 앞서감)…"; git rebase --abort 2>/dev/null || true; sleep 3
          done
          echo "저장 실패(push)"; exit 1

      - name: Notify Telegram
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "$TG_TOKEN" ] && exit 0
          MODE="점검"; [ "${{ steps.inp.outputs.probe }}" = "false" ] && MODE="발행"
          STATUS="성공 ✅"; [ "${{ job.status }}" != "success" ] && STATUS="실패 ❌"
          BODY=$(tail -3 /tmp/ig.log 2>/dev/null || echo "")
          MSG=$(printf "인스타 %s %s\n콘텐츠 #%s\n%s" "$MODE" "$STATUS" "${{ steps.inp.outputs.cid }}" "$BODY")
          for CHAT in "$TG_CHAT" "8231379366"; do
            [ -z "$CHAT" ] && continue
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              --data-urlencode "chat_id=$CHAT" --data-urlencode "text=$MSG" >/dev/null || true
          done
