name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Pages (게임 관련 파일만)
        run: |
          mkdir -p /tmp/pages
          cp index.html main.js style.css /tmp/pages/
          cp -r spotlight night-hunter travel-expense /tmp/pages/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/pages
      - id: deployment
        uses: actions/deploy-pages@v4
