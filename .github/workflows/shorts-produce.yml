name: shorts-produce

# 쿠팡 어필리에이트 쇼츠 팩토리 (projects/coupang-shorts-factory/) 전용 워크플로우.
# 기본 트리거는 workflow_dispatch(수동). push 트리거는 격리 원칙에 따라
# 이 프로젝트의 requests/ 경로에만 paths 필터로 반응한다 (다른 프로젝트 push에 무반응).
# (push 경로는 GitHub MCP의 workflow_dispatch 403 제약을 우회하는 원격 실행용 —
#  regen-caption.yml 등 저장소 기존 관례와 동일)

on:
  workflow_dispatch:
    inputs:
      tts_provider:
        description: "TTS 프로바이더 (auto=등록된 키 자동 감지, mock=키 없이 렌더 검증)"
        type: choice
        options: [auto, elevenlabs, typecast, clova, mock]
        default: auto
  push:
    branches: [main]
    paths: ["projects/coupang-shorts-factory/requests/*.json"]

permissions:
  contents: read

concurrency:
  group: shorts-produce
  cancel-in-progress: false

defaults:
  run:
    working-directory: projects/coupang-shorts-factory

jobs:
  phase0-render-spike:
    name: "Phase 0 — 렌더 스파이크 (TTS→자막 싱크 렌더)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: projects/coupang-shorts-factory/requirements.txt

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Whisper 모델 캐시 (타임스탬프 폴백용)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: whisper-small-v1

      - name: 배경 에셋 확보 (선택 — 실패해도 그라데이션 폴백)
        env:
          SHORTS_PEXELS_API_KEY: ${{ secrets.SHORTS_PEXELS_API_KEY }}
        run: python scripts/fetch_assets.py

      - name: 실행 파라미터 결정 (dispatch 입력 또는 requests/run_request.json)
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "provider=${{ inputs.tts_provider }}" >> "$GITHUB_OUTPUT"
          else
            p=$(python3 -c "import json;print(json.load(open('requests/run_request.json')).get('provider','auto'))" 2>/dev/null || echo auto)
            echo "provider=$p" >> "$GITHUB_OUTPUT"
          fi

      - name: Phase 0 스파이크 실행 (대본→TTS→timestamps→렌더)
        env:
          SHORTS_ELEVENLABS_API_KEY: ${{ secrets.SHORTS_ELEVENLABS_API_KEY }}
          SHORTS_TYPECAST_API_KEY: ${{ secrets.SHORTS_TYPECAST_API_KEY }}
          SHORTS_CLOVA_CLIENT_ID: ${{ secrets.SHORTS_CLOVA_CLIENT_ID }}
          SHORTS_CLOVA_CLIENT_SECRET: ${{ secrets.SHORTS_CLOVA_CLIENT_SECRET }}
        run: >
          python -m src.phase0_spike
          --provider "${{ steps.params.outputs.provider }}"
          --job-id "phase0-run${{ github.run_number }}"

      - name: 산출물 업로드 (video.mp4 / audio.mp3 / timestamps.json / render_stats.json)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorts-phase0-run${{ github.run_number }}
          path: projects/coupang-shorts-factory/data/jobs/
          retention-days: 14
          if-no-files-found: warn
