name: shorts-produce

# 쿠팡 어필리에이트 쇼츠 팩토리 (projects/coupang-shorts-factory/) 전용 워크플로우.
# 트리거: 수동(workflow_dispatch) / requests/*.json push(paths 필터로 격리 — 원격 실행용)
#        / cron 주 5회(KST 월~금 07:30, 전제조건 미비 시 soft로 조용히 통과 — 스펙 §8 Phase 3)
# push 트리거를 확장할 때도 반드시 projects/coupang-shorts-factory/** paths 필터를 유지할 것.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드 (enrich=자료 분석 1회(업로드 직후 자동), plan=기획, candidates=후보, plan-candidates=대본+후보, produce=제작, regen=항목, regen-line=라인문구, regen-line-full=라인 대사+이미지, upload=올리기, voice_samples=보이스 샘플 텔레그램 발송)"
        type: choice
        options: [produce, candidates, plan, plan-candidates, regen, regen-line, regen-line-full, upload, voice_samples, enrich]
        default: produce
      tts_provider:
        description: "TTS 프로바이더 (auto=등록된 키 자동 감지, mock=키 없이 렌더 검증)"
        type: choice
        options: [auto, elevenlabs, typecast, clova, mock]
        default: auto
      row:
        description: "상품 행 번호(1~) 또는 auto(미처리 첫 행) — produce 모드 전용"
        default: "auto"
      privacy:
        description: "업로드 공개 범위 (기본 비공개 — 예약 공개 후 shorts-comments가 고지 댓글 자동 등록)"
        type: choice
        options: [private, unlisted, public]
        default: private
      no_narration:
        description: "나레이션(TTS) 없이 렌더 — 영상/이미지 튜닝용"
        type: choice
        options: ["false", "true"]
        default: "false"
      no_upload:
        description: "제작만 하고 유튜브 업로드는 안 함 (produce 모드 · 새 흐름 검수용)"
        type: choice
        options: ["false", "true"]
        default: "false"
      field:
        description: "재생성 항목 (regen 모드 전용: title|headline|description|hashtags)"
        default: ""
      line:
        description: "라인 번호(0~) — candidates 모드에서 그 라인 후보만 재생성('다시 찾기'). 비우면 전체"
        default: ""
  push:
    branches: [main, claude/coupang-shorts-phase-0-k42l1i]   # 작업브랜치=라이브 제작 테스트(임시)
    paths: ["projects/coupang-shorts-factory/requests/*.json"]
  # (자동 제작 cron 폐지 — 2026-07-14 사용자 확정: 완전 수동·사용자 주도 파이프라인으로 전환)

permissions:
  contents: write   # 업로드 성공 시 큐 상태(data/processed.json) 커밋용

concurrency:
  group: shorts-produce
  cancel-in-progress: false

defaults:
  run:
    working-directory: projects/coupang-shorts-factory

jobs:
  produce:
    name: "쇼츠 제작 파이프라인 (M2→M7)"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: projects/coupang-shorts-factory/requirements.txt

      - name: 의존성 설치
        run: pip install -q -r requirements.txt

      - name: Whisper 모델 캐시 (타임스탬프 폴백용)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: whisper-small-v1

      - name: ⭐ 분석 캐시 회귀 검증 (자료 업로드당 LLM 분석 1회 원칙 — 깨지면 토큰 쓰기 전에 실패)
        run: python tests/test_enrich_cache.py

      - name: 배경 에셋 확보 (선택 — 실패해도 그라데이션 폴백)
        env:
          SHORTS_PEXELS_API_KEY: ${{ secrets.SHORTS_PEXELS_API_KEY }}
        run: python scripts/fetch_assets.py

      - name: 실행 파라미터 결정 (dispatch 입력 / requests/run_request.json)
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "provider=${{ inputs.tts_provider }}" >> "$GITHUB_OUTPUT"
            echo "row=${{ inputs.row }}" >> "$GITHUB_OUTPUT"
            echo "privacy=${{ inputs.privacy }}" >> "$GITHUB_OUTPUT"
            echo "field=${{ inputs.field }}" >> "$GITHUB_OUTPUT"
            echo "line=${{ inputs.line }}" >> "$GITHUB_OUTPUT"
            echo "soft=" >> "$GITHUB_OUTPUT"
            [ "${{ inputs.no_narration }}" = "true" ] && echo "nonar=--no-narration" >> "$GITHUB_OUTPUT" || echo "nonar=" >> "$GITHUB_OUTPUT"
            [ "${{ inputs.no_upload }}" = "true" ] && echo "noup=--no-upload" >> "$GITHUB_OUTPUT" || echo "noup=" >> "$GITHUB_OUTPUT"
          else
            get() { python3 -c "import json;print(json.load(open('requests/run_request.json')).get('$1','$2'))" 2>/dev/null || echo "$2"; }
            echo "mode=$(get mode produce)" >> "$GITHUB_OUTPUT"
            echo "provider=$(get provider auto)" >> "$GITHUB_OUTPUT"
            echo "row=$(get row auto)" >> "$GITHUB_OUTPUT"
            echo "privacy=$(get privacy private)" >> "$GITHUB_OUTPUT"
            echo "field=$(get field '')" >> "$GITHUB_OUTPUT"
            echo "line=$(get line '')" >> "$GITHUB_OUTPUT"
            echo "soft=" >> "$GITHUB_OUTPUT"
            NONAR="$(get no_narration false)"   # JSON true는 파이썬이 'True'로 출력 → 대소문자 모두 허용
            case "$NONAR" in true|True|TRUE|1) echo "nonar=--no-narration" >> "$GITHUB_OUTPUT" ;; *) echo "nonar=" >> "$GITHUB_OUTPUT" ;; esac
            NOUP="$(get no_upload false)"
            case "$NOUP" in true|True|TRUE|1) echo "noup=--no-upload" >> "$GITHUB_OUTPUT" ;; *) echo "noup=" >> "$GITHUB_OUTPUT" ;; esac
          fi

      - name: PO 토큰 프로바이더 기동 (유튜브 링크 추출용 — 데이터센터 IP 봇 차단 우회)
        if: contains(fromJSON('["candidates","plan-candidates","regen-line-full"]'), steps.params.outputs.mode)
        run: |
          # bgutil: 유튜브 봇 검증(PO) 토큰을 로컬에서 생성 — yt-dlp 플러그인이 자동으로 사용.
          # 실패해도 제작은 계속(클라이언트 폴백 → cobalt 위임으로 시도).
          if docker run -d --name bgutil-pot -p 4416:4416 brainicism/bgutil-ytdlp-pot-provider:latest; then
            sleep 4
            curl -sf http://127.0.0.1:4416/ping && echo "PO 프로바이더 응답 확인(ping OK)" \
              || echo "::warning::PO 프로바이더가 응답하지 않음(추출은 폴백 체인으로 진행)"
          else
            echo "::warning::PO 프로바이더 기동 실패 — 폴백 체인만으로 추출 시도"
          fi

      - name: 최신 분석 캐시·자료 동기화 (대기열에서 늦게 시작한 실행도 직전 실행의 분석 결과를 재사용)
        run: |
          # workflow_dispatch는 '요청 시점'의 커밋을 체크아웃하므로, 바로 앞 실행(enrich 등)이 방금
          # 커밋한 data/enrich 캐시가 이 실행에는 없을 수 있다 → main 최신에서 캐시·자료만 당겨와
          # 같은 자료를 두 번 분석하는 틈(등록 직후 연달아 실행)을 막는다. 코드는 그대로 둔다.
          git fetch origin main
          git restore --source FETCH_HEAD -- data/enrich 2>/dev/null || echo "분석 캐시 없음(첫 실행) — 계속"
          git restore --source FETCH_HEAD -- data/notes  2>/dev/null || echo "상세 자료 없음 — 계속"
          # 고지 댓글 대기열도 최신본에 추가해야 shorts-comments가 갱신한 내용과 리베이스 충돌이 안 난다.
          git restore --source FETCH_HEAD -- data/pending_comments.json 2>/dev/null || echo "대기열 없음 — 계속"

      - name: 파이프라인 실행
        env:
          GH_TOKEN: ${{ github.token }}   # 제품 영상(release product-assets) 목록 조회용
          SHORTS_YTDLP_COOKIES: ${{ secrets.SHORTS_YTDLP_COOKIES }}   # (선택) 유튜브 cookies.txt — 최후 수단
          SHORTS_ELEVENLABS_API_KEY: ${{ secrets.SHORTS_ELEVENLABS_API_KEY }}
          SHORTS_TYPECAST_API_KEY: ${{ secrets.SHORTS_TYPECAST_API_KEY }}
          SHORTS_CLOVA_CLIENT_ID: ${{ secrets.SHORTS_CLOVA_CLIENT_ID }}
          SHORTS_CLOVA_CLIENT_SECRET: ${{ secrets.SHORTS_CLOVA_CLIENT_SECRET }}
          SHORTS_PEXELS_API_KEY: ${{ secrets.SHORTS_PEXELS_API_KEY }}
          SHORTS_PIXABAY_API_KEY: ${{ secrets.SHORTS_PIXABAY_API_KEY }}   # (선택) 사진 소스 확장
          SHORTS_GIPHY_API_KEY: ${{ secrets.SHORTS_GIPHY_API_KEY }}       # (선택) 재미있는 움짤(GIF) 소스
          SHORTS_ANTHROPIC_API_KEY: ${{ secrets.SHORTS_ANTHROPIC_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Gemini 키 — ⚠️ 텍스트(대본·이미지검색어) 생성 전용. 유료 영상(Veo)은 코드에서 제거되어 호출 불가.
          SHORTS_GEMINI_API_KEY: ${{ secrets.SHORTS_GEMINI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SHORTS_YT_CLIENT_ID: ${{ secrets.SHORTS_YT_CLIENT_ID }}
          SHORTS_YT_CLIENT_SECRET: ${{ secrets.SHORTS_YT_CLIENT_SECRET }}
          SHORTS_YT_REFRESH_TOKEN: ${{ secrets.SHORTS_YT_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MODE="${{ steps.params.outputs.mode }}"
          ROW="${{ steps.params.outputs.row }}"
          JOB="run${{ github.run_number }}"
          if [ "$MODE" = "plan" ]; then
            python -m src.pipeline --plan --row "$ROW" --job-id "$JOB"
          elif [ "$MODE" = "candidates" ]; then
            LINEARG=""
            [ -n "${{ steps.params.outputs.line }}" ] && LINEARG="--line ${{ steps.params.outputs.line }}"
            python -m src.pipeline --candidates --row "$ROW" $LINEARG --job-id "$JOB"
          elif [ "$MODE" = "plan-candidates" ]; then
            # 전체 자막(대본)부터 새로 쓰고 → 그 대본으로 이미지 후보 재생성 (한 잡에서 순차 실행)
            python -m src.pipeline --plan --row "$ROW" --job-id "$JOB"
            python -m src.pipeline --candidates --row "$ROW" --job-id "$JOB"
          elif [ "$MODE" = "regen" ]; then
            python -m src.pipeline --regen "${{ steps.params.outputs.field }}" --row "$ROW" --job-id "$JOB"
          elif [ "$MODE" = "regen-line" ]; then
            python -m src.pipeline --regen-line "${{ steps.params.outputs.line }}" --row "$ROW" --job-id "$JOB"
          elif [ "$MODE" = "regen-line-full" ]; then
            # 라인 전체 다시 생성: 그 줄 대사(text) 재생성 → 그 새 대사로 그 라인 이미지 후보까지 재생성(한 잡)
            L="${{ steps.params.outputs.line }}"
            python -m src.pipeline --regen-line "$L" --row "$ROW" --job-id "$JOB"
            python -m src.pipeline --candidates --line "$L" --row "$ROW" --job-id "$JOB"
          elif [ "$MODE" = "enrich" ]; then
            # 자료 업로드 직후 관리자 페이지가 자동 호출 — 업로드 시점에 딱 1회 분석해 캐시를 채운다.
            # 이후 기획~제작의 모든 실행은 이 캐시를 재사용한다(재분석 없음 — 아래 캐시 커밋 스텝이 저장).
            python -m src.pipeline --enrich-only --row "$ROW" --job-id "$JOB"
          elif [ "$MODE" = "upload" ]; then
            python -m src.pipeline --upload --row "$ROW" --privacy "${{ steps.params.outputs.privacy }}" --job-id "$JOB"
          elif [ "$MODE" = "voice_samples" ]; then
            python scripts/voice_samples.py
          else
            python -m src.pipeline \
              --row "$ROW" \
              --privacy "${{ steps.params.outputs.privacy }}" \
              ${{ steps.params.outputs.provider != 'auto' && format('--provider {0}', steps.params.outputs.provider) || '' }} \
              --job-id "$JOB" \
              ${{ steps.params.outputs.soft }} \
              ${{ steps.params.outputs.nonar }} \
              ${{ steps.params.outputs.noup }}
          fi

      - name: 기획 파일 커밋 (plan/regen/regen-line/candidates 모드 — 관리자 화면이 data/plans에서 읽음)
        if: success() && (steps.params.outputs.mode == 'plan' || steps.params.outputs.mode == 'regen' || steps.params.outputs.mode == 'regen-line' || steps.params.outputs.mode == 'regen-line-full' || steps.params.outputs.mode == 'candidates' || steps.params.outputs.mode == 'plan-candidates')
        run: |
          git config user.name "shorts-factory-bot"
          git config user.email "github-actions@users.noreply.github.com"
          git add -A data/plans data/product_names.json   # ⚠️ 신규(untracked) 파일도 잡으려면 먼저 add — git diff는 untracked를 못 봄(과거 미커밋 버그)
          git add -A data/mechanism 2>/dev/null || true   # 차별점 3안(2026-07-17) — 폴더가 아직 없으면 조용히 통과
          if ! git diff --cached --quiet; then
            git commit -m "coupang-shorts: 기획 ${{ steps.params.outputs.mode }} (row ${{ steps.params.outputs.row }}) [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "data/plans 변경 없음 — 커밋 생략"
          fi

      - name: 큐 상태·분석 캐시 커밋 (processed.json / PDF 분석 캐시가 바뀐 경우만)
        if: success()
        run: |
          git config user.name "shorts-factory-bot"
          git config user.email "github-actions@users.noreply.github.com"
          # ⭐ data/enrich = PDF 분석 캐시(상품당 1회 원칙). 커밋해야 다음 CI 실행이 토큰 0으로 재사용.
          #   신규(untracked) 캐시 파일은 git diff가 못 보므로 add 먼저 → --cached로 판정(과거 미커밋 버그 방지).
          #   경로별로 나눠 add — 없는 경로가 섞이면 git add 전체가 실패해 나머지도 스테이징 안 됨.
          git add -A data/processed.json 2>/dev/null || true
          git add -A data/notes 2>/dev/null || true
          git add -A data/enrich 2>/dev/null || true
          git add -A data/product_names.json 2>/dev/null || true   # enrich 모드가 추출한 상품명을 관리자 목록에 반영
          git add -A data/pending_comments.json 2>/dev/null || true   # 비공개 업로드 시 고지 댓글 대기열(공개 후 자동 등록)
          if ! git diff --cached --quiet; then
            git commit -m "coupang-shorts: 큐 상태·분석 캐시 갱신 [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "큐 상태·분석 캐시 변경 없음 — 커밋 생략"
          fi

      - name: 결과 영상 릴리스 발행 + 최근 10개만 유지 (produce 모드 · 관리자 페이지 영상 보기용)
        if: success() && steps.params.outputs.mode == 'produce'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          JOB_DIR="data/jobs/run${{ github.run_number }}"
          META="$JOB_DIR/release_meta.json"
          if [ ! -f "$JOB_DIR/video.mp4" ] || [ ! -f "$META" ]; then
            echo "영상/메타 없음 → 릴리스 생략 (cron 업로드 미설정 등 정상 케이스)"; exit 0
          fi
          TAG="shorts-run${{ github.run_number }}"
          NAME=$(python3 -c "import json;print((json.load(open('$META')).get('name') or '쿠팡 쇼츠')[:90])")
          # 릴리스 생성(없을 때만) — 본문은 release_meta.json(관리자 페이지가 JSON으로 파싱)
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$NAME" --notes-file "$META" \
              --target "${{ github.ref_name }}" --latest=false
          ASSETS="$JOB_DIR/video.mp4"
          [ -f "$JOB_DIR/poster.jpg" ] && ASSETS="$ASSETS $JOB_DIR/poster.jpg"
          gh release upload "$TAG" $ASSETS --clobber
          echo "릴리스 발행: $TAG ($NAME)"
          # shorts-run* 릴리스 최신 10개만 유지(오래된 것 태그까지 정리) — 다른 프로젝트(content-*)는 건드리지 않음
          gh release list --limit 100 --json tagName,createdAt \
            --jq '[.[]|select(.tagName|startswith("shorts-run"))]|sort_by(.createdAt)|reverse|.[10:]|.[].tagName' \
          | while read -r t; do
              [ -n "$t" ] && gh release delete "$t" --yes --cleanup-tag && echo "오래된 릴리스 삭제: $t"
            done

      - name: 후보 이미지 릴리스 발행 (candidates 모드 · 관리자 이미지 선택기용)
        if: success() && (steps.params.outputs.mode == 'candidates' || steps.params.outputs.mode == 'plan-candidates' || steps.params.outputs.mode == 'regen-line-full')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          JOB_DIR="data/jobs/run${{ github.run_number }}"
          CDIR="$JOB_DIR/candidates"
          MAN=$(ls "$JOB_DIR"/cand_*.json 2>/dev/null | head -1)
          if [ -z "$MAN" ] || [ ! -d "$CDIR" ]; then
            echo "후보 매니페스트/폴더 없음 → 발행 생략"; exit 0
          fi
          TAG="shorts-cand"
          # 단일 릴리스에 라인별 후보 이미지 + cand_{row_hash}.json 매니페스트를 자산으로 축적
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "이미지 후보 (관리자 선택기)" \
              --notes "라인별 후보 이미지 — 관리자 페이지 '이미지' 탭에서 자막별로 고른다. row_hash로 구분." \
              --target "${{ github.ref_name }}" --latest=false
          gh release upload "$TAG" "$CDIR"/* "$MAN" --clobber
          echo "후보 발행: $TAG ($(ls "$CDIR" | wc -l)장 + 매니페스트 $(basename "$MAN"))"
          # 자산 무한 증가 방지 — 최신 500개만 유지(오래된 row 후보부터 정리)
          # (한 상품 전체 재생성 ≈ 50~60자산 → 500이면 여러 상품이 서로 밀어내지 않는다)
          gh release view "$TAG" --json assets \
            --jq '.assets|sort_by(.createdAt)|reverse|.[500:]|.[].name' 2>/dev/null \
          | while read -r a; do
              [ -n "$a" ] && gh release delete-asset "$TAG" "$a" --yes 2>/dev/null && echo "오래된 후보 자산 삭제: $a"
            done || true

      - name: 산출물 업로드 (video/audio/timestamps/script/stats)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorts-run${{ github.run_number }}
          path: projects/coupang-shorts-factory/data/jobs/
          retention-days: 14
          if-no-files-found: warn
