name: Deploy Card Carousel

on:
  push:
    branches: ["claude/book-carousel-github-import-2wchbg"]
    paths:
      - "card-carousel/**"
      - ".github/workflows/deploy-card-carousel.yml"
  workflow_dispatch: {}  # GitHub Actions 화면에서 "Run workflow" 버튼으로 수동 재배포 가능

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Cloudflare Workers 배포 (card-carousel)
    steps:
      - uses: actions/checkout@v4

      # 저장소에 실제로 등록된 시크릿만 골라 wrangler에 올린다.
      # (없는 시크릿을 목록에 넣으면 wrangler-action이 "not found in environment"로 실패하므로
      #  존재하는 것만 동적으로 목록에 추가한다. GEMINI/REDDIT은 선택 — 없으면 해당 기능만 비활성.)
      - name: 등록된 시크릿만 골라 목록 구성
        id: cfg
        run: |
          LIST=$'ANTHROPIC_API_KEY\nTELEGRAM_BOT_TOKEN\nTELEGRAM_CHAT_ID'
          [ -n "${{ secrets.GEMINI_API_KEY }}" ]        && LIST="$LIST"$'\nGEMINI_API_KEY'        || echo "::warning::GEMINI_API_KEY 없음 — 원본 추적/주제 제안 비활성"
          [ -n "${{ secrets.REDDIT_CLIENT_ID }}" ]      && LIST="$LIST"$'\nREDDIT_CLIENT_ID'
          [ -n "${{ secrets.REDDIT_CLIENT_SECRET }}" ]  && LIST="$LIST"$'\nREDDIT_CLIENT_SECRET'
          {
            echo "secrets<<EOF"
            echo "$LIST"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: card-carousel
          secrets: ${{ steps.cfg.outputs.secrets }}
        env:
          # 목록에 든 이름만 실제로 업로드된다(나머지 빈 값은 무시됨).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}

      # 앱의 실제 경로(브라우저 → pullpush.io 직접) 검증: ① 이미지 게시물이 파싱되는가 ② CORS로 브라우저가 읽을 수 있는가
      - name: pullpush 브라우저 경로 검증 (데이터 + CORS)
        run: |
          ORIGIN="https://card-carousel.jtaechul.workers.dev"
          OK=0
          for SUB in pics EarthPorn interestingasfuck; do
            URL="https://api.pullpush.io/reddit/search/submission/?subreddit=$SUB&sort=desc&sort_type=score&size=40"
            CODE=$(curl -sS --max-time 30 -D /tmp/h -H "Origin: $ORIGIN" -o /tmp/p.json -w "%{http_code}" "$URL" || echo 000)
            ACAO=$(grep -i '^access-control-allow-origin:' /tmp/h | tr -d '\r' | head -1)
            N=$(python3 -c "import json,re;d=json.load(open('/tmp/p.json')).get('data',[]);f=lambda p:(not p.get('over_18')) and (bool(re.search(r'i\.redd\.it',p.get('url') or '')) or bool(re.search(r'\.(jpe?g|png|webp)(\?|\$)',p.get('url') or '',re.I)) or bool((p.get('preview') or {}).get('images')));print(sum(1 for p in d if f(p)))" 2>/dev/null || echo 0)
            echo "sub=$SUB HTTP=$CODE posts=$N ACAO=[$ACAO]"
            if [ "$CODE" = "200" ] && [ "$N" -ge 1 ] && [ -n "$ACAO" ]; then OK=1; break; fi
          done
          if [ "$OK" = "1" ]; then
            echo "::notice::pullpush 브라우저 경로 검증 통과 — 이미지 게시물 파싱 + CORS 허용 확인"
          else
            echo "::error::pullpush 경로 검증 실패 (데이터 또는 CORS 미충족) — 위 로그 확인"
            exit 1
          fi

      # 참고: 서버 폴백 엔드포인트 응답도 출력 (Cloudflare 공유 IP는 429일 수 있음 — 비실패)
      - name: 서버 폴백 응답 출력 (참고)
        run: |
          sleep 3
          curl -sS --max-time 60 -o /tmp/w.json -w "worker HTTP=%{http_code}\n" \
            -X POST "https://card-carousel.jtaechul.workers.dev/api/reddit-trending" \
            -H "Content-Type: application/json" -d '{"category":"popular"}' || true
          head -c 300 /tmp/w.json; echo
        continue-on-error: true
