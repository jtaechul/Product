name: Deploy Card Carousel

on:
  push:
    branches: ["claude/book-carousel-github-import-2wchbg"]
    paths:
      - "card-carousel/**"
      - ".github/workflows/deploy-card-carousel.yml"
  workflow_dispatch: {}  # GitHub Actions 화면에서 "Run workflow" 버튼으로 수동 재배포 가능

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Cloudflare Workers 배포 (card-carousel)
    steps:
      - uses: actions/checkout@v4

      # 저장소에 실제로 등록된 시크릿만 골라 wrangler에 올린다.
      # (없는 시크릿을 목록에 넣으면 wrangler-action이 "not found in environment"로 실패하므로
      #  존재하는 것만 동적으로 목록에 추가한다. GEMINI/REDDIT은 선택 — 없으면 해당 기능만 비활성.)
      - name: 등록된 시크릿만 골라 목록 구성
        id: cfg
        run: |
          LIST=$'ANTHROPIC_API_KEY\nTELEGRAM_BOT_TOKEN\nTELEGRAM_CHAT_ID'
          [ -n "${{ secrets.GEMINI_API_KEY }}" ]        && LIST="$LIST"$'\nGEMINI_API_KEY'        || echo "::warning::GEMINI_API_KEY 없음 — 원본 추적/주제 제안 비활성"
          [ -n "${{ secrets.REDDIT_CLIENT_ID }}" ]      && LIST="$LIST"$'\nREDDIT_CLIENT_ID'
          [ -n "${{ secrets.REDDIT_CLIENT_SECRET }}" ]  && LIST="$LIST"$'\nREDDIT_CLIENT_SECRET'
          {
            echo "secrets<<EOF"
            echo "$LIST"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: card-carousel
          secrets: ${{ steps.cfg.outputs.secrets }}
        env:
          # 목록에 든 이름만 실제로 업로드된다(나머지 빈 값은 무시됨).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}

      # 배포된 실제 엔드포인트로 Reddit 인기글 불러오기를 검증 (러너는 인터넷 접근 가능)
      - name: Reddit 인기글 불러오기 검증
        run: |
          sleep 6
          for CAT in popular facts nature; do
            echo "=== category: $CAT ==="
            CODE=$(curl -sS --max-time 70 -o /tmp/reddit.json -w "%{http_code}" \
              -X POST "https://card-carousel.jtaechul.workers.dev/api/reddit-trending" \
              -H "Content-Type: application/json" -d "{\"category\":\"$CAT\"}" || echo "000")
            echo "HTTP=$CODE"
            head -c 400 /tmp/reddit.json; echo
            N=$(python3 -c "import json;d=json.load(open('/tmp/reddit.json'));print(len(d.get('posts',[])))" 2>/dev/null || echo 0)
            VIA=$(python3 -c "import json;print(json.load(open('/tmp/reddit.json')).get('via',''))" 2>/dev/null || echo "")
            echo "posts=$N via=$VIA"
            if [ "$N" -ge 1 ]; then
              echo "::notice::Reddit 불러오기 성공 — $CAT: $N개 (경로 $VIA)"
              echo "REDDIT_OK=1" >> "$GITHUB_ENV"
              exit 0
            fi
          done
          echo "::error::Reddit 인기글을 어떤 카테고리·경로로도 불러오지 못했습니다."
          exit 1
