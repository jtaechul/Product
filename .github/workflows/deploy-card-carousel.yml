name: Deploy Card Carousel

on:
  push:
    branches: ["claude/book-carousel-github-import-2wchbg"]
    paths:
      - "card-carousel/**"
      - ".github/workflows/deploy-card-carousel.yml"
  workflow_dispatch: {}  # GitHub Actions 화면에서 "Run workflow" 버튼으로 수동 재배포 가능

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Cloudflare Workers 배포 (card-carousel)
    steps:
      - uses: actions/checkout@v4

      # 저장소에 실제로 등록된 시크릿만 골라 wrangler에 올린다.
      # (없는 시크릿을 목록에 넣으면 wrangler-action이 "not found in environment"로 실패하므로
      #  존재하는 것만 동적으로 목록에 추가한다. GEMINI/REDDIT은 선택 — 없으면 해당 기능만 비활성.)
      - name: 등록된 시크릿만 골라 목록 구성
        id: cfg
        run: |
          LIST=$'ANTHROPIC_API_KEY\nTELEGRAM_BOT_TOKEN\nTELEGRAM_CHAT_ID'
          [ -n "${{ secrets.GEMINI_API_KEY }}" ]        && LIST="$LIST"$'\nGEMINI_API_KEY'        || echo "::warning::GEMINI_API_KEY 없음 — 원본 추적/주제 제안 비활성"
          [ -n "${{ secrets.REDDIT_CLIENT_ID }}" ]      && LIST="$LIST"$'\nREDDIT_CLIENT_ID'
          [ -n "${{ secrets.REDDIT_CLIENT_SECRET }}" ]  && LIST="$LIST"$'\nREDDIT_CLIENT_SECRET'
          {
            echo "secrets<<EOF"
            echo "$LIST"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: card-carousel
          secrets: ${{ steps.cfg.outputs.secrets }}
        env:
          # 목록에 든 이름만 실제로 업로드된다(나머지 빈 값은 무시됨).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}

      # 러너(오픈 인터넷)에서 각 소스 직접 진단 — 무엇이 실제로 도달·반환되는지 파악 (비실패)
      - name: Reddit 소스 진단 (러너 직접)
        run: |
          RURL="https://www.reddit.com/r/pics+interestingasfuck/hot.json?limit=5&raw_json=1"
          ENC=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1],safe=''))" "$RURL")
          probe () { # name url jqpath
            CODE=$(curl -sS --max-time 30 -A "web:card-carousel:v2.5" -o /tmp/o -w "%{http_code}" "$2" 2>/tmp/e || echo 000)
            echo "--- $1 : HTTP=$CODE size=$(wc -c </tmp/o 2>/dev/null)"
            head -c 160 /tmp/o 2>/dev/null | tr '\n' ' '; echo
          }
          probe "reddit-direct" "$RURL"
          probe "codetabs" "https://api.codetabs.com/v1/proxy/?quest=$ENC"
          probe "allorigins" "https://api.allorigins.win/raw?url=$ENC"
          probe "corsproxy" "https://corsproxy.io/?url=$ENC"
          probe "pullpush-pics" "https://api.pullpush.io/reddit/search/submission/?subreddit=pics&sort=desc&sort_type=score&size=5"
          echo "=== pullpush image-field 확인 ==="
          curl -sS --max-time 30 "https://api.pullpush.io/reddit/search/submission/?subreddit=pics&sort=desc&sort_type=score&size=5" 2>/dev/null \
            | python3 -c "import json,sys;d=json.load(sys.stdin).get('data',[]);[print(p.get('subreddit'),'|url=',str(p.get('url'))[:60],'|prev=',bool(p.get('preview'))) for p in d[:5]]" 2>/dev/null || echo "pullpush parse fail"
        continue-on-error: true

      # 배포된 실제 엔드포인트도 함께 출력 (진단용, 비실패)
      - name: 배포 엔드포인트 Reddit 응답 출력
        run: |
          sleep 5
          for CAT in popular facts; do
            echo "=== worker category: $CAT ==="
            curl -sS --max-time 70 -o /tmp/w.json -w "HTTP=%{http_code}\n" \
              -X POST "https://card-carousel.jtaechul.workers.dev/api/reddit-trending" \
              -H "Content-Type: application/json" -d "{\"category\":\"$CAT\"}" || true
            head -c 300 /tmp/w.json; echo
          done
        continue-on-error: true
