name: Generate Short

# 무료 운영 구조: GitHub Actions(공개 저장소 = 무료·무제한)가 영상 제작을 담당.
# 실행: GitHub 웹/모바일 → Actions → Generate Short → Run workflow (종·방식 선택)
# 결과: ① 텔레그램으로 영상 자동 전송(봇 시크릿 있을 때) ② 실행 페이지 Artifacts에서 다운로드

on:
  workflow_dispatch:
    inputs:
      category:
        description: "카테고리"
        type: choice
        options: [deep_sea, marine_life, marine_algae, shipwreck]
        default: deep_sea
      query:
        description: "종명 또는 자동(auto / auto:benthos / auto:plankton / auto:nekton)"
        required: true
        default: "auto"
      visualizer:
        description: "영상 생성 방식"
        type: choice
        options: [panzoom, veo_text2video]
        default: panzoom
      episode:
        description: "회차 번호 (비우면 자동)"
        required: false
        default: ""
      content_id:
        description: "재생성 대상 콘텐츠 id(3자리, 예: 007). 비우면 신규 제작"
        required: false
        default: ""
      scope:
        description: "재생성 범위"
        type: choice
        options: [all, caption, images, video]
        default: all
  # 대안 트리거: requests/*.json 푸시로도 생성 가능 (원격 자동화·Claude 조작용)
  push:
    branches: ["claude/gemini-shorts-reels-generator-dhjfdt"]
    paths: ["short-movie-generator/requests/*.json"]
  # 매일 자동 생성: 11:30 KST = 02:30 UTC (AI가 카테고리 로테이션으로 실존 종 자동 선택)
  schedule:
    - cron: "30 2 * * *"

concurrency:
  group: generate-short
  cancel-in-progress: false

permissions:
  contents: write   # 종 중복방지 원장(used_species.json) 커밋용

env:
  # 운영 브랜치(대시보드·자동생성 공통의 단일 코드 기준).
  # 왜: schedule 이벤트는 GitHub 규칙상 '기본 브랜치(main)'에서 뜨는데, main의 옛 코드로
  # 돌면서 매일 실패 메일이 오던 실제 장애가 있었다 → 예약 실행도 운영 브랜치를 체크아웃한다.
  OPS_BRANCH: claude/gemini-shorts-reels-generator-dhjfdt

jobs:
  generate:
    runs-on: ubuntu-latest
    name: 쇼츠 생성
    defaults:
      run:
        working-directory: short-movie-generator
    steps:
      - uses: actions/checkout@v4
        with:
          # schedule(main에서 뜸)일 때도 운영 브랜치 코드를 사용
          ref: ${{ github.event_name == 'schedule' && 'claude/gemini-shorts-reels-generator-dhjfdt' || github.ref }}
          # 요청파일 결정적 선택(git diff HEAD~1)이 실제로 동작하려면 직전 커밋이 필요
          fetch-depth: 2

      - name: Resolve inputs (버튼 / 요청파일 / 스케줄)
        id: inp
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CID="${{ inputs.content_id }}"
            if [ -n "$CID" ]; then
              # 재생성 모드: 기존 콘텐츠 레코드에서 종·카테고리 복원 → 같은 회차·범위로 다시 제작
              # ★카테고리는 레코드 값을 우선(침몰선 재생성이 deep_sea로 오복원돼 '미등록 종'으로
              #   실패하던 사고 방지). 구 레코드에 category가 없으면 버튼 입력값으로 폴백.
              python - "$CID" "${{ inputs.visualizer }}" "${{ inputs.scope }}" "${{ inputs.category }}" <<'PY' >> "$GITHUB_OUTPUT"
          import json, sys
          from pathlib import Path
          cid, viz, scope, cat_in = sys.argv[1], sys.argv[2], sys.argv[3], sys.argv[4]
          cid = f"{int(cid):03d}"
          rec = json.loads(Path("content", f"{cid}.json").read_text(encoding="utf-8"))
          en = rec.get("species", {}).get("common_name_en", "") or "auto"
          print(f"query={en}")
          print(f"visualizer={viz}")
          print(f"episode={int(cid)}")
          print(f"scope={scope}")
          print(f"category={rec.get('category') or cat_in or 'deep_sea'}")
          PY
            else
              echo "query=${{ inputs.query }}" >> "$GITHUB_OUTPUT"
              echo "visualizer=${{ inputs.visualizer }}" >> "$GITHUB_OUTPUT"
              echo "episode=${{ inputs.episode }}" >> "$GITHUB_OUTPUT"
              echo "scope=all" >> "$GITHUB_OUTPUT"
              echo "category=${{ inputs.category }}" >> "$GITHUB_OUTPUT"
            fi
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            # 매일 자동: AI 카테고리 자동 로테이션 + 안정적인 panzoom(무쿼터)
            echo "query=auto" >> "$GITHUB_OUTPUT"
            echo "visualizer=panzoom" >> "$GITHUB_OUTPUT"
            echo "episode=" >> "$GITHUB_OUTPUT"
            echo "scope=all" >> "$GITHUB_OUTPUT"
            echo "category=deep_sea" >> "$GITHUB_OUTPUT"
          else
            # ★푸시로 '이번에 바뀐' 요청 파일을 우선 선택(결정적). CI 체크아웃은 모든 파일 mtime이
            #   같아 `ls -t`가 엉뚱한(오래된) 요청을 집던 버그가 있었다(재생성이 딴 회차로 나감).
            #   longform_*.json은 롱폼 워크플로 소관이라 제외.
            # --relative: git diff는 기본이 '저장소 루트 기준' 경로라 working-directory(short-movie-generator)
            #   안에서 열면 경로가 중복돼 FileNotFoundError가 났다 → cwd 기준 경로로 출력.
            CH=$(git diff --name-only --relative HEAD~1 HEAD -- 'requests/*.json' 2>/dev/null | grep -v 'longform_' | grep '\.json$' | head -1 || true)
            if [ -n "$CH" ] && [ -f "$CH" ]; then F="$CH"; else F=$(ls -t requests/*.json | grep -v 'longform_' | head -1); fi
            python - "$F" <<'PY' >> "$GITHUB_OUTPUT"
          import json, sys
          r = json.load(open(sys.argv[1], encoding="utf-8"))
          print(f"query={r.get('query','auto')}")
          print(f"visualizer={r.get('visualizer','panzoom')}")
          print(f"episode={r.get('episode','')}")
          print(f"scope={r.get('scope','all')}")
          print(f"category={r.get('category','deep_sea')}")
          PY
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: short-movie-generator/requirements.txt

      - name: Install FFmpeg + fonts
        # 재발방지: 오프닝/엔드카드 렌더에 필요한 폰트를 빠짐없이 설치한다.
        # fonts-noto-cjk(본문 CJK) + fonts-liberation(학명 라틴 이탤릭). 하나라도 빠지면
        # fonts_available()가 False가 되어 오프닝/엔드카드가 통째로 스킵되던 사고가 있었다.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg fonts-noto-cjk fonts-liberation tesseract-ocr

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Verify render fonts present (fail fast)
        # 프리플라이트: 필수 폰트가 없으면 여기서 즉시 실패(빨간불)시켜, 훅/엔드카드 없는
        # 영상이 조용히 발행되는 일을 원천 차단한다(PIL 필요 → pip 설치 뒤에 실행).
        working-directory: short-movie-generator
        run: |
          python -c "from src.core import hook_intro as hi; m=hi.missing_fonts(); print('FONT_SCI=', hi.FONT_SCI); assert not m, ('필수 폰트 누락: '+', '.join(m)); print('필수 폰트 OK')"

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-${{ runner.os }}-1.61.0

      - name: Install Chromium (HUD 렌더용)
        run: playwright install --with-deps chromium

      - name: Run pipeline
        id: gen
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          EP_ARG=""
          if [ -n "${{ steps.inp.outputs.episode }}" ]; then EP_ARG="--episode ${{ steps.inp.outputs.episode }}"; fi
          SCOPE="${{ steps.inp.outputs.scope }}"; [ -z "$SCOPE" ] && SCOPE="all"
          CAT="${{ steps.inp.outputs.category }}"; [ -z "$CAT" ] && CAT="deep_sea"
          # 확정 시스템: reels(실사 영상 + 일본어 오프닝훅/엔드카드/전환/사운드). 팬줌·Veo 미사용.
          python -m src.run_pipeline "${{ steps.inp.outputs.query }}" --category "$CAT" $EP_ARG --mode reels
          VIDEO=$(ls -t output/*.mp4 | head -1)
          META=$(ls -t output/*.json | head -1)
          echo "video=$VIDEO" >> "$GITHUB_OUTPUT"
          echo "meta=$META" >> "$GITHUB_OUTPUT"

      - name: Publish media to Release + patch content record (영구 호스팅)
        id: media
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 콘텐츠 id = 도감 회차(메타 series.episode). 미디어를 콘텐츠별 Release에 영구 업로드.
          ID=$(python - "${{ steps.gen.outputs.meta }}" <<'PY'
          import json, sys
          m = json.load(open(sys.argv[1], encoding="utf-8"))
          print(f"{int(m.get('series',{}).get('episode',0)):03d}")
          PY
          )
          VIDEO="${{ steps.gen.outputs.video }}"
          [ -z "$ID" ] || [ "$ID" = "000" ] && { echo "::warning::콘텐츠 id 없음 → Release 생략"; exit 0; }
          mkdir -p work/rel
          cp "$VIDEO" "work/rel/reels_$ID.mp4"
          ffmpeg -y -loglevel error -ss 2 -i "$VIDEO" -frames:v 1 -q:v 3 "work/rel/cover_$ID.jpg" || true
          SRC=$(ls -t assets/approved/*.jpg 2>/dev/null | head -1 || true)
          [ -n "$SRC" ] && cp "$SRC" "work/rel/source_$ID.jpg"
          # 게시물(캐러셀) 5장 → post_<id>_<n>.png (슬라이드 순서 유지)
          n=1; for f in $(ls output/post_*.png 2>/dev/null | sort); do cp "$f" "work/rel/post_${ID}_${n}.png"; n=$((n+1)); done
          TAG="content-$ID"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "Content #$ID" --notes "쇼츠 콘텐츠 #$ID 미디어 (자동 생성)" --target "${{ github.ref_name }}"
          gh release upload "$TAG" work/rel/* --clobber
          BASE="${{ github.server_url }}/${{ github.repository }}/releases/download/$TAG"
          python - "${{ steps.gen.outputs.meta }}" "$ID" "$BASE" <<'PY'
          import json, os, sys
          from pathlib import Path
          meta, cid, base = sys.argv[1], sys.argv[2], sys.argv[3]
          rp = Path("content") / f"{cid}.json"
          if not rp.exists():
              print("::warning::레코드 없음 → media 패치 생략"); sys.exit(0)
          rec = json.loads(rp.read_text(encoding="utf-8"))
          media = rec.get("media", {}) or {}
          media["video_url"] = f"{base}/reels_{cid}.mp4"
          if Path(f"work/rel/cover_{cid}.jpg").exists():
              media["cover_url"] = f"{base}/cover_{cid}.jpg"
          if Path(f"work/rel/source_{cid}.jpg").exists():
              media["source_image_url"] = f"{base}/source_{cid}.jpg"
          rec["media"] = media
          # 게시물(캐러셀) 이미지 URL 패치
          posts = sorted(Path("work/rel").glob(f"post_{cid}_*.png"),
                         key=lambda p: int(p.stem.split("_")[-1]))
          if posts and isinstance(rec.get("post"), dict):
              rec["post"]["image_urls"] = [f"{base}/{p.name}" for p in posts]
          rp.write_text(json.dumps(rec, ensure_ascii=False, indent=2), encoding="utf-8")
          print("media patched:", media, "posts:", len(posts))
          PY
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Job summary (훅·캡션·QC)
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          m = json.load(open("${{ steps.gen.outputs.meta }}", encoding="utf-8"))
          cap = m.get("caption", {})
          print("## 생성 완료 ✅")
          print(f"- **훅**: {cap.get('hook_text','')}")
          print(f"- **해시태그**: {' '.join(cap.get('hashtags', []))}")
          print(f"- **QC**: {'통과' if all(v.get('passed') for v in m.get('qc',{}).values()) else '실패 항목 있음'}")
          print(f"\n**캡션**\n\n{cap.get('caption_body','')}")
          PY

      - name: Send to Telegram (영상 자동 전송)
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 추가 수신자(비밀 아님 — 채팅 ID는 수신자 식별자). 여러 명이면 공백/줄바꿈으로 나열.
          TG_CHAT_EXTRA: "8231379366"
        run: |
          if [ -z "$TG_TOKEN" ]; then
            echo "::notice::텔레그램 봇 토큰 없음 → 전송 생략 (Artifacts에서 다운로드)"
            exit 0
          fi
          CAPTION=$(python - <<'PY'
          import json
          m = json.load(open("${{ steps.gen.outputs.meta }}", encoding="utf-8"))
          cap = m.get("caption", {})
          body = cap.get("caption_body", "")
          tags = " ".join(cap.get("hashtags", []))
          text = (body + "\n\n" + tags).strip()
          print(text[:1000])
          PY
          )
          # 수신자 목록 = 기존 시크릿 채팅 + 추가 채팅(중복 제거). 각자에게 개별 전송.
          RECIPIENTS=$(printf '%s\n%s\n' "$TG_CHAT" "$TG_CHAT_EXTRA" | tr ' ' '\n' | grep -v '^$' | sort -u)
          if [ -z "$RECIPIENTS" ]; then
            echo "::notice::수신자 없음 → 전송 생략"; exit 0
          fi
          for CID in $RECIPIENTS; do
            echo "→ Telegram chat $CID"
            curl -sS -F chat_id="$CID" \
                 -F video=@"${{ steps.gen.outputs.video }}" \
                 -F caption="$CAPTION" \
                 "https://api.telegram.org/bot${TG_TOKEN}/sendVideo" | head -c 300
            echo
          done

      - name: Upload artifact (백업 다운로드)
        uses: actions/upload-artifact@v4
        with:
          name: short-${{ github.run_number }}
          path: |
            short-movie-generator/output/*.mp4
            short-movie-generator/output/*.json
          retention-days: 14

      - name: Commit ledgers + content records (원장 + 콘텐츠 레코드 영속화)
        run: |
          cd "$GITHUB_WORKSPACE"
          # ★카테고리별 제작 원장(catalog)을 모두 커밋해야 '안 만든 대상 우선' 로테이션이 회차 간 유지된다.
          #   (침몰선 catalog 미커밋 → 매번 같은 배가 나오던 문제 해결). glob으로 전 카테고리 원장 포함.
          PATHS="short-movie-generator/src/categories/deep_sea/used_species.json short-movie-generator/src/categories/deep_sea/catalog.json short-movie-generator/src/categories/*/*_catalog.json short-movie-generator/content"
          git add $PATHS 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "변경 없음"; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: 원장·콘텐츠 레코드 갱신 [skip ci]"
          # schedule은 main에서 뜨지만 코드·원장은 운영 브랜치 기준 → 운영 브랜치로 푸시
          if [ "${{ github.event_name }}" = "schedule" ]; then TARGET="$OPS_BRANCH"; else TARGET="${{ github.ref_name }}"; fi
          # 원격이 앞서가 있어도(non-fast-forward) 재정렬 후 재시도 → 레코드가 저장 안 되던 문제 방지
          for i in 1 2 3 4 5; do
            git fetch origin "$TARGET" \
              && git rebase "origin/$TARGET" \
              && git push origin "HEAD:$TARGET" \
              && { echo "저장 완료"; exit 0; }
            echo "재시도 $i (원격이 앞서감)…"; git rebase --abort 2>/dev/null || true; sleep 3
          done
          echo "저장 실패(push)"; exit 1

      # ★실패 알림(운영자 가시성): 제작이 실패하면 텔레그램으로 즉시 알린다 —
      #   "버튼을 눌렀는데 아무것도 안 나온다"가 조용히 지나가지 않게(로그 링크 포함).
      - name: Notify failure to Telegram
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "$TG_TOKEN" ] && exit 0
          MSG="⚠ 쇼츠 제작 실패 (run #${{ github.run_number }})
          카테고리: ${{ steps.inp.outputs.category }} / 대상: ${{ steps.inp.outputs.query }}
          로그: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          for CID in $TG_CHAT; do
            curl -sS -F chat_id="$CID" -F text="$MSG" \
                 "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" | head -c 120; echo
          done
