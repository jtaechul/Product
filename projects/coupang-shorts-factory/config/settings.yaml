# 쿠팡 쇼츠 팩토리 — 파이프라인 설정
# 채널명은 미확정이라 config 변수로 관리 (스펙 §1.2)

channel:
  name: "미래마켓"   # 확정 (핸들 @miraemarket)
  handle: "@miraemarket"
  logo: "assets/brand/logo.png"   # 있으면 상단 프레임에 로고 합성(없으면 채널명 워드마크만)

tts:
  # provider 선택:
  #   auto       = 등록된 API 키를 elevenlabs → gemini → typecast → clova 순서로 감지해 자동 선택
  #   elevenlabs = with-timestamps 엔드포인트 (오디오 + 문자 타임스탬프 동시 수신, 권장)
  #   gemini     = Gemini 2.5 TTS (대본용 Gemini 키 재사용, 클라우드 친화적이라 무료 차단 회피). 오디오만 → 폴백
  #   typecast   = 오디오만 수신 → faster-whisper 폴백으로 단어 타임스탬프 생성
  #   clova      = 네이버클라우드 CLOVA Voice Premium, 오디오만 → 폴백
  #   mock       = API 키 없이 렌더 검증용(단어별 비프음 + 정확한 합성 타임스탬프)
  # 2026-07-15: Typecast 무료계정이 클라우드 IP를 UNUSUAL_ACTIVITY로 차단 → Gemini TTS를 1순위로.
  #   (gemini 실패 시 폴백 체인이 typecast 등으로 자동 전환. 다시 Typecast로 돌리려면 provider: typecast)
  provider: gemini

  elevenlabs:
    # voice_id: 모든 ElevenLabs 계정에 기본 내장된 premade 보이스라 사용자 키로 바로 호출된다
    #   (voice 라이브러리에서 별도 추가 불필요). "Sarah" = 밝고 자연스러운 20대 여성 톤 →
    #   자취생 1인칭 입담 페르소나에 적합. eleven_multilingual_v2로 한국어 발화.
    #   더 자연스러운(원어민) 한국어를 원하면 ElevenLabs 보이스 라이브러리에서 한국어 보이스를
    #   내 계정에 Add 후 그 id로 교체(원어민 톤 업그레이드 경로).
    voice_id: "EXAVITQu4vr4xnSDxMaL"   # Sarah (premade, 전 계정 공용)
    model_id: "eleven_multilingual_v2"
    output_format: "mp3_44100_128"
    # 화난 톤(2026-07-15 사용자 지시): stability를 낮추고 style을 올려 감정·격앙 표현을 강화.
    #   (v2에는 감정 프리셋이 없어 이 두 레버로 '화난' 느낌을 낸다. 과하면 stability를 올려 완화.)
    voice_settings:
      stability: 0.3           # 낮을수록 표현력·기복↑(화난 톤에 유리)
      similarity_boost: 0.75
      style: 0.6               # 감정 강조(격앙된 발화)
      speed: 1.1        # 빠른 템포 (스펙 §M4: 1.1~1.15배)

  gemini:
    # Gemini 2.5 TTS — 대본 생성용 Gemini 키(GEMINI_API_KEY)를 그대로 재사용한다.
    model: "gemini-2.5-flash-preview-tts"   # 저지연·저가 TTS(프리뷰). 더 좋은 표현력은 -pro-preview-tts
    # 보이스(음색): 30대 남성·시크한 광고 내레이터 톤 = Charon(또렷·낮고 차분·정보전달형) (2026-07-16 사용자 지시:
    #   "조금 더 남성스럽게, 30대 남성, 시크한데 왠지 재미있는 광고 컨셉"으로 Fenrir(촐싹·excitable)에서 교체).
    #   다른 남성 후보(쉽게 교체): Puck(경쾌·업비트, 더 발랄하게), Orus(단호·묵직), Fenrir(촐싹·이전 톤). 한국어 발화는 텍스트로 자동.
    voice: "Charon"
    # 시크·위트 광고 내레이션 톤(자연어 지시) — 문장 앞에 붙여 낭독 스타일·속도를 지시한다(감정 프리셋 대신).
    #   '시크(무심·차분)'와 '재미(능청·위트)'를 함께 주문하고, 톤은 이전과 비슷하게 리듬감 있고 빠르게 유지.
    style_prompt: "다음 대사를 30대 남자의 시크하고 무심한 듯하지만 은근히 능청스럽고 위트 있는 광고 내레이션 톤으로, 리듬감 있게 빠르고 실감나게 읽어줘"
    # 1.3배속(피치 유지) — Gemini는 서버 템포 파라미터가 없어 합성 후 ffmpeg atempo로 가속(30초 넘김 방지).
    audio_tempo: 1.3

  typecast:
    voice_id: ""        # 비우면 GET /v1/voices 목록에서 자동 선택(실행 로그에 표시)
    model: "ssfm-v30"
    language: "kor"     # ISO 639-3
    audio_tempo: 1.3    # 0.5~2.0 — 경박·발랄 콘셉트에 맞춘 잰 템포(1.1은 47초로 처짐)
    # 화난 톤(2026-07-15 사용자 지시) — ssfm-v30 감정 프리셋. prompt.emotion_preset로 전달.
    #   preset: normal|happy|sad|angry|whisper|toneup|tonedown, intensity 0.0~2.0.
    #   비우거나 normal이면 감정 미적용(중립). 과하면 intensity를 낮춘다.
    emotion_preset: "angry"
    emotion_intensity: 1.4

  clova:
    speaker: "nara"     # 프리미엄 대표 여성 보이스
    speed: -1           # -5(빠름) ~ 5(느림), -1 ≈ 1.1배속
    volume: 0
    pitch: 0
    format: "mp3"

subtitle:               # 스펙 §M6 - 3 (2026-07-12 개편: '대본이 곧 자막')
  mode: "karaoke"       # karaoke=대본 subs 칸 팝업(기본) / phrase=구(라인) 단위
  font: "assets/fonts/GmarketSansBold.ttf"
  font_size: 80
  color: "#FFE400"      # 노랑
  stroke_color: "#000000"
  stroke_width: 6
  y: 1580               # 일반 자막 고정 y — framed 레이아웃의 하단 검정 바 안(널뛰기 금지, QA가 검사)
  meme_y: 760           # (framed에서는 렌더가 정사각형 중앙으로 자동 계산) punch 밈 카드 y
  # (react 추임새 설정은 2026-07-12 핵심규칙으로 전면 금지되어 제거됨)
  # (폴백·phrase 모드용 — 정상 경로에서는 대본 subs를 재분할 없이 그대로 쓴다)
  max_word_chars: 8
  karaoke_min_chars: 3
  karaoke_max_chars: 8
  phrase_font_size: 64
  phrase_color: "#FFFFFF"
  phrase_y: 1130

render:                 # 스펙 §M6
  width: 1080
  height: 1920
  fps: 30
  crf: 20
  audio_bitrate: "128k"
  shake_px: 8           # price_shock 쉐이크 ±px
  shake_seconds: 0.3
  # ⭐ framed 레이아웃(2026-07-13 사용자 확정): 상단 검정바(채널명·로고) + 가운데 정사각형
  #   (항상 이미지/영상 꽉 참, 빈 화면·흐린 배경 절대 없음) + 하단 검정바(자막).
  # ⭐ expose(폭로/게시판) 레이아웃 (2026-07-14 사용자 확정 · 썰피자식 벤치마크 → 게시판 글 스타일로 재설계):
  #   흰 배경 + 상단 커뮤니티 '게시판 글' 헤더(보드명·카테고리 칩·글 제목·작성자/조회수/시간 메타)
  #   + 큰 검정 자막(글 본문) + 라인별 full-width 이미지(하단). 좌측 정렬(쇼츠 우측 버튼 회피).
  layout: "expose"      # "expose"(신규 기본) | "framed" | "legacy"
  thumb_hold_sec: 0.5   # 0:00 썸네일 홀드 — 자막 없는 '제목+훅 이미지' 프레임(쇼츠 그리드 썸네일용, 0=끔)
  expose_header_h: 410  # 상단 헤더 높이(보드바+칩+글제목+메타줄) — 제목 키워 후킹 강화(2026-07-17, 2줄+메타 여유)
  expose_sub_gap: 26    # 헤더~자막 간격
  expose_sub_h: 300     # 큰 자막 밴드 높이
  expose_img_gap: 12    # 자막~이미지 간격
  expose_tag: "실화"     # 게시판 카테고리 칩(예: 실화·정보·꿀팁) — 글 신뢰·호기심 유발
  expose_author: "미래"  # 게시판 작성자명(메타줄) — 조회수/시간은 자동 생성
  square_top: 380       # (framed 전용) 정사각형 시작 y
  square_size: 1080     # (framed 전용) 정사각형 한 변

whisper:                # M5 폴백 설정
  model: "small"        # 한국어 정확도/속도 균형 (tiny/base는 한국어 정확도 낮음)
  compute_type: "int8"

assets:
  backgrounds_dir: "assets/backgrounds"
  # SHORTS_PEXELS_API_KEY 시크릿이 있으면 scripts/fetch_assets.py가 세로 배경을 자동 확보.
  # 없으면 렌더러가 자체 생성 그라데이션 배경(화이트리스트: 자체 생성물)으로 폴백.
  pexels_query: "night city lights"
  pexels_count: 2

script:                 # M3 대본 생성 (스펙 §M3)
  # provider: 구어체 문구는 Gemini가 낫다는 사용자 판단(2026-07-13)으로 gemini 채택.
  #   claude=Anthropic / gemini=Gemini generateContent(텍스트 전용 — 유료 영상 Veo와 무관, 초저가).
  provider: "gemini"
  model: "claude-sonnet-4-6"        # provider=claude일 때 모델
  gemini_model: "gemini-2.5-flash"  # provider=gemini일 때 모델(≈대본당 5원). 더 좋은 구어체 원하면 gemini-3-flash 등
  max_tokens: 4000

veo:                    # ⛔ Gemini/Veo 영상 생성 폐지 (2026-07-13 사용자 확정 — 품질 대비 값어치 없음)
  enabled: false        # 절대 켜지 않는다. 상품 비주얼=제품 영상+상품 사진 켄번즈+밈 이미지만.
  # (파이프라인에서 Veo 호출 자체를 제거했고, 워크플로우 env에서 Gemini 키도 뺐다. 이 블록은 흔적만 남김.)

images:                 # 자막별 이미지/영상 후보 소싱 (2026-07-15 / 2026-07-16 근접성 우선 개편)
  # 검색어는 대본 라인의 '구체적 명사·사물·행동'에서 뽑는다(plan_line_visuals가 라인 keywords 생성).
  # 2026-07-16 사용자 지시: 자막 단어와 '가장 근접한' 이미지가 나와야 함 + 라인당 최소 6장 보장.
  #   → giphy_only 해제: 실사 스톡(키워드 근접 매칭)과 Giphy(재미)를 반반 섞는다(스톡 우선 슬롯).
  #   재미는 자체 밈 + GIF 슬롯으로 유지. 운영자 선택 학습(_source_prefs)이 비중을 자동 조정.
  #   (true로 되돌리면 GIF만 — 근접성 떨어짐)
  giphy_only: false

bgm:                    # 배경음악 — assets/bgm/의 저작권 프리 곡(코믹·발랄)을 렌더가 자동으로 깖
  enabled: true         # 트랙 없으면 자동 생략(무해). 곡 넣으면 바로 적용
  dir: "assets/bgm"     # 여기에 .mp3/.wav 등을 넣으면 랜덤 선택
  volume_solo: 0.42     # 무나레이션(음악이 영상을 캐리)일 때 볼륨
  volume_duck: 0.14     # 나레이션 있을 때 말 밑으로 깔리는 볼륨(덕킹)
  fade_in: 0.8
  fade_out: 1.2

sfx:                    # 효과음 — 제품 등장(폭로 아크 ④단계) 순간에 '리빌' 효과음을 크게 삽입
  enabled: true         # 사용자 제공 실제 폭발음(Freesound) 반영 (2026-07-15). 합성음 폐기.
  reveal: "assets/sfx/reveal.mp3"   # 사용자 업로드 실제 폭발음(Freesound #40472, medium explosion, 2.16s)
  reveal_volume: 0.9    # 나레이션·BGM보다 크게(제품이 나온다는 걸 확실히 인식)
  sub_pop: "assets/sfx/pop.wav"     # 자막 리듬 팝(자체 물리 합성 '뽁' 0.09s — 2026-07-17)
  sub_pop_mode: "pop"   # pop=자막 팝마다(썰피자 벤치마크와 동일) | line=대사 라인 시작만 | off=끔
  sub_pop_volume: 0.25  # 나레이션 아래 낮게 깔리는 리듬(높이면 시끄러움 — 0.2~0.35 권장)

upload:                 # M7 (스펙 §M7)
  privacy_default: "private"   # 미인증 API 프로젝트는 자동 private 잠금 → 반자동 공개 전환
  category_id: "26"            # 노하우/스타일 — 상품·리뷰 콘텐츠 표준 (28 과학기술에서 교정)

# (research 블록 폐지 — 소재 리서치/벤치마크 채널 삭제, 2026-07-14 사용자 확정)
