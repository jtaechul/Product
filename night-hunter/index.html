<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Night Hunter">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d1b2a">
    <link rel="manifest" href="manifest.json">
    <title>NIGHT HUNTER</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="hud">
            <div id="hud-top">
                <div id="health-bar">
                    <span class="heart">&#10084;</span>
                    <span class="heart">&#10084;</span>
                    <span class="heart">&#10084;</span>
                </div>
                <div id="time-display">
                    <span id="time-icon">&#9728;&#65039;</span>
                    <span id="timer">7:00</span>
                    <span id="day-text">1일차</span>
                </div>
                <div id="coin-display">&#128176; <span id="coin-amount">30</span></div>
            </div>
            <div id="hud-bottom">
                <div id="arrest-count">&#128110; 검거 0/3</div>
            </div>
        </div>
        <div id="message-box" style="display:none;"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/SMAAPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/SMAAShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/FXAAShader.js"></script>
    <script src="js/world.js?v=10"></script>
    <script src="js/daynight.js?v=9"></script>
    <script src="js/hint.js?v=9"></script>
    <script src="js/enemy.js?v=9"></script>
    <script src="js/minigame.js?v=9"></script>
    <script src="js/shop.js?v=9"></script>
    <script src="js/npc.js?v=9"></script>
    <script src="js/ambient.js?v=9"></script>
    <script src="js/ui.js?v=19"></script>
    <script src="js/sound.js?v=12"></script>
    <script src="js/character.js?v=2"></script>
    <script src="js/main.js?v=13"></script>
</body>
</html>
