<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Chibi Police Preview</title>
<style>
body { margin: 0; overflow: hidden; background: #e8eef5; font-family: 'Inter', sans-serif; }
#info {
    position: fixed; top: 12px; left: 12px; z-index: 10;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
    padding: 10px 14px; border-radius: 12px; font-size: 13px;
    color: #fff; line-height: 1.6;
}
.controls { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
button {
    background: #3b82f6; color: #fff; border: none;
    padding: 6px 12px; border-radius: 6px;
    cursor: pointer; font-size: 12px; font-weight: 600;
}
button:hover { background: #2563eb; }
button.active { background: #fbbf24; color: #000; }
</style>
</head>
<body>
<div id="info">
    <div style="font-size:11px; letter-spacing:3px; color:#60a5fa; font-weight:700;">CHIBI FIGURINE PREVIEW</div>
    <div style="font-size:16px; font-weight:800; margin: 4px 0 8px;">소윤 / 하윤 (피규어 스타일)</div>
    <div class="controls">
        <button id="b-soyun" class="active">소윤</button>
        <button id="b-hayun">하윤</button>
    </div>
    <div class="controls" style="margin-top:8px;">
        <button id="b-idle" class="active">Idle</button>
        <button id="b-walk">Walk</button>
        <button id="b-pocket">Hands on Hip</button>
        <button id="b-salute">Salute</button>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="js/chibiPoliceCharacter.js"></script>
<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xe8eef5);

const camera = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.1, 50);
camera.position.set(1.3, 1.2, 2.2);
camera.lookAt(0, 0.9, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
ChibiCharacters.configureRenderer(renderer);
ChibiCharacters.setupLighting(scene);

// 바닥
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(8, 8),
    new THREE.MeshStandardMaterial({ color: 0xdde4ec, roughness: 0.7 })
);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

let char = new ChibiCharacters.Soyun();
scene.add(char);
let mode = 'idle';

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.9, 0);
controls.enableDamping = true;
controls.minDistance = 1.2;
controls.maxDistance = 5;

const clock = new THREE.Clock();
function loop() {
    requestAnimationFrame(loop);
    const t = clock.getElapsedTime();
    if (mode === 'idle') char.updateIdle(t);
    else if (mode === 'walk') char.updateWalk(t, 1.0);
    controls.update();
    renderer.render(scene, camera);
}
loop();

addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

function setChar(klass, btnId) {
    scene.remove(char); char.dispose();
    char = new klass(); scene.add(char);
    ['soyun','hayun'].forEach(n => document.getElementById('b-'+n).classList.toggle('active', n === btnId));
    applyMode();
}
function applyMode() {
    char._setDefaultPose();
    if (mode === 'pocket') char.poseHandsOnHip();
    if (mode === 'salute') char.poseSalute();
}
function setMode(m) {
    mode = m;
    ['idle','walk','pocket','salute'].forEach(n => document.getElementById('b-'+n).classList.toggle('active', n === m));
    applyMode();
}
document.getElementById('b-soyun').onclick = () => setChar(ChibiCharacters.Soyun, 'soyun');
document.getElementById('b-hayun').onclick = () => setChar(ChibiCharacters.Hayun, 'hayun');
document.getElementById('b-idle').onclick = () => setMode('idle');
document.getElementById('b-walk').onclick = () => setMode('walk');
document.getElementById('b-pocket').onclick = () => setMode('pocket');
document.getElementById('b-salute').onclick = () => setMode('salute');
</script>
</body>
</html>
