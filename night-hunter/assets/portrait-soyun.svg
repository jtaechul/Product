  <!-- Eye whites -->
  <ellipse cx="170" cy="245" rx="13" ry="9" fill="#fff8f0"/>
  <ellipse cx="230" cy="245" rx="13" ry="9" fill="#fff8f0"/>
  <!-- Iris brown -->
