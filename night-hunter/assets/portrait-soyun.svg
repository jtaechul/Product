  <circle cx="200" cy="468" r="4" fill="url(#gold)" stroke="#5a3a00" stroke-width="0.6"/>
  <circle cx="200" cy="486" r="4" fill="url(#gold)" stroke="#5a3a00" stroke-width="0.6"/>
