  <ellipse cx="198" cy="466" rx="1.5" ry="1" fill="#fff5c0" opacity="0.8"/>
  <ellipse cx="198" cy="484" rx="1.5" ry="1" fill="#fff5c0" opacity="0.8"/>
  <ellipse cx="198" cy="502" rx="1.5" ry="1" fill="#fff5c0" opacity="0.8"/>
