  <line x1="200" y1="430" x2="200" y2="520" stroke="#0a1525" stroke-width="0.6" opacity="0.7"/>
  <!-- Chest POLICE badge -->
  <ellipse cx="272" cy="478" rx="24" ry="30" fill="url(#gold)" stroke="#5a3a00" stroke-width="1.8"/>
  <ellipse cx="272" cy="478" rx="20" ry="26" fill="none" stroke="#7a5a10" stroke-width="0.8"/>
  <text x="272" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="900" fill="#3a2810">POLICE</text>
  <text x="272" y="488" text-anchor="middle" font-size="15" font-weight="900" fill="#3a2810">★</text>
  <text x="272" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="4" font-weight="700" fill="#3a2810">DEPARTMENT</text>
