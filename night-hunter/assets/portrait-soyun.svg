  <ellipse cx="270" cy="159" r="5" fill="#cc1a1a" stroke="#7a0808" stroke-width="0.5"/>
  <ellipse cx="255" cy="157" rx="6" ry="2" fill="#ff5050" opacity="0.6"/>

  <!-- EYEBROWS (dark brown, gently arched, full) -->
  <path d="M 155 218 Q 170 210, 188 218 L 188 222 Q 170 216, 155 222 Z" fill="#3a2010"/>
  <path d="M 212 218 Q 230 210, 245 218 L 245 222 Q 230 216, 212 222 Z" fill="#3a2010"/>

