  <ellipse cx="60" cy="430" rx="21" ry="25" fill="none" stroke="#daa520" stroke-width="1.5"/>
  <text x="60" y="429" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="800" fill="#daa520">POLICE</text>
  <path d="M 48 440 L 60 450 L 72 440" stroke="#daa520" stroke-width="1.2" fill="none"/>
  <ellipse cx="340" cy="430" rx="24" ry="28" fill="#0a1730" stroke="#1a2540" stroke-width="0.6"/>
  <ellipse cx="340" cy="430" rx="21" ry="25" fill="none" stroke="#daa520" stroke-width="1.5"/>
  <text x="340" y="429" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="800" fill="#daa520">POLICE</text>
