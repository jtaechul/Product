  <circle cx="230" cy="246" r="8.5" fill="none" stroke="#5a3018" stroke-width="0.8"/>
  <!-- Pupils -->
  <circle cx="170" cy="246" r="4" fill="#1a0a00"/>
  <circle cx="230" cy="246" r="4" fill="#1a0a00"/>
  <!-- Eye highlights -->
  <circle cx="167" cy="243" r="2.2" fill="#fff"/>
  <circle cx="227" cy="243" r="2.2" fill="#fff"/>
  <circle cx="173" cy="248" r="0.9" fill="#fff" opacity="0.7"/>
  <circle cx="233" cy="248" r="0.9" fill="#fff" opacity="0.7"/>
  <!-- Upper lash line (thick) -->
  <path d="M 155 240 Q 170 233, 185 240" stroke="#1a0a00" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M 215 240 Q 230 233, 245 240" stroke="#1a0a00" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Individual lashes -->
  <line x1="160" y1="238" x2="158" y2="234" stroke="#1a0a00" stroke-width="1"/>
  <line x1="167" y1="236" x2="166" y2="231" stroke="#1a0a00" stroke-width="1"/>
  <line x1="174" y1="236" x2="175" y2="231" stroke="#1a0a00" stroke-width="1"/>
  <line x1="181" y1="238" x2="183" y2="234" stroke="#1a0a00" stroke-width="1"/>
  <line x1="220" y1="238" x2="218" y2="234" stroke="#1a0a00" stroke-width="1"/>
  <line x1="227" y1="236" x2="226" y2="231" stroke="#1a0a00" stroke-width="1"/>
  <line x1="234" y1="236" x2="235" y2="231" stroke="#1a0a00" stroke-width="1"/>
  <line x1="241" y1="238" x2="243" y2="234" stroke="#1a0a00" stroke-width="1"/>
  <!-- Lower lash line (thin) -->
  <path d="M 158 252 Q 170 256, 182 252" stroke="#2a1808" stroke-width="0.7" fill="none"/>
  <path d="M 218 252 Q 230 256, 242 252" stroke="#2a1808" stroke-width="0.7" fill="none"/>

  <!-- CHEEKS (soft peachy blush) -->
  <ellipse cx="150" cy="275" rx="18" ry="10" fill="#ff9080" opacity="0.35"/>
  <ellipse cx="250" cy="275" rx="18" ry="10" fill="#ff9080" opacity="0.35"/>
  <!-- Subtle freckles -->
  <circle cx="158" cy="270" r="0.8" fill="#a06040" opacity="0.7"/>
  <circle cx="163" cy="278" r="0.8" fill="#a06040" opacity="0.7"/>
  <circle cx="167" cy="273" r="0.7" fill="#a06040" opacity="0.6"/>
  <circle cx="244" cy="270" r="0.8" fill="#a06040" opacity="0.7"/>
  <circle cx="239" cy="278" r="0.8" fill="#a06040" opacity="0.7"/>

  <!-- NOSE (soft, refined) -->
  <path d="M 200 250 Q 196 280, 195 290 Q 200 295, 205 290 Q 204 280, 200 250" fill="none" stroke="#c89878" stroke-width="1.2"/>
  <ellipse cx="196" cy="290" rx="2.5" ry="1.5" fill="#a07050" opacity="0.5"/>
  <ellipse cx="204" cy="290" rx="2.5" ry="1.5" fill="#a07050" opacity="0.5"/>
  <ellipse cx="200" cy="288" rx="6" ry="2" fill="#f5d8b5" opacity="0.6"/>

  <!-- MOUTH (coral-peach lips, slight pout) -->
  <!-- Upper lip -->
  <path d="M 178 308 Q 188 304, 200 306 Q 212 304, 222 308 Q 215 312, 200 311 Q 185 312, 178 308 Z" fill="#d97560"/>
  <!-- Lower lip (fuller) -->
  <path d="M 180 311 Q 200 320, 220 311 Q 215 318, 200 320 Q 185 318, 180 311 Z" fill="#c46050"/>
  <!-- Lip highlight -->
  <ellipse cx="200" cy="314" rx="8" ry="1.5" fill="#ffb8a0" opacity="0.7"/>
  <!-- Lip line center -->
  <path d="M 185 311 Q 200 314, 215 311" stroke="#8a3020" stroke-width="0.8" fill="none"/>

  <!-- POLICE CAP (large, prominent) -->
  <!-- Cap body -->
  <ellipse cx="200" cy="140" rx="115" ry="22" fill="#0a1530"/>
  <path d="M 90 140 Q 90 50, 200 40 Q 310 50, 310 140 Z" fill="url(#capSoyun)"/>
  <!-- Cap top dome -->
  <ellipse cx="200" cy="55" rx="105" ry="20" fill="#1a2540" opacity="0.7"/>
  <!-- Cap band -->
  <rect x="88" y="135" width="224" height="14" fill="#000510"/>
  <!-- Cap visor (front) -->
  <path d="M 88 148 Q 100 162, 200 168 Q 300 162, 312 148 Q 200 152, 88 148 Z" fill="#000510"/>
  <ellipse cx="200" cy="162" rx="105" ry="6" fill="#0a0a1a"/>
  <!-- Visor highlight -->
  <path d="M 110 154 Q 200 158, 290 154" stroke="#2a3a5a" stroke-width="1" fill="none" opacity="0.7"/>
  <!-- Gold trim above visor -->
  <rect x="92" y="132" width="216" height="3" fill="#d4a000"/>

  <!-- CAP BADGE (gold star) -->
  <ellipse cx="200" cy="95" rx="32" ry="38" fill="url(#goldBadge)" stroke="#5a3a00" stroke-width="1.5"/>
  <text x="200" y="92" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="800" fill="#5a3a00">POLICE</text>
  <text x="200" y="115" text-anchor="middle" font-size="22" font-weight="900" fill="#5a3a00">★</text>
  <!-- Badge sub-text -->
  <text x="200" y="125" text-anchor="middle" font-family="Inter, sans-serif" font-size="5" font-weight="700" fill="#5a3a00">DEPT</text>
  <!-- Badge highlights -->
  <ellipse cx="190" cy="85" rx="10" ry="5" fill="#ffe8a8" opacity="0.7"/>

  <!-- Side gold band buttons -->
  <circle cx="110" cy="140" r="3" fill="#d4a000" stroke="#5a3a00" stroke-width="0.5"/>
  <circle cx="290" cy="140" r="3" fill="#d4a000" stroke="#5a3a00" stroke-width="0.5"/>
</svg>
