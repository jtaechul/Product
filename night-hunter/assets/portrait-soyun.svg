<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="bgSoyun" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#5a4a3a"/>
      <stop offset="55%" stop-color="#3a2a1f"/>
      <stop offset="100%" stop-color="#1a0e0a"/>
    </radialGradient>
    <linearGradient id="curtainL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a2a1a"/>
      <stop offset="50%" stop-color="#8a6a3a"/>
      <stop offset="100%" stop-color="#a08050"/>
    </linearGradient>
    <linearGradient id="curtainR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a08050"/>
      <stop offset="50%" stop-color="#8a6a3a"/>
      <stop offset="100%" stop-color="#3a2a1a"/>
    </linearGradient>
    <radialGradient id="window" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fff8e0"/>
      <stop offset="60%" stop-color="#e8d8a8"/>
      <stop offset="100%" stop-color="#8a7050"/>
    </radialGradient>
    <radialGradient id="skinSoyun" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fae4c8"/>
      <stop offset="70%" stop-color="#ecceac"/>
      <stop offset="100%" stop-color="#c89878"/>
    </radialGradient>
    <linearGradient id="hairSoyun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a3a1f"/>
      <stop offset="50%" stop-color="#4a2a18"/>
      <stop offset="100%" stop-color="#2a1a0a"/>
    </linearGradient>
    <linearGradient id="hairHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a6a3a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#5a3a1f" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="uniformSoyun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3a5a"/>
      <stop offset="100%" stop-color="#0a1a3a"/>
    </linearGradient>
    <radialGradient id="capSoyun" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a3050"/>
      <stop offset="100%" stop-color="#0a1530"/>
    </radialGradient>
    <radialGradient id="goldBadge" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffe080"/>
      <stop offset="60%" stop-color="#d4a000"/>
      <stop offset="100%" stop-color="#7a5000"/>
    </radialGradient>
  </defs>

  <!-- BG: warm interior with arched window -->
  <rect width="400" height="520" fill="url(#bgSoyun)"/>
  <!-- Window arch behind head (soft glow) -->
  <ellipse cx="200" cy="180" rx="170" ry="200" fill="url(#window)" opacity="0.85"/>
  <path d="M 90 220 Q 90 80, 200 80 Q 310 80, 310 220 L 310 380 L 90 380 Z" fill="none" stroke="#5a4030" stroke-width="3" opacity="0.5"/>
  <line x1="200" y1="80" x2="200" y2="380" stroke="#5a4030" stroke-width="2.5" opacity="0.4"/>
  <line x1="90" y1="220" x2="310" y2="220" stroke="#5a4030" stroke-width="2.5" opacity="0.4"/>

  <!-- Curtains -->
  <path d="M 0 0 L 0 520 L 80 520 Q 110 400, 95 200 Q 90 80, 70 0 Z" fill="url(#curtainL)"/>
  <path d="M 400 0 L 400 520 L 320 520 Q 290 400, 305 200 Q 310 80, 330 0 Z" fill="url(#curtainR)"/>
  <!-- Curtain folds -->
  <path d="M 30 30 Q 25 250, 40 510" stroke="#3a2a1a" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 60 50 Q 55 260, 70 510" stroke="#3a2a1a" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 340 50 Q 345 260, 330 510" stroke="#3a2a1a" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 370 30 Q 375 250, 360 510" stroke="#3a2a1a" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Uniform shoulders -->
  <path d="M 30 520 L 30 410 Q 60 380, 110 365 Q 200 350, 290 365 Q 340 380, 370 410 L 370 520 Z" fill="url(#uniformSoyun)"/>
  <!-- Shoulder POLICE patches (oval) -->
  <ellipse cx="65" cy="430" rx="22" ry="26" fill="#0a1a35"/>
  <ellipse cx="65" cy="430" rx="20" ry="24" fill="none" stroke="#d4a000" stroke-width="1.2"/>
  <text x="65" y="430" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" font-weight="700" fill="#d4a000">POLICE</text>
  <path d="M 55 442 L 65 448 L 75 442" stroke="#d4a000" stroke-width="1" fill="none"/>
  <ellipse cx="335" cy="430" rx="22" ry="26" fill="#0a1a35"/>
  <ellipse cx="335" cy="430" rx="20" ry="24" fill="none" stroke="#d4a000" stroke-width="1.2"/>
  <text x="335" y="430" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" font-weight="700" fill="#d4a000">POLICE</text>
  <path d="M 325 442 L 335 448 L 345 442" stroke="#d4a000" stroke-width="1" fill="none"/>
  <!-- Epaulettes (gold stars on shoulders) -->
  <rect x="105" y="365" width="40" height="14" fill="#1a2a4a" rx="2"/>
  <text x="125" y="377" text-anchor="middle" font-size="11" fill="#d4a000">★★</text>
  <rect x="255" y="365" width="40" height="14" fill="#1a2a4a" rx="2"/>
  <text x="275" y="377" text-anchor="middle" font-size="11" fill="#d4a000">★★</text>
  <!-- White collar shirt -->
  <path d="M 155 385 L 200 440 L 245 385 L 245 400 L 200 410 L 155 400 Z" fill="#f0f0f0" stroke="#a0a0a0" stroke-width="0.5"/>
  <!-- Navy tie -->
  <path d="M 192 410 L 188 520 L 212 520 L 208 410 Z" fill="#0d1b3a"/>
  <path d="M 192 410 L 200 430 L 208 410 Z" fill="#1a2a4a"/>
  <!-- Chest badge (gold star) -->
  <ellipse cx="270" cy="475" rx="22" ry="28" fill="url(#goldBadge)" stroke="#5a3a00" stroke-width="1.5"/>
  <text x="270" y="468" text-anchor="middle" font-size="9" font-weight="800" fill="#5a3a00">POLICE</text>
  <text x="270" y="488" text-anchor="middle" font-size="14" font-weight="900" fill="#5a3a00">★</text>
  <!-- Gold buttons row -->
  <circle cx="200" cy="455" r="3.5" fill="url(#goldBadge)" stroke="#5a3a00" stroke-width="0.5"/>
  <circle cx="200" cy="475" r="3.5" fill="url(#goldBadge)" stroke="#5a3a00" stroke-width="0.5"/>
  <circle cx="200" cy="495" r="3.5" fill="url(#goldBadge)" stroke="#5a3a00" stroke-width="0.5"/>

  <!-- BACK hair flowing past shoulders -->
  <path d="M 105 200 Q 80 320, 70 420 L 100 460 L 120 320 Z" fill="url(#hairSoyun)"/>
  <path d="M 295 200 Q 320 320, 330 420 L 300 460 L 280 320 Z" fill="url(#hairSoyun)"/>
  <!-- Hair strands -->
  <path d="M 100 260 Q 88 360, 80 440" stroke="#6a4a25" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M 300 260 Q 312 360, 320 440" stroke="#6a4a25" stroke-width="1" fill="none" opacity="0.6"/>

