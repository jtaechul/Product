  <ellipse cx="200" cy="330" rx="22" ry="6" fill="#c08868" opacity="0.4"/>

  <!-- FACE (oval) -->
  <ellipse cx="200" cy="240" rx="78" ry="98" fill="url(#skinSoyun)"/>
  <!-- Face shading -->
  <path d="M 130 245 Q 140 290, 165 320 Q 145 310, 130 285 Z" fill="#d8a880" opacity="0.4"/>
  <path d="M 270 245 Q 260 290, 235 320 Q 255 310, 270 285 Z" fill="#d8a880" opacity="0.35"/>
  <!-- Jawline highlight -->
  <path d="M 165 318 Q 200 332, 235 318" stroke="#f5d8b5" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- HAIR (long brown, side-swept bangs) -->
  <!-- Back of head -->
  <path d="M 120 195 Q 100 100, 200 75 Q 300 100, 280 195 L 290 230 Q 270 130, 200 110 Q 130 130, 110 230 Z" fill="url(#hairSoyun)"/>
  <!-- Top hair volume -->
  <path d="M 125 175 Q 145 95, 200 78 Q 255 95, 275 175 L 275 200 Q 200 130, 125 200 Z" fill="url(#hairSoyun)"/>
  <!-- Side hair left (over ear, down past chin) -->
  <path d="M 122 195 Q 110 250, 115 320 L 145 330 Q 140 250, 142 200 Z" fill="url(#hairSoyun)"/>
  <!-- Side hair right (over ear) -->
  <path d="M 278 195 Q 290 250, 285 320 L 255 330 Q 260 250, 258 200 Z" fill="url(#hairSoyun)"/>
  <!-- BANGS (side-swept across forehead) -->
  <path d="M 132 175 Q 165 165, 200 175 Q 245 170, 275 178 Q 260 200, 200 200 Q 145 200, 132 195 Z" fill="url(#hairSoyun)"/>
