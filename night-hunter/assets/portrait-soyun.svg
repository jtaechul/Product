  <line x1="200" y1="75" x2="200" y2="360" stroke="#3a2818" stroke-width="1.5" opacity="0.45"/>
  <line x1="95" y1="220" x2="305" y2="220" stroke="#3a2818" stroke-width="1.5" opacity="0.45"/>
