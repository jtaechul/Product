  <text x="122" y="372" text-anchor="middle" font-size="13" fill="#fff5b8">★★</text>
  <rect x="256" y="358" width="44" height="16" fill="#1a2a4a" rx="2" stroke="#3a4d70" stroke-width="0.5"/>
  <text x="278" y="372" text-anchor="middle" font-size="13" fill="#fff5b8">★★</text>
  <!-- Shoulder POLICE patches -->
