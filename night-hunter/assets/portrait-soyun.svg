<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Background: warm interior with window -->
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#544a3e"/>
      <stop offset="55%" stop-color="#2d2520"/>
      <stop offset="100%" stop-color="#15110d"/>
    </radialGradient>
    <linearGradient id="curtainL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a2018"/>
      <stop offset="50%" stop-color="#7a5e3a"/>
      <stop offset="100%" stop-color="#9a7e5a"/>
    </linearGradient>
    <linearGradient id="curtainR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9a7e5a"/>
      <stop offset="50%" stop-color="#7a5e3a"/>
      <stop offset="100%" stop-color="#2a2018"/>
    </linearGradient>
    <radialGradient id="window" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fff8e0"/>
      <stop offset="55%" stop-color="#e0d0a8"/>
      <stop offset="100%" stop-color="#6a5840"/>
    </radialGradient>
    <!-- Skin: warm peach -->
    <radialGradient id="skin" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fbe6cb"/>
      <stop offset="65%" stop-color="#ebcfa9"/>
      <stop offset="100%" stop-color="#b8896a"/>
    </radialGradient>
    <!-- Hair: warm chestnut brown -->
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5d3a1c"/>
      <stop offset="40%" stop-color="#4a2d15"/>
      <stop offset="100%" stop-color="#23130a"/>
    </linearGradient>
    <radialGradient id="hairShine" cx="50%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#a06a3a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#5d3a1c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="uniform" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3e60"/>
      <stop offset="100%" stop-color="#0c1a3a"/>
    </linearGradient>
    <radialGradient id="cap" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a3450"/>
      <stop offset="100%" stop-color="#0a1530"/>
    </radialGradient>
    <radialGradient id="gold" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffe890"/>
      <stop offset="55%" stop-color="#daa520"/>
      <stop offset="100%" stop-color="#7a5500"/>
    </radialGradient>
    <!-- Eye gradient: warm brown with depth -->
    <radialGradient id="iris" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#9a6228"/>
      <stop offset="60%" stop-color="#5d3712"/>
      <stop offset="100%" stop-color="#2a1808"/>
    </radialGradient>
    <!-- Lips: peach-coral -->
    <linearGradient id="lipUpper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97560"/>
      <stop offset="100%" stop-color="#b85a48"/>
    </linearGradient>
    <linearGradient id="lipLower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e08070"/>
      <stop offset="100%" stop-color="#a04838"/>
    </linearGradient>
  </defs>

