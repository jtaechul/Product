  <ellipse cx="230" cy="135" rx="32" ry="18" fill="url(#hairShine)" opacity="0.7"/>

  <!-- ===== RED HAIR CLIP (right side, character's left) ===== -->
  <rect x="253" y="158" width="20" height="10" fill="#c01818" rx="2" stroke="#6a0606" stroke-width="0.8"/>
  <ellipse cx="270" cy="163" rx="6" ry="5" fill="#c01818" stroke="#6a0606" stroke-width="0.6"/>
  <ellipse cx="258" cy="160" rx="6" ry="2" fill="#ff5050" opacity="0.7"/>
