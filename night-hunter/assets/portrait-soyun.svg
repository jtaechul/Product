  <path d="M 400 0 L 400 520 L 315 520 Q 285 380, 300 200 Q 308 80, 328 0 Z" fill="url(#curtainR)"/>
  <path d="M 25 30 Q 22 250, 35 510" stroke="#2a1a0a" stroke-width="1.8" fill="none" opacity="0.65"/>
  <path d="M 55 50 Q 52 260, 65 510" stroke="#2a1a0a" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 345 50 Q 348 260, 335 510" stroke="#2a1a0a" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 375 30 Q 378 250, 365 510" stroke="#2a1a0a" stroke-width="1.8" fill="none" opacity="0.65"/>

