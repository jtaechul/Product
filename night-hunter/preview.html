<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>캐릭터 GLB 미리보기</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; color:#fff; font-family:sans-serif; overflow:hidden; }
canvas { display:block; }
#info {
    position:fixed; top:8px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,.6); padding:5px 14px; border-radius:20px;
    font-size:12px; pointer-events:none;
}
#anim-btns {
    position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px;
}
#anim-btns button {
    padding:6px 14px; border:none; border-radius:6px;
    background:#1e3060; color:#fff; cursor:pointer; font-size:13px;
}
#anim-btns button:hover { background:#3a5aa0; }
#anim-btns button.active { background:#FFD700; color:#000; }

#panel {
    position:fixed; top:40px; right:8px; bottom:60px;
    width:240px;
    background:rgba(0,0,0,.72); border-radius:10px;
    padding:10px 12px; font-size:12px;
    overflow-y:auto;
}
#panel h3 { font-size:12px; color:#FFD700; margin:8px 0 4px; }
#panel h3:first-child { margin-top:0; }
#hair-btns { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:6px; }
#hair-btns button {
    width:30px; height:30px; border:none; border-radius:5px;
    background:#2a3a60; color:#fff; cursor:pointer; font-size:12px;
}
#hair-btns button:hover { background:#4a6090; }
#hair-btns button.active { background:#FFD700; color:#000; }
#hair-btns button.off { background:#553333; }

.slider { margin:4px 0; }
.slider label { display:flex; justify-content:space-between; font-size:11px; color:#aac; }
.slider .val { color:#FFD700; font-weight:bold; }
.slider input { width:100%; }
.section { border-top:1px solid #334; padding-top:6px; margin-top:6px; }

#copy-btn {
    width:100%; padding:6px; margin-top:8px;
    background:#22b455; color:#fff; border:none; border-radius:5px;
    cursor:pointer; font-size:11px;
}
#copy-btn:hover { background:#33cc66; }
</style>
</head>
<body>
<div id="info">로딩 중...</div>

<div id="panel">
    <h3>👤 캐릭터</h3>
    <div style="display:flex; gap:4px; margin-bottom:8px;">
        <button id="char-soyun" onclick="switchChar('soyun')"
            style="flex:1; padding:6px; background:#FFD700; color:#000; border:none; border-radius:5px; cursor:pointer; font-size:12px;">소윤 (헤어 3)</button>
        <button id="char-hayun" onclick="switchChar('hayun')"
            style="flex:1; padding:6px; background:#2a3a60; color:#fff; border:none; border-radius:5px; cursor:pointer; font-size:12px;">하윤 (헤어 8)</button>
    </div>

    <h3>💇 머리스타일</h3>
    <div id="hair-btns"></div>

    <h3 class="section">📐 헤어 위치/회전/크기</h3>
    <div class="slider"><label>X 오프셋 <span class="val" id="xval">0.000</span></label>
        <input type="range" id="x-slider" min="-0.3" max="0.3" step="0.005" value="0"></div>
    <div class="slider"><label>Y 오프셋 <span class="val" id="yval">0.200</span></label>
        <input type="range" id="y-slider" min="-0.3" max="0.6" step="0.005" value="0.2"></div>
    <div class="slider"><label>Z 오프셋 <span class="val" id="zval">-0.080</span></label>
        <input type="range" id="z-slider" min="-0.3" max="0.3" step="0.005" value="-0.08"></div>
    <div class="slider"><label>X 회전 (°) <span class="val" id="rxval">0</span></label>
        <input type="range" id="rx-slider" min="-180" max="180" step="1" value="0"></div>
    <div class="slider"><label>Y 회전 (°) <span class="val" id="ryval">270</span></label>
        <input type="range" id="ry-slider" min="0" max="360" step="1" value="270"></div>
    <div class="slider"><label>Z 회전 (°) <span class="val" id="rzval">21</span></label>
        <input type="range" id="rz-slider" min="-180" max="180" step="1" value="21"></div>
    <div class="slider"><label>스케일 <span class="val" id="sval">0.01302</span></label>
        <input type="range" id="s-slider" min="0.005" max="0.025" step="0.00001" value="0.01302"></div>
    <div style="font-size:10px; color:#aaa; margin-top:2px;">
        ※ 회전 순서: Y→X→Z (Y는 좌우 돌리기, X는 앞뒤 기울임, Z는 좌우 기울임)
    </div>

    <h3 class="section">✂️ 캐릭터 본체 자르기 (헤어 보호)</h3>
    <div style="font-size:10px; color:#aaa; margin-bottom:4px;">
        6면 박스 <b>안</b>의 정점이 포함된 면만 제거 (헤어는 영향 X).<br>
        슬라이더가 끝점에 닿으면 그 축은 무제한.
    </div>
    <label style="font-size:11px; display:flex; gap:4px; align-items:center; margin-bottom:4px;">
        <input type="checkbox" id="box-vis" checked>
        <span>박스 와이어프레임 표시 (X=빨강, Y=초록, Z=파랑)</span>
    </label>
    <div class="slider"><label>X 최소 <span class="val" id="cxminval">-0.50</span></label>
        <input type="range" id="cxmin-slider" min="-0.50" max="0.50" step="0.01" value="-0.50"></div>
    <div class="slider"><label>X 최대 <span class="val" id="cxmaxval">0.50</span></label>
        <input type="range" id="cxmax-slider" min="-0.50" max="0.50" step="0.01" value="0.50"></div>
    <div class="slider"><label>Y 최소 <span class="val" id="cyminval">1.64</span></label>
        <input type="range" id="cymin-slider" min="0.00" max="1.80" step="0.01" value="1.64"></div>
    <div class="slider"><label>Y 최대 <span class="val" id="cymaxval">1.80</span></label>
        <input type="range" id="cymax-slider" min="0.00" max="1.80" step="0.01" value="1.80"></div>
    <div class="slider"><label>Z 최소 <span class="val" id="czminval">-0.20</span></label>
        <input type="range" id="czmin-slider" min="-0.20" max="0.25" step="0.005" value="-0.20"></div>
    <div class="slider"><label>Z 최대 <span class="val" id="czmaxval">0.015</span></label>
        <input type="range" id="czmax-slider" min="-0.20" max="0.25" step="0.005" value="0.015"></div>
    <div style="font-size:10px; color:#aaa; margin:6px 0 2px;">박스 회전 (중심 기준)</div>
    <div class="slider"><label>Y 회전 (°) <span class="val" id="cryval">10</span></label>
        <input type="range" id="cry-slider" min="-90" max="90" step="1" value="10"></div>
    <div class="slider"><label>Z 회전 (°) <span class="val" id="crzval">0</span></label>
        <input type="range" id="crz-slider" min="-90" max="90" step="1" value="0"></div>

    <button id="copy-btn" onclick="copyValues()">📋 현재 값 복사</button>
</div>

<div id="anim-btns">
    <button onclick="playAnim('idle')" class="active">💤 Idle</button>
    <button onclick="playAnim('walk')">🚶 Walk</button>
    <button onclick="playAnim('run')">🏃 Run</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>
<script src="js/character.js?v=17"></script>
<script>
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a2030);
scene.fog = new THREE.Fog(0x1a2030, 10, 30);

const camera = new THREE.PerspectiveCamera(45, W/H, 0.01, 100);
camera.position.set(0, 1.6, 2.0);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.5, 0);  // 머리 정렬 보기 위해 머리 높이
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

scene.add(new THREE.AmbientLight(0x8899bb, 0.8));
const sun = new THREE.DirectionalLight(0xfff4e0, 1.4);
sun.position.set(2, 4, 3);
sun.castShadow = true;
scene.add(sun);
scene.add(new THREE.DirectionalLight(0x6688cc, 0.4).translateOnAxis(new THREE.Vector3(-1,0.5,-1).normalize(), 5));

scene.add(new THREE.GridHelper(4, 20, 0x334466, 0x223355));

// 크롭 박스 와이어프레임 — character.applyHeadCrop 과 동일 좌표/회전 적용
// 박스 X/Y/Z 색상으로 축 구분: X=빨강, Y=초록, Z=파랑 (Three.js 표준 RGB)
const boxParent = new THREE.Group();   // 박스 중심에 배치
const boxLines = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(1, 1, 1)),
    new THREE.LineBasicMaterial({ color: 0xff3366, depthTest: false, transparent: true, opacity: 0.85 })
);
boxLines.renderOrder = 999;
boxParent.add(boxLines);
const axes = new THREE.AxesHelper(0.15);
axes.renderOrder = 1000;
axes.material.depthTest = false;
boxParent.add(axes);
scene.add(boxParent);

let character = null;

// 게임 본체와 동일한 캐릭터 매핑 (cfg.hairstyleIndex 자동 적용 확인용)
const CHAR_CFG = {
    soyun: { name: 'soyun', hairstyleIndex: 2 },
    hayun: { name: 'hayun', hairstyleIndex: 7 }
};

function switchChar(charId) {
    if (!ChibiCharacter.loaded) return;
    if (character) {
        character.dispose();
        scene.remove(character);
    }
    character = ChibiCharacter.create(CHAR_CFG[charId]);
    if (character) scene.add(character);
    document.getElementById('char-soyun').style.background = (charId==='soyun') ? '#FFD700' : '#2a3a60';
    document.getElementById('char-soyun').style.color      = (charId==='soyun') ? '#000'    : '#fff';
    document.getElementById('char-hayun').style.background = (charId==='hayun') ? '#FFD700' : '#2a3a60';
    document.getElementById('char-hayun').style.color      = (charId==='hayun') ? '#000'    : '#fff';
    // 헤어 버튼 active 동기화
    const idx = CHAR_CFG[charId].hairstyleIndex;
    document.querySelectorAll('#hair-btns button').forEach((b, i) => {
        const btnIdx = (i === 0) ? -1 : (i - 1);
        b.classList.toggle('active', btnIdx === idx);
    });
}
window.switchChar = switchChar;

ChibiCharacter.preload().then(() => {
    character = ChibiCharacter.create(CHAR_CFG.soyun);
    if (!character) {
        document.getElementById('info').textContent = '❌ 캐릭터 생성 실패';
        return;
    }
    scene.add(character);
    const hairCount = ChibiCharacter.getHairstyleCount();
    document.getElementById('info').textContent =
        `✅ 머리 ${hairCount}종 | 드래그: 회전 | 휠: 줌`;
    buildHairButtons(hairCount);
    // 초기엔 소윤 헤어(3번=index 2) 활성 상태로 표시
    document.querySelectorAll('#hair-btns button').forEach((b, i) => {
        b.classList.toggle('active', (i - 1) === 2);
    });
    applyCrop();
}).catch(err => {
    document.getElementById('info').textContent = '❌ 로드 실패: ' + err.message;
});

function buildHairButtons(count) {
    const panel = document.getElementById('hair-btns');
    panel.innerHTML = '';
    const off = document.createElement('button');
    off.textContent = '✗'; off.className = 'off'; off.onclick = () => selectHair(-1);
    panel.appendChild(off);
    for (let i = 0; i < count; i++) {
        const b = document.createElement('button');
        b.textContent = (i + 1);
        b.onclick = () => selectHair(i);
        if (i === 0) b.classList.add('active');
        panel.appendChild(b);
    }
}

function selectHair(index) {
    if (!character) return;
    character.setHairstyle(index);
    document.querySelectorAll('#hair-btns button').forEach((b, i) => {
        const btnIdx = (i === 0) ? -1 : (i - 1);
        b.classList.toggle('active', btnIdx === index);
    });
}
window.selectHair = selectHair;

// ── 6축 transform 슬라이더 ──
const transformIds = [
    ['x',  'xval',  v => parseFloat(v),                    'x'],
    ['y',  'yval',  v => parseFloat(v),                    'y'],
    ['z',  'zval',  v => parseFloat(v),                    'z'],
    ['rx', 'rxval', v => parseFloat(v) * Math.PI / 180,   'rx'],
    ['ry', 'ryval', v => parseFloat(v) * Math.PI / 180,   'ry'],
    ['rz', 'rzval', v => parseFloat(v) * Math.PI / 180,   'rz'],
    ['s',  'sval',  v => parseFloat(v),                    's']
];
transformIds.forEach(([id, valId, conv, key]) => {
    const sl = document.getElementById(id + '-slider');
    const lbl = document.getElementById(valId);
    sl.addEventListener('input', () => {
        const raw = parseFloat(sl.value);
        // 스케일은 5자리, 회전은 정수, 오프셋은 3자리
        const dec = (id === 's') ? 5 : (id.startsWith('r') ? 0 : 3);
        lbl.textContent = raw.toFixed(dec);
        if (character) {
            const xf = {};
            xf[key] = conv(sl.value);
            character.setHairTransform(xf);
        }
    });
});

// ── 머리 크롭 슬라이더 (4축 박스) ──
// 슬라이더가 최소값/최대값 끝점에 있으면 그 축은 무한대로 해석 → 제한 없음
function readCropAxis(minId, maxId, sliderMin, sliderMax) {
    const lo = parseFloat(document.getElementById(minId).value);
    const hi = parseFloat(document.getElementById(maxId).value);
    return {
        min: (lo <= sliderMin + 1e-6) ? -Infinity : lo,
        max: (hi >= sliderMax - 1e-6) ?  Infinity : hi
    };
}
// 무한대 축은 와이어프레임 시각화 시 적당히 큰 값(폴백)으로 그림
function finiteOr(v, fallback) { return isFinite(v) ? v : fallback; }

function applyCrop() {
    if (!character) return;
    const x = readCropAxis('cxmin-slider', 'cxmax-slider', -0.50, 0.50);
    const y = readCropAxis('cymin-slider', 'cymax-slider',  0.00, 1.80);
    const z = readCropAxis('czmin-slider', 'czmax-slider', -0.20, 0.25);
    const ryDeg = parseFloat(document.getElementById('cry-slider').value);
    const rzDeg = parseFloat(document.getElementById('crz-slider').value);
    character.applyHeadCrop({
        xMin: x.min, xMax: x.max,
        yMin: y.min, yMax: y.max,
        zMin: z.min, zMax: z.max,
        ryDeg, rzDeg
    });

    // 와이어프레임 동기화 (character.applyHeadCrop 과 동일한 박스/회전)
    const xMin = finiteOr(x.min, -0.75), xMax = finiteOr(x.max, 0.75);
    const yMin = finiteOr(y.min,  0.00), yMax = finiteOr(y.max, 1.80);
    const zMin = finiteOr(z.min, -0.35), zMax = finiteOr(z.max, 0.35);
    boxParent.position.set((xMin+xMax)/2, (yMin+yMax)/2, (zMin+zMax)/2);
    boxParent.rotation.set(0, ryDeg * Math.PI/180, rzDeg * Math.PI/180, 'YXZ');
    boxLines.scale.set(xMax-xMin, yMax-yMin, zMax-zMin);
    axes.scale.set(1, 1, 1);  // axes 는 박스 회전에 같이 따라 회전
}
[
    ['cxmin-slider', 'cxminval', 2],
    ['cxmax-slider', 'cxmaxval', 2],
    ['cymin-slider', 'cyminval', 2],
    ['cymax-slider', 'cymaxval', 2],
    ['czmin-slider', 'czminval', 3],
    ['czmax-slider', 'czmaxval', 3],
    ['cry-slider',   'cryval',   0],
    ['crz-slider',   'crzval',   0]
].forEach(([sid, lid, dec]) => {
    document.getElementById(sid).addEventListener('input', e => {
        document.getElementById(lid).textContent = parseFloat(e.target.value).toFixed(dec);
        applyCrop();
    });
});
document.getElementById('box-vis').addEventListener('change', e => {
    boxParent.visible = e.target.checked;
});

// 현재 값 복사 → 클립보드
function copyValues() {
    const vals = {
        hair: {
            x:  parseFloat(document.getElementById('x-slider').value),
            y:  parseFloat(document.getElementById('y-slider').value),
            z:  parseFloat(document.getElementById('z-slider').value),
            rx_deg: parseFloat(document.getElementById('rx-slider').value),
            ry_deg: parseFloat(document.getElementById('ry-slider').value),
            rz_deg: parseFloat(document.getElementById('rz-slider').value),
            s:  parseFloat(document.getElementById('s-slider').value)
        },
        headCrop: {
            xMin:  parseFloat(document.getElementById('cxmin-slider').value),
            xMax:  parseFloat(document.getElementById('cxmax-slider').value),
            yMin:  parseFloat(document.getElementById('cymin-slider').value),
            yMax:  parseFloat(document.getElementById('cymax-slider').value),
            zMin:  parseFloat(document.getElementById('czmin-slider').value),
            zMax:  parseFloat(document.getElementById('czmax-slider').value),
            ryDeg: parseFloat(document.getElementById('cry-slider').value),
            rzDeg: parseFloat(document.getElementById('crz-slider').value)
        }
    };
    const text = JSON.stringify(vals, null, 2);
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = '✓ 복사됨';
        setTimeout(() => btn.textContent = '📋 현재 값 복사', 1500);
    });
    console.log(text);
}
window.copyValues = copyValues;

function playAnim(name) {
    if (character) character.setState(name);
    document.querySelectorAll('#anim-btns button').forEach(b => {
        b.classList.toggle('active', b.getAttribute('onclick').includes(`'${name}'`));
    });
}
window.playAnim = playAnim;

const clock = new THREE.Clock();
(function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    if (character) character.update(dt);
    controls.update();
    renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
