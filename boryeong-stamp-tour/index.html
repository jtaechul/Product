<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#b5451f" />
<title>보령 가을愛 스탬프 투어</title>
<link rel="preconnect" href="https://unpkg.com" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="./css/style.css" />
</head>
<body>
<div id="app" class="app">

  <!-- 상단 헤더 -->
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-text">보령 가을愛 스탬프 투어</span>
    </div>
    <div class="progress-pill" id="progressPill" hidden>
      <span id="progressCount">0</span>/3 인증
    </div>
  </header>

  <main class="app-main" id="viewRoot">
    <!-- 화면은 JS가 렌더링 -->
  </main>

</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<!-- App scripts (ES modules) -->
<script type="module" src="./js/app.js"></script>
</body>
</html>
